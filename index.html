<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tinybook Formatter - bookfunnels.io</title>
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital@1&family=Gelasio:ital,wght@0,400;0,700;1,400&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <script src="https://unpkg.com/mammoth@1.6.0/mammoth.browser.min.js"></script>
  <script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone@7.25.6/babel.min.js"></script>

  <!-- Hypher + Knuth-Liang English hyphenation patterns. Both ship CommonJS
       (module.exports = ...), so we provide a small shim around the load.
       We expose the constructor as window.__tbf_Hypher and the patterns as
       window.__tbf_HyphenPatterns, then hyphenateWord() picks them up at
       PDF-generation time. If either script fails to load the formatter
       falls back to a rule-based hyphenator with no user-visible breakage. -->
  <script>
    window.__tbf_savedModule = window.module;
    window.module = { exports: null };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/hypher@0.2.5/lib/hypher.js"></script>
  <script>
    window.__tbf_Hypher = window.module && window.module.exports;
    window.module = { exports: null };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/hyphenation.en-us@0.2.1/lib/en-us.js"></script>
  <script>
    window.__tbf_HyphenPatterns = window.module && window.module.exports;
    window.module = window.__tbf_savedModule;
    try { delete window.__tbf_savedModule; } catch (e) {}
  </script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; }
    input:focus, textarea:focus { border-color: #A8B5FF !important; outline: none; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState } = React;

    // Palette matched to the Bookfunnels Mockup tool for visual consistency
    const BRAND = {
      navy: "#1A212C",
      deepTeal: "#1C4057",
      teal: "#20BDD4",
      blue: "#3D87CC",
      accent: "#A8B5FF",          // soft lavender-blue button fill (Mockup tool primary button)
      accentHover: "#8B9BFF",
      accentDeep: "#4F5FD9",
      light: "#EFF6FB",
      bgPage: "#F5F7FA",          // page background behind cards
      bgSubtle: "#F5F7FA",
      white: "#FFFFFF",
      textPrimary: "#1A212C",
      textSecondary: "#5A6478",
      textMuted: "#94A3B8",
      label: "#6B7484",            // uppercase section labels
      border: "#E8EBF0",
      borderLight: "#F1F5F9",
      stepBadgeBg: "#EEF1FF",      // light blue rounded square
      stepBadgeText: "#3D87CC",
      success: "#10B981",
      danger: "#EF4444",
    };

    const FONT = "'Inter', -apple-system, BlinkMacSystemFont, sans-serif";

    // Text size presets
    const TEXT_PRESETS = {
      default: { bodySize: 10, lineHeight: 15, label: "Default (10pt/15pt)" },
      lisa: { bodySize: 11, lineHeight: 16.5, label: "Spacious (11pt/16.5pt)" }
    };

    // Create configurable SPEC object - will be updated based on selected preset
    function createSpec(textPreset = 'default') {
      const preset = TEXT_PRESETS[textPreset];
      return {
        pageW: 360, pageH: 576, 
        bodySize: preset.bodySize, 
        lineHeight: preset.lineHeight, 
        paraGap: 5,
        headerSize: 8, chapterNumSize: 16, chapterTitleSize: 20,
        epigraphSize: 18, dropCapLines: 3,
        // Cap-height ratio for serif fonts (distance from baseline to top of capital letter,
        // as a fraction of font size). Gelasio and most serifs sit around 0.72.
        capHeightRatio: 0.72,
        margins: {
          verso: { inside: 42, outside: 66, top: 24, bottom: 30 },
          recto: { inside: 66, outside: 42, top: 24, bottom: 30 },
        },
        pageNumY: 546,
      };
    }

    // Default spec for initial UI rendering
    let SPEC = createSpec('default');

    // Drop cap font size is computed so that:
    //   - cap-top aligns with line 1's cap-top
    //   - cap-bottom (baseline) aligns with line N's baseline
    // This is the InDesign "Drop Cap Number of Lines = N" convention and what
    // every well-typeset trade book uses. The visible cap spans:
    //   capHeight = (N-1) * lineHeight + bodyCapHeight
    // (N-1 baseline-to-baseline gaps inside the block, plus one body cap-height
    // at the top to extend up to line 1's cap-top).
    //
    // Earlier versions used (N * lineHeight) which made the cap one inter-line
    // gap too tall — its baseline ended up below line N's baseline and crowded
    // line N+1 of the body text.
    //
    // For 10pt body / 15pt leading / 3 lines / 0.72 ratio ≈ 51.7pt font size
    // For 11pt body / 16.5pt leading / 3 lines / 0.72 ratio ≈ 56.8pt font size
    function getDropCapSize() {
      const bodyCapH = SPEC.bodySize * SPEC.capHeightRatio;
      const capHeight = (SPEC.dropCapLines - 1) * SPEC.lineHeight + bodyCapH;
      return capHeight / SPEC.capHeightRatio;
    }

    // Widow/orphan control settings
    const WIDOW_ORPHAN = {
      minLinesAtPageEnd: 2,    // Don't leave fewer than 2 lines at bottom of page
      minLinesAtPageStart: 2,  // Don't start a page with fewer than 2 lines from previous paragraph
      enabled: true            // Toggle for testing
    };

    const APP_VERSION = {
      version: "0.11.9",
      date: "2026-05-12",
      changes: [
        "0.11.9 - Two toolbar polish fixes. (1) Undo icon swapped from ↶ (a weak hook glyph that rendered as a tiny squiggle on most systems) to ↺ (anticlockwise open circle arrow) — the standard undo glyph in macOS / Word / Docs. Bumped the icon's font-size up a hair so it visually matches B/I/U weight. (2) Toolbar buttons no longer wrap their label across two lines when the toolbar is tight. Added whiteSpace:nowrap and flexShrink:0 to btnStyle, so '+ Image' and '+ Table' stay as a single line regardless of toolbar width.",
        "0.11.8 - Undo button in the chapter body editor. The toolbar in Step 3 now has an Undo (↶) button at the leftmost position; Cmd+Z (Mac) / Ctrl+Z (Win/Linux) also triggers undo. Each RichTextInput keeps its own undo stack (capped at 100 entries) — snapshots are pushed before any toolbar action (B/I/U, H2/H3, image insert, table insert) and at the start of each typing burst (with a 700ms idle commit). Switching chapters mounts a fresh editor with an empty stack so there's no cross-chapter bleed. The button auto-disables when there's nothing to undo. Replaces the browser's native undo, which was unreliable because the textarea is React-controlled (programmatic edits bypassed the browser's stack and some browsers cleared it whenever the value prop changed).",
        "0.11.7 - Three fixes. (1) Scene-break ornament now stays visually centered on every page, not just the first page of a chapter. Root cause: the chapter render loop captured textX once at chapter open (recto position, x=66) and reused it on every subsequent page — so when body wrapped to a verso the text block stayed at the recto x while getCenterX() correctly shifted to the verso center, making the centered \"* * *\" appear off-center relative to the body text around it. Fix: textX and textW are now `let` and re-captured after every newPage() call inside the chapter loop, so the mirrored verso/recto margins are honoured on every page. (2) The Step 1 body-text-size description now reads \"Choose between default and spacious settings\" — removed the project-specific reference. (3) Reaffirms v0.11.6: TOC entry font already follows the body-size preset selector (10pt default / 11pt spacious), via tocEntrySize = SPEC.bodySize.",
        "0.11.6 - Scene-break robustness + TOC typography. (1) Scene breaks (\"* * *\", \"***\", \"---\", etc.) now get promoted to their own paragraph even when the paste only has single newlines around them — previously a paste from Word / Docs / Pages that did not preserve a full blank line between prose and the break let the asterisks fall back into the surrounding body, where the inline-run parser interpreted them as italic markers and produced a stray single star. New helper splitChapterBody() runs at the top of pass 1, pass 2, and the EPUB chapter loop; it splits on blank lines as before, then walks each chunk and promotes any line that matches isSectionBreak. Expanded the ornament regex to include the unicode asterisk variants Word / Pages / InDesign sometimes substitute (∗ ⁎ ⋆ ✱ ✦ ❋ ※ ⁂ ‧) and to accept a single ornament character alone on a line (e.g. just \"*\"). (2) TOC typography brought into line with trade-book convention used by Penguin, Random House, O'Reilly: \"Contents\" heading drops from 22pt to 18pt so it no longer competes with the 20pt chapter titles; entries drop from a hardcoded 11pt to SPEC.bodySize (so 10pt in default preset, 11pt in spacious) so the rhythm matches the body; row spacing tightens from a flat 30pt to 2x line-height. Result reads as a reference page, not a display page.",
        "0.11.5 - Scene-break ornament support. Three centered asterisks (or `***`, `---`, `# # #`, `~ ~ ~`, `• • •`) on their own line are now recognised as a trade-book scene-break marker and rendered as a centered `* * *` ornament with one line of breathing room above and below — both in the PDF and the EPUB. Previously a line like `* * *` was passed through to the inline-run parser, which interpreted the asterisks as italic markers and produced garbage. New helper `isSectionBreak(p)` runs FIRST inside classifyParagraph, before any markdown-marker detection, so the ornament is detected and rendered as a discrete `scenebreak` block in both rendering passes. Scene breaks do not consume the drop-cap-on-first-paragraph flag, so a chapter that opens with a scene break still drops the cap on the next real body paragraph. EPUB path emits `<p class=\"scene-break\">* * *</p>` with letter-spacing and vertical margin so readers across Apple Books, Kobo and Kindle display the transition consistently.",
        "0.11.4 - Multi-project support. The top-right corner now has a Project picker (📚 dropdown) listing every book you've started in this browser, with name (auto-derived from the book title), a one-line description (chapter count · word count · last edited), and a delete X per row. The bottom of the dropdown has a '+ New Project' entry to start a fresh blank slate without losing the current one — exactly like drafting a new email while keeping your other drafts. Each project has its own bookData, manuscript, chapters, step, and text-size preset, all persisted via a new localStorage key 'tinybook-formatter-projects' (one-time migration from the v0.7.9 single-project key happens silently on first load). The Clear Content button is renamed 'Clear This Project' and now only resets the active slot — it no longer deletes anything from localStorage, so other projects stay safe. Implementation: ProjectPicker is a self-contained component (outside-click closes, sorted active-first then by lastModified desc); switching / creating / deleting all snapshot the current form state into the active slot before transitioning so unsaved work isn't lost.",
        "0.9.4 - Defensive paste handler on all three editable textareas (manuscript paste box, dedication / multiline Input, and the RichTextInput chapter body). Different source applications encode paragraph breaks differently on the clipboard, and some browsers don't reliably normalize them when pasting into a textarea. The new handler reads the plain-text clipboard payload, normalizes every common encoding to \\n / \\n\\n (\\r\\n from Windows / Word, \\r from legacy Mac, U+2028 line separator from rich text editors, U+2029 paragraph separator from Word / Google Docs), and inserts at the current cursor position. Fires a real input event afterwards so React state updates correctly. Won't help with sources that genuinely lack line breaks (selecting text from a PDF often flattens paragraphs to a single line) but fixes every case where the break is encoded in any common form.",
        "0.9.3 - Upgrade hyphenation to true Knuth-Liang via the Hypher library + the en-us pattern file. Both ship CommonJS, so they're loaded in <head> with a small module.exports shim that exposes Hypher and the patterns as window.__tbf_Hypher / window.__tbf_HyphenPatterns. hyphenateWord() now picks the Knuth-Liang result when Hypher is available and falls back to the v0.9.0 rule-based hyphenator if either script fails to load (offline, blocked, etc.) so there is no failure mode. Visible improvements over rule-based: 'something' breaks as some-thing (was so-mething), 'running' as run-ning (was runn-ing), 'started' stays whole because no clean 2/3 split exists (was star-ted), 'philosophy' offers phi-los-o-phy (was phi-losophy / philo-sophy), 'recognition' as recog-ni-tion (was four sub-optimal splits). Total CDN payload: ~7 KB hypher + ~27 KB patterns, served from jsDelivr.",
        "0.9.2 - Fix empty main content area on page load. The v0.7.9 autosave persisted the current 'step' value to localStorage, but a user who last left the app on Step 4 (Download) would reload to a blank card: the Step 4 render is gated by 'step === 4 && (pdfUrl || epubUrl)', and pdfUrl / epubUrl are blob URLs that only live for the current session — they aren't (and shouldn't be) persisted. On reload, step was 4 but the URLs were gone, so nothing rendered. Fixed by clamping the restored step from 4 to 3 (Preview) so the user lands somewhere actionable and can regenerate.",
        "0.9.1 - Drop cap typography fixes. Two long-standing bugs corrected. (1) Vertical sizing: getDropCapSize() previously computed capHeight = N * lineHeight, which put the cap's baseline one inter-line gap BELOW line N's baseline. The result was that line N+1 of the body text touched (or overlapped) the bottom of the drop cap. Fixed to capHeight = (N-1) * lineHeight + bodyCapHeight, the InDesign 'Drop Cap Number of Lines = N' convention used by every well-typeset trade book. Drop cap is now ~52pt (was ~62pt) for the default preset; cap-top aligns with line 1's cap-top, baseline aligns with line N's baseline, and line N+1 below has normal line-height clearance. (2) Per-letter tuck-in: all DROP_CAP_TUCK values reset to 0. The old tuck values (L=0.45, T=0.25, F=0.22, etc.) tried to pull body text into the letter's empty space on the right, but failed for letters whose shape changes vertically — e.g. an L has a vertical stroke at the top (open right) but a full-width foot at the bottom, so lines 2-3 of body text alongside the foot overlapped the ink. Pro typography just clears the letter's bounding box uniformly and adds a small padding gap (we use 5pt). The table is kept structurally for possible future per-line tuck logic but is a no-op for now.",
        "0.9.0 - Body text now justifies with hyphenation, the way trade-book typography works. Replaces jsPDF's align:'justify' (which stretches spaces only and produces word-space rivers in narrow columns) with three new helpers: hyphenateWord() does rule-based English hyphenation (prefixes, suffixes, V|CV and VC|CV consonant clusters — approximates Knuth-Liang at ~75% accuracy, no external pattern data); breakIntoJustifiedLines() runs a greedy line-breaker that hyphenates the next word into the current line when there is room for a hyphenated prefix; drawJustifiedLine() stretches inter-word spaces and draws a '-' at hyphenated line endings. The last line of each paragraph stays ragged-right (industry standard). Applied to plain body paragraphs and to the drop-cap paragraph's narrow-then-full line block. Formatted paragraphs (containing **bold** / *italic* / __underline__ markers) stay ragged-right via the existing drawRunLine path — extending hyphenation to those is future work.",
        "0.8.1 - Fix Step 3 textarea jumping back to the top whenever a B / I / U / H2 / H3 button is clicked. Two changes: (1) onMouseDown={preventDefault} on every toolbar button keeps focus on the textarea instead of briefly handing it to the button (which caused some browsers to reset scrollTop on the textarea when it regained focus). (2) The textarea's scrollTop is captured before onChange and restored inside the requestAnimationFrame callback after React commits the new value, as a belt-and-braces safeguard in case the browser still resets it. Also added focus({preventScroll:true}) for good measure. No render change.",
        "0.8.0 - Inline formatting toolbar in Step 3. Each chapter's body editor now has a B / I / U + H2 / H3 strip above the textarea that wraps the current selection (B/I/U) or toggles a line prefix (H2/H3) in markdown-lite syntax: **bold**, *italic*, __underline__, ## Heading, ### Subhead. The PDF renderer honors all five through new helpers (parseInlineRuns, layoutRunsMixed, drawRunLine, classifyParagraph). The render path is gated by containsFormatting(): paragraphs without markers keep the v0.7.9 justified rendering, so unformatted chapters look identical to before. Paragraphs with markers use the run-based ragged-right path (drawRunLine doesn't justify). H3 now actually renders in the PDF (the '### ' prefix was preserved through docx import in v0.7.9 but not drawn). H2 unchanged — same smart break that reserves 2 body lines beneath it. Drop cap on the first body paragraph still works alongside inline formatting. Pass 1 (TOC page-number dry run) updated in lockstep so TOC numbers stay accurate.",
        "0.7.9 - Backend keepers ported from the parallel v0.8.0 work track. No visible UI change. (1) Autosave: bookData, rawText, chapters, step and textSizePreset now persist to localStorage with a 400ms debounce and hydrate on first render, so a tab refresh or crash no longer wipes in-progress work. (2) Docx import robustness: flattenDocxHtml now recurses into nested section / div / article / main containers so headings buried below the top level of mammoth's output still surface (fixes the 'one chapter missing on real manuscripts' case). H3 headings preserved with a '### ' prefix in the flattened output (rendering of that prefix comes in v0.8.0). (3) pickDropCap() helper finds the first alphabetic character in a paragraph so paragraphs that open with a smart quote, numeral, em-dash or symbol still get a clean drop cap glyph instead of garbage. Applied in both the PDF dry-run and the actual render path. (4) Iframe height reporter: emits postMessage({type:'tinybook:height', height}) to the parent window on mount and on every resize, so a hosting page can auto-size the iframe embed. (5) CDN version pins: React 18.3.1, ReactDOM 18.3.1 and Babel standalone 7.25.6 are now pinned so surprise upstream releases can't break the tool.",
        "0.7.8 - Internal cleanup, no visible change. Removed two drift risks surfaced by the post-recto-fix audit: (1) Pass 1 and pass 2 both reset the y cursor after a page break to 'top margin + 30', but expressed it two different ways - pass 1 read SPEC.margins.recto.top directly, pass 2 read getMargins().top. Equal today, drift risk if margins ever go asymmetric. Both now call a single helper bodyTopY(). (2) calcOpeningHeight() hardcoded 252 and 192 for title and epigraph wrap widths. Now derives them from SPEC the same way pass 2 does.",
        "0.7.7 - Two fixes: (1) Reader Bonus page: headline padding now equal above and below (16pt each side) so the title sits visually balanced. (2) Chapter recto bug: pass 2 page-advance was 'if (!isRecto()) newPage(); newPage();' which always landed the chapter on a verso. Pass 1 (TOC page numbering) already assumed recto starts, so the rendered chapter and the TOC page number disagreed. Fixed by swapping the order: newPage() first to leave the previous content, then advance once more if needed to reach recto. Same fix applied to back-of-book CTA.",
        "0.7.6 - Reader Bonus page: rewrote vertical layout using visual edges instead of baselines. Old code added GAP_HEADER_TO_TITLE then drew the title at that y as its baseline, so the cap-height pushed up into the gap and only ~8pt of visible space remained. Likewise GAP_TITLE_TO_BODY measured baseline-to-baseline plus a full TITLE_LINE_H of advance, producing ~35pt visible gap. New code positions text by cap-top from the preceding visible edge, so the gap values match what you see. Set to 18pt above the title, 14pt between title and body, 20pt above the URL bar.",
        "0.7.5 - Reader Bonus page: text inside the black bars (READER BONUS header and URL footer) now vertically centers on cap-height. Previously a hardcoded y+27 baseline left text sitting low in the bar, and the offset got worse when the URL font auto-shrank for long URLs. New formula scales with font size.",
        "0.7.4 - Reader Bonus page: tightened vertical gaps between blocks. Title-to-body 30pt to 16pt, body-to-URL 40pt to 24pt, header-to-title 30pt to 24pt. Block still self-sizes around any title/body length and centers vertically on the page.",
        "0.7.3 - Reader Bonus page: reduced headline from 28pt to 22pt and body from 14pt to 12pt so typical CTA titles like 'Join The 48-Hour Tinybook Challenge' fit on two balanced lines instead of one word per line.",
        "0.7.2 - Reader Bonus page: title and body now wrap at the full text-block width to match the black bars above and below. Previously the title was inset 20pt per side and the body 30pt per side, which left visible padding gaps and forced short titles to wrap one word per line.",
        "0.7.1 - Two fixes: (1) CTA page alignment - previously the title text centered on the absolute page midline while the black bars centered on the text-block midline, causing a ~12pt leftward offset of the title relative to the bars. All centered text (CTA, title page, copyright, dedication, TOC, chapter titles, epigraphs) now centers on the text block, which also corrects the same subtle offset everywhere else. CTA page content now also vertically centers on the page with a 60/40 upper bias so it reads balanced rather than top-heavy. (2) EPUB chapter break - 'Chapter 1' was landing alone on one page with its title on the next because both p.chapter-num and h1 had page-break-before. Fixed by moving the page break to whichever element opens the chapter (chapter-num when numbered, h1.chapter-opener when unnumbered) and adding page-break-after:avoid so the title stays with the number.",
        "0.7.0 - Major feature set: drop cap per-letter tuck-in table (L, T, I, F, J, P, Y no longer leave awkward right-side gaps); justified body text with ragged last line (industry standard); back-of-book reader bonus CTA page (same content as front, appears after final chapter on a fresh recto); docx H1/H2 structure preserved via mammoth convertToHtml with style map (H2 subheadings render as bold, oversized, with breathing room); EPUB 3.0 export for Apple Books, Kobo, Google Play, and KDP (Amazon converts EPUB to Kindle format server-side); JSZip added as dependency for EPUB packaging. Not yet done: full manuscript stress test is for you to run.",
        "0.6.7 - Primary button resting state now uses the deep brand blue (#4F5FD9) instead of mid-lavender. Previous version was too close to the disabled color and only read as active on hover, which felt broken.",
        "0.6.6 - Fixed primary button contrast. Enabled state now uses the stronger brand blue (#8B9BFF base, #4F5FD9 hover) with subtle shadow so the 'ready to proceed' state reads as unambiguously active. Disabled state remains pale lavender at 0.55 opacity. Also added proper native disabled attribute and aria-disabled for accessibility.",
        "0.6.5 - Smart quotes conversion for all user text (titles, body, epigraphs, dedication, copyright). URL on reader bonus page auto-fits inside black bar. TOC no longer truncates titles when page numbers are single digits. Copyright page moved up from 59% to ~35% down. Section pages without chapter numbers now align to the same title baseline as numbered chapters. TOC dot leaders use consistent spacing right-aligned to page number column.",
        "0.6.4 - Reduced dedication font size from 12pt to 10pt for better proportion with body text.",
        "0.6.3 - Fixed reader bonus layout to match RB.pdf example, improved drop cap spacing, and resolved font rendering issues on new pages.",
        "0.6.2 - Added comprehensive error handling and progress indicators for file uploads. Errors now display prominently in the UI instead of only in console.",
        "0.6.1 - Fixed .docx upload by using ArrayBuffer format for mammoth.js processing instead of direct File object.",
        "0.6.0 - Enhanced .docx support with better error detection, improved mammoth.js loading, and fallback guidance for upload issues.",
        "0.5.9 - Improved .docx file processing with better error handling and debugging for upload issues.",
        "0.5.8 - Added .docx file upload support (via mammoth.js) and fixed TOC page number alignment for consistent dot leaders.",
        "0.5.7 - Fixed cramped dedication page layout (wider text area) and renamed text size option to 'Spacious' for better UI clarity.",
        "0.5.6 - Added body text size option. Toggle between Default (10pt/15pt) and Spacious (11pt/16.5pt). Drop cap auto-adjusts to maintain proper 3-line span.",
        "0.5.5 - Added smart chapter title wrapping. Breaks titles at natural points (after prepositions, at punctuation) and avoids orphaning short words like 'The' or 'Of' at line ends.",
        "0.5.4 - Added widow/orphan control. Prevents short paragraph tails (1-2 lines) from appearing alone on new pages.",
        "0.5.3 - Drop cap now sized correctly to span 3 full body lines (~62pt font size instead of fixed 35pt). Drop cap's cap-height now fills the exact 3-line block it should occupy, matching InDesign's 'span N lines' behaviour.",
        "0.5.2 - Fixed drop cap vertical alignment. The cap-height top of the drop cap now aligns with the cap-height top of the first body line, as it should typographically.",
        "0.5.1 - Fixed inconsistent line spacing around drop caps. Drop-cap-adjacent lines now share the same baseline rhythm as the rest of the paragraph.",
        "0.5.0 - Fixed font embedding (v0.4.0 used wrong jsDelivr URL path). Fonts now actually embed in the PDF. Cleaner progress UI - single 'Generating your book...' message instead of per-font spam.",
        "0.4.0 - UI refreshed to match Bookfunnels Mockup tool. Font loading reworked (but URL pattern still broken - fixed in 0.5.0).",
        "0.3.0 - Font embedding: Gelasio (body/titles), EB Garamond (epigraphs/dedication), Inter (headers/page numbers) loaded from Google Fonts and embedded in PDF",
        "0.2.2 - Expanded sample data with 4 test cases (epigraph/no epigraph/named section)",
        "0.2.1 - Fixed TOC dot leaders for long titles, TOC shows chapter titles without prefix",
        "0.2.0 - Two-pass rendering for accurate TOC page numbers, dot leaders, en-dash attribution",
        "0.1.4 - Fixed epigraph parsing (handles attribution on same line)",
        "0.1.3 - Fixed jsPDF CDN version (2.5.1), added version badge",
        "0.1.2 - Inter font across UI, light theme with GCWB branding",
        "0.1.0 - Initial prototype",
      ]
    };

    // Convert mammoth HTML output to a plain-text form the chapter detector understands.
    // Strategy: use a DOM parser and walk the tree, emitting:
    //   h1 -> "TITLE\n\n"                          (detected as chapter heading)
    //   h2 -> "## TITLE\n\n"                       (marked so render can style it)
    //   h3 -> "### TITLE\n\n"                      (sub-subheading)
    //   p  -> "TEXT\n\n"                            (normal paragraph)
    //   br -> "\n"
    //   section / div / article -> recurse into children (so headings buried
    //     inside container elements still surface; mammoth sometimes wraps
    //     them deeper than the top level on real-world manuscripts)
    //   all other tags -> inner text only (strip bold/italic/underline to plain)
    function flattenDocxHtml(html) {
      const parser = new DOMParser();
      const docHtml = parser.parseFromString("<div id='_root'>" + html + "</div>", "text/html");
      const root = docHtml.getElementById("_root");
      if (!root) return "";

      function getText(node) {
        let out = "";
        for (const child of node.childNodes) {
          if (child.nodeType === 3) { // text node
            out += child.textContent;
          } else if (child.nodeType === 1) { // element
            if (child.tagName === "BR") { out += "\n"; }
            else { out += getText(child); }
          }
        }
        return out;
      }

      const parts = [];
      const CONTAINER_TAGS = { SECTION: 1, DIV: 1, ARTICLE: 1, MAIN: 1 };

      function walk(node) {
        for (const child of node.childNodes) {
          if (child.nodeType !== 1) continue;
          const tag = child.tagName;
          if (CONTAINER_TAGS[tag]) {
            walk(child);
            continue;
          }
          const text = getText(child).trim();
          if (!text) continue;
          if (tag === "H1") {
            parts.push(text);
          } else if (tag === "H2") {
            parts.push("## " + text);
          } else if (tag === "H3") {
            parts.push("### " + text);
          } else {
            parts.push(text);
          }
        }
      }

      walk(root);
      return parts.join("\n\n").replace(/\r\n/g, "\n").replace(/\n{3,}/g, "\n\n").trim();
    }

    // Convert straight ASCII quotes and apostrophes to typographic curly equivalents.
    // Runs on every string that will be rendered into the PDF (titles, body, epigraphs,
    // dedication, CTA copy) so that the final output matches professional typesetting.
    // Handles: straight double quotes, straight single quotes/apostrophes, hyphen pairs,
    // triple-dot ellipsis. Leaves existing curly glyphs untouched.
    function smartQuotes(s) {
      if (s == null) return s;
      let t = String(s);
      // Triple-dot ellipsis -> single ellipsis char (nicer tracking than three periods)
      t = t.replace(/\.{3}/g, "\u2026");
      // Double dashes -> en-dash
      t = t.replace(/([^-])--([^-])/g, "$1\u2013$2");
      // Double quotes: opening if at string start, after whitespace, or after opening bracket/paren
      t = t.replace(/(^|[\s\(\[\{\u2014\u2013])"/g, "$1\u201C");
      t = t.replace(/"/g, "\u201D"); // remaining straight doubles become closing
      // Single quotes / apostrophes: opening only after whitespace or at start
      t = t.replace(/(^|[\s\(\[\{\u2014\u2013])'/g, "$1\u2018");
      t = t.replace(/'/g, "\u2019"); // remaining (including mid-word apostrophes) are closing/apostrophe
      return t;
    }

    function smartQuotesDeep(obj) {
      if (obj == null) return obj;
      if (typeof obj === "string") return smartQuotes(obj);
      if (Array.isArray(obj)) return obj.map(smartQuotesDeep);
      if (typeof obj === "object") {
        const out = {};
        for (const k of Object.keys(obj)) out[k] = smartQuotesDeep(obj[k]);
        return out;
      }
      return obj;
    }

    // Normalize line endings from arbitrary sources to the textarea-friendly
    // form (\n for line break, \n\n for paragraph break). Different source
    // applications encode breaks differently and we want consistent state.
    //   \r\n     -> \n      (Windows / Word for Windows)
    //   \r       -> \n      (legacy classic Mac)
    //   \u2028   -> \n      (Unicode line separator — some rich text editors)
    //   \u2029   -> \n\n    (Unicode paragraph separator — Word, Google Docs)
    // Heuristic for sources that put a single \n between paragraphs OR that
    // hard-wrap lines mid-paragraph (Word at narrow width, web-page copy,
    // forum posts, some email clients). Goal: turn a \n-only paste into
    // proper \n\n-separated paragraphs without flattening structured
    // short-line content (poems, lists, addresses, code).
    //
    //   Case A — \n already separates whole paragraphs:
    //     Lines are long (avg > 40 chars) AND most end with sentence-final
    //     punctuation. Promote every \n to \n\n.
    //   Case B — \n breaks are line wraps inside paragraphs:
    //     At least one line ends with sentence punctuation. Walk the lines,
    //     joining wraps with a space; insert \n\n where a sentence-end line
    //     is followed by a capital-letter (or opening-quote) start.
    //   Otherwise: no sentence punctuation anywhere -> short-line structured
    //     content. Leave the input alone.
    // Detect a tab-separated tabular paste (Word table, Excel selection,
    // Google Sheets selection) and convert it to markdown table syntax.
    // Returns the markdown string when conversion is confident; returns
    // null otherwise so the caller can fall back to prose handling.
    //
    // Confidence rules (all must hold):
    //   - At least 2 non-empty lines
    //   - Every non-empty line contains at least one tab
    //   - Every line has the same tab count (= consistent column count)
    //   - No blank lines in the middle (would suggest mixed content)
    //   - At least 2 columns
    //   - Not already in markdown table form (first line starts with "|")
    //
    // Cell content with a literal "|" is escaped as "\|" so it doesn't
    // confuse the markdown table parser. Cells with embedded newlines
    // (rare) fall through this detector and paste as raw text.
    function tryConvertTabularToMarkdown(text) {
      if (!text) return null;
      const lines = String(text).split("\n");
      while (lines.length > 0 && lines[lines.length - 1].trim() === "") lines.pop();
      if (lines.length < 2) return null;
      if (/^\s*\|/.test(lines[0])) return null; // already markdown-style
      let columnCount = -1;
      for (const line of lines) {
        if (line.trim() === "") return null;
        const tabs = (line.match(/\t/g) || []).length;
        if (tabs === 0) return null;
        const cols = tabs + 1;
        if (columnCount === -1) columnCount = cols;
        else if (cols !== columnCount) return null;
      }
      if (columnCount < 2) return null;

      function splitCells(line) {
        return line.split("\t").map(function(c) { return c.replace(/\|/g, "\\|").trim(); });
      }
      const headers = splitCells(lines[0]);
      const out = [];
      out.push("| " + headers.join(" | ") + " |");
      out.push("|" + headers.map(function() { return "----------"; }).join("|") + "|");
      for (let i = 1; i < lines.length; i++) {
        out.push("| " + splitCells(lines[i]).join(" | ") + " |");
      }
      return out.join("\n");
    }

    function normalizeLineEndings(text) {
      let result = String(text == null ? "" : text)
        .replace(/\r\n/g, "\n")
        .replace(/\r/g, "\n")
        .replace(/\u2028/g, "\n")
        .replace(/\u2029/g, "\n\n");

      // Word / Excel / Google Sheets put plain-text tables on the clipboard
      // as tab-separated cells with newline-separated rows. If we can clearly
      // identify that pattern, convert to markdown table syntax so the body
      // parser recognizes it and renders a real table.
      const tableMd = tryConvertTabularToMarkdown(result);
      if (tableMd) return tableMd;

      // Bail out: already has paragraph breaks, or no breaks at all.
      if (result.indexOf("\n\n") !== -1) return result;
      if (result.indexOf("\n") === -1) return result;

      const lines = result.split("\n").filter(function(l) { return l.length > 0; });
      if (lines.length < 2) return result;

      const sentenceEnd = /[.!?][)"”’]?\s*$/;
      let endingInSentence = 0;
      let totalLen = 0;
      for (const l of lines) {
        totalLen += l.length;
        if (sentenceEnd.test(l)) endingInSentence++;
      }
      const avgLen = totalLen / lines.length;
      const sentenceRatio = endingInSentence / lines.length;

      // Case A: Long lines, most end in sentences.
      if (avgLen > 40 && sentenceRatio >= 0.6) {
        return result.replace(/\n/g, "\n\n");
      }

      // Case B: Wrapped lines. Reconstruct paragraphs by joining wraps
      // and breaking at sentence-end-then-capital-start boundaries.
      // Only fires if there is at least one sentence-end signal to anchor
      // paragraph boundaries; pure short-line content (no periods) skips
      // this branch and passes through unchanged.
      if (endingInSentence >= 1) {
        const paragraphs = [];
        let current = lines[0];
        for (let i = 1; i < lines.length; i++) {
          const line = lines[i];
          if (sentenceEnd.test(current) && /^["“'‘]?[A-Z]/.test(line)) {
            paragraphs.push(current);
            current = line;
          } else {
            current = current + " " + line;
          }
        }
        paragraphs.push(current);
        // Only commit the rewrite if it produced more than one paragraph
        // (otherwise the original was either one paragraph already or the
        // reconstruction failed to find any boundary).
        if (paragraphs.length > 1) {
          return paragraphs.join("\n\n");
        }
      }

      return result;
    }

    // Defensive paste handler. Some clipboard sources put line breaks on the
    // clipboard as something other than \n: \r\n from Word, \u2028/
    // from Google Docs, etc. Browsers usually normalize these into a textarea
    // but not always (varies by browser version, by whether the source put
    // plain text or HTML on the clipboard, etc.). We intercept the paste,
    // read the plain-text payload, normalize all break encodings to \n / \n\n,
    // and insert at the current cursor position. We trigger a real input event
    // afterwards so React's onChange fires and state updates correctly.
    function normalizePasteIntoTextarea(e) {
      if (!e || !e.clipboardData) return; // let the default handler run
      const raw = e.clipboardData.getData("text/plain") || e.clipboardData.getData("text");
      if (!raw) return;
      const normalized = normalizeLineEndings(raw);
      e.preventDefault();
      const ta = e.target;
      const start = ta.selectionStart || 0;
      const end = ta.selectionEnd || 0;
      const newValue = ta.value.slice(0, start) + normalized + ta.value.slice(end);
      // Use the prototype setter so React's onChange fires.
      const setter = Object.getOwnPropertyDescriptor(window.HTMLTextAreaElement.prototype, "value").set;
      setter.call(ta, newValue);
      ta.dispatchEvent(new Event("input", { bubbles: true }));
      const pos = start + normalized.length;
      requestAnimationFrame(function() {
        try { ta.setSelectionRange(pos, pos); } catch (e) {}
      });
    }

    // =====================================================================
    // Image helpers. Body images use a markdown-style marker as their own
    // paragraph:  ![alt text](img-id)
    // The image bytes are kept per-chapter in chapter.images[id] = {
    //   dataUrl, filename, naturalWidth, naturalHeight
    // } and rendered as block elements between paragraphs (centered,
    // sized to fit the text column, aspect ratio preserved). Storage is
    // session-only by design — autosave strips chapter.images before
    // writing to localStorage, because base64 PNGs blow the 5-10 MB quota
    // after just a couple of photos.
    // =====================================================================

    // Extract the jsPDF-friendly format string, file extension and MIME type
    // from a data URL like "data:image/png;base64,..."
    function getImageFormatFromDataUrl(dataUrl) {
      const s = String(dataUrl || "");
      if (s.startsWith("data:image/png"))  return { jsPdfFormat: "PNG",  ext: "png",  mime: "image/png"  };
      if (s.startsWith("data:image/jpeg")) return { jsPdfFormat: "JPEG", ext: "jpg",  mime: "image/jpeg" };
      if (s.startsWith("data:image/jpg"))  return { jsPdfFormat: "JPEG", ext: "jpg",  mime: "image/jpeg" };
      if (s.startsWith("data:image/gif"))  return { jsPdfFormat: "GIF",  ext: "gif",  mime: "image/gif"  };
      if (s.startsWith("data:image/webp")) return { jsPdfFormat: "WEBP", ext: "webp", mime: "image/webp" };
      return { jsPdfFormat: "PNG", ext: "png", mime: "image/png" };
    }

    // Decide the rendered width/height for an image, fitting it inside the
    // available text column and a per-image max-height budget while keeping
    // the natural aspect ratio. Falls back gracefully if dimensions are
    // missing (e.g. the image hasn't loaded yet).
    function computeImageRenderSize(naturalWidth, naturalHeight, maxWidth, maxHeight) {
      const nw = Number(naturalWidth) || 0;
      const nh = Number(naturalHeight) || 0;
      if (nw <= 0 || nh <= 0) {
        return { width: maxWidth, height: Math.min(maxHeight, maxWidth * 0.75) };
      }
      const aspect = nw / nh;
      // Fit to width first, never upscale beyond the natural pixel size.
      let w = Math.min(nw, maxWidth);
      let h = w / aspect;
      // If that still overshoots the height budget, fit to height instead.
      if (h > maxHeight) {
        h = maxHeight;
        w = h * aspect;
      }
      return { width: w, height: h };
    }

    // Decode a "data:image/...;base64,..." URL into a Uint8Array of bytes.
    // Used by the EPUB writer to drop each image into OEBPS/images/.
    function dataUrlToBytes(dataUrl) {
      const s = String(dataUrl || "");
      const comma = s.indexOf(",");
      const base64 = comma >= 0 ? s.slice(comma + 1) : s;
      const binary = atob(base64);
      const out = new Uint8Array(binary.length);
      for (let i = 0; i < binary.length; i++) out[i] = binary.charCodeAt(i);
      return out;
    }

    // Read an uploaded File / Blob and resolve with its data URL.
    function readFileAsDataUrl(file) {
      return new Promise(function(resolve, reject) {
        const reader = new FileReader();
        reader.onload = function() { resolve(reader.result); };
        reader.onerror = function() { reject(reader.error || new Error("FileReader failed")); };
        reader.readAsDataURL(file);
      });
    }

    // Probe the natural pixel dimensions of an image data URL by loading it
    // into an off-DOM Image element. Resolves with {width, height} or zeros
    // if the image fails to decode.
    function getImageNaturalSize(dataUrl) {
      return new Promise(function(resolve) {
        const img = new window.Image();
        img.onload = function() { resolve({ width: img.naturalWidth, height: img.naturalHeight }); };
        img.onerror = function() { resolve({ width: 0, height: 0 }); };
        img.src = dataUrl;
      });
    }

    // Build the visible body marker for an inserted image. Format:
    //   📷 filename — img-id
    // Reads in English (camera icon, the filename, an em-dash, the id) so it
    // looks like a designed placeholder rather than the code-y ![alt](id)
    // markdown the v0.10.x series used. Backward-compatibility for the older
    // markdown-style marker lives in parseImageMarker() below.
    function formatImageMarker(filenameOrAlt, imageId) {
      const label = String(filenameOrAlt || "image").trim() || "image";
      return "📷 " + label + " — " + imageId;
    }

    // Try to recognize either marker form a paragraph might be:
    //   - new (v0.10.3+): 📷 filename — img-xxxx
    //   - old (v0.10.x ): ![alt](img-xxxx)
    // Returns { imageId, alt } or null. alt falls back to the filename / alt
    // text the marker originally carried, used as the <img alt> in the EPUB.
    function parseImageMarker(paragraph) {
      const p = String(paragraph || "").trim();
      // New form (em-dash separator is U+2014). The filename is non-greedy
      // so a filename containing the em-dash still parses cleanly because
      // the id at the end is anchored to $.
      let m = p.match(/^📷\s+(.+?)\s+—\s+(img-[a-zA-Z0-9]+)$/);
      if (m) return { alt: m[1].replace(/\.[^.]+$/, ""), imageId: m[2] };
      // Old form
      m = p.match(/^!\[([^\]]*)\]\(([^)]+)\)$/);
      if (m) return { alt: m[1], imageId: m[2] };
      return null;
    }

    // =====================================================================
    // Markdown table support.
    //
    // Body paragraphs whose lines all start and end with "|" and that
    // include a separator row ( |---|---| optionally with :--: alignment
    // markers ) are recognized as tables. Renders via jspdf-autotable
    // in the PDF and as native <table> in the EPUB.
    //
    // Standard markdown syntax:
    //   | Col A | Col B | Col C |
    //   |-------|-------|-------|
    //   | a     | b     | c     |
    //   | d     | e     | f     |
    // Alignment markers: |:---| left, |---:| right, |:--:| center.
    // =====================================================================

    // Cheap detection — only checks structural signals, doesn't parse the
    // whole thing. Used by the paragraph splitter to decide whether to
    // collapse internal newlines (no for tables — the row structure has
    // to survive parsing).
    function looksLikeMarkdownTable(text) {
      const lines = String(text || "").split("\n").map(function(l) { return l.trim(); }).filter(function(l) { return l.length > 0; });
      if (lines.length < 2) return false;
      if (!/^\|.*\|$/.test(lines[0])) return false;
      // The second non-empty line must be the separator row
      return /^\|\s*:?-{2,}:?\s*(\|\s*:?-{2,}:?\s*)+\|$/.test(lines[1]);
    }

    // Parse a markdown table text block into { headers, rows, alignments }
    // or null if the structure is malformed (caller should fall back to
    // rendering the paragraph as prose).
    function parseMarkdownTable(text) {
      const lines = String(text || "").split("\n").map(function(l) { return l.trim(); }).filter(function(l) { return l.length > 0; });
      if (lines.length < 2) return null;
      function splitRow(line) {
        // Strip the outer pipes, split on the inner ones, trim each cell.
        return line.replace(/^\|/, "").replace(/\|$/, "").split("|").map(function(c) { return c.trim(); });
      }
      if (!/^\|.*\|$/.test(lines[0])) return null;
      if (!/^\|\s*:?-{2,}:?\s*(\|\s*:?-{2,}:?\s*)+\|$/.test(lines[1])) return null;
      const headers = splitRow(lines[0]);
      const sepCells = splitRow(lines[1]);
      const alignments = sepCells.map(function(c) {
        const left = c.startsWith(":");
        const right = c.endsWith(":");
        if (left && right) return "center";
        if (right) return "right";
        return "left";
      });
      const rows = [];
      for (let i = 2; i < lines.length; i++) {
        if (!/^\|.*\|$/.test(lines[i])) continue;
        const cells = splitRow(lines[i]);
        // Pad / truncate to match header count
        while (cells.length < headers.length) cells.push("");
        if (cells.length > headers.length) cells.length = headers.length;
        rows.push(cells);
      }
      return { headers: headers, rows: rows, alignments: alignments };
    }

    // Build the jspdf-autotable options object for a parsed markdown table,
    // anchored to our text column and styled to match the rest of the book.
    // Used by both the pass-1 dry-run (measure on a temp doc) and pass 2
    // (render on the real doc) so the page-count and the visual output
    // agree exactly.
    function buildAutoTableOptions(table, textX, textW, startY, bodyTopYValue) {
      const tableMargin = {
        left: textX,
        right: SPEC.pageW - (textX + textW),
        top: bodyTopYValue,
      };
      const columnStyles = {};
      (table.alignments || []).forEach(function(a, i) {
        columnStyles[i] = { halign: a };
      });
      // Trade-book table typography (per Bringhurst): table text sits 1-2pt
      // smaller than body type so the denser data has the same visual
      // "weight per unit area" as surrounding prose. We use 90% of body.
      // Horizontal padding is larger than vertical so cells look airy.
      // Header row is bolded, light-gray filled, and slightly more padded
      // than body cells to read as a header.
      const tableFontSize = SPEC.bodySize * 0.9;
      return {
        startY: startY,
        head: [table.headers],
        body: table.rows,
        margin: tableMargin,
        tableWidth: textW,
        columnStyles: columnStyles,
        styles: {
          font: "helvetica", // overridden in pass 2 once fonts are loaded
          fontSize: tableFontSize,
          cellPadding: { top: 5, right: 7, bottom: 5, left: 7 },
          textColor: [30, 30, 30],
          lineColor: [210, 210, 210],
          lineWidth: 0.25,
          overflow: "linebreak",
          valign: "top",
        },
        headStyles: {
          fillColor: [240, 240, 240],
          textColor: [30, 30, 30],
          fontStyle: "bold",
          cellPadding: { top: 6, right: 7, bottom: 6, left: 7 },
          lineColor: [140, 140, 140],
          lineWidth: 0.5,
        },
        alternateRowStyles: { fillColor: [250, 250, 250] },
      };
    }

    // Per-letter drop cap tuck-in. Expressed as a fraction of the letter's own rendered
    // width. ALL VALUES ARE ZERO. The previous tuck table tried to pull body text into
    // letters with empty space on the right (L, T, F, P, Y, etc.) but this caused
    // visible overlap on lines 2-3 where those letters' shape changes — e.g. an L's
    // foot is full-width at the bottom, so body text alongside the foot overlapped
    // the ink. Professional trade-book typography just clears the letter's full
    // bounding box and adds a uniform padding gap, which is what we do now via the
    // fixed +5pt padding in the chapter render path. The table is kept as a no-op
    // so the dropCapTuckedWidth() helper still exists in case we want to add a
    // future per-line tuck (different tuck values per line position).
    const DROP_CAP_TUCK = {
      A: 0.00, B: 0.00, C: 0.00, D: 0.00, E: 0.00,
      F: 0.00, G: 0.00, H: 0.00, I: 0.00, J: 0.00,
      K: 0.00, L: 0.00, M: 0.00, N: 0.00, O: 0.00,
      P: 0.00, Q: 0.00, R: 0.00, S: 0.00, T: 0.00,
      U: 0.00, V: 0.00, W: 0.00, X: 0.00, Y: 0.00,
      Z: 0.00,
    };

    function dropCapTuckedWidth(rawWidth, letter) {
      const frac = DROP_CAP_TUCK[letter] != null ? DROP_CAP_TUCK[letter] : 0;
      return rawWidth * (1 - frac);
    }

    // pickDropCap: find the first alphabetic character in a paragraph and return
    // it (uppercased) along with the rest of the paragraph. Paragraphs that open
    // with a smart quote, em-dash, numeral or symbol need this so the drop cap
    // glyph is a real letter instead of a punctuation mark or numeral.
    // Returns null if there is no alphabetic character, so the caller can fall
    // back to rendering the paragraph without a drop cap.
    function pickDropCap(para) {
      if (!para) return null;
      const m = para.match(/[A-Za-z]/);
      if (!m) return null;
      const idx = para.indexOf(m[0]);
      return { letter: m[0].toUpperCase(), rest: para.slice(idx + 1) };
    }

    // Back-matter detection. Returns true for chapter titles that are
    // typically excluded from a book's table of contents in trade publishing
    // (about the author, acknowledgments, bibliography, etc.). Used to set
    // a sensible default for chapter.includeInToc; the user can still toggle
    // any chapter manually in the Step 3 UI.
    const BACK_MATTER_TITLES = [
      "about the author", "about the authors",
      "acknowledgments", "acknowledgements",
      "bibliography", "references", "further reading",
      "glossary", "index", "notes", "endnotes",
      "colophon", "appendix",
    ];
    function isLikelyBackMatter(title) {
      if (!title) return false;
      const lower = String(title).toLowerCase().trim();
      for (const bm of BACK_MATTER_TITLES) {
        if (lower === bm) return true;
        if (lower.startsWith(bm + ":")) return true;
        if (lower.startsWith(bm + " ")) return true;
        // Appendix often appears as "Appendix A: Foo" — match "appendix" prefix
        if (bm === "appendix" && lower.startsWith("appendix")) return true;
      }
      return false;
    }

    function detectChapters(text) {
      const lines = text.split(/\n/);
      const chapters = [];
      let currentChapter = null;
      let buffer = [];
      const chapterPatterns = [
        /^chapter\s+(\d+|[ivxlc]+)\s*$/i,
        /^chapter\s+(\d+|[ivxlc]+)\s*[:\-\u2013\u2014]\s*(.+)$/i,
        /^(\d+)\.\s+(.+)$/,
        /^part\s+(\d+|[ivxlc]+)/i,
      ];
      const sectionPatterns = [
        /^(foreword|preface|introduction|prologue|epilogue|afterword|acknowledgments|acknowledgements|about the author|your next steps|making it happen|conclusion|who should read this book\??|my promise to you)$/i,
      ];

      for (let i = 0; i < lines.length; i++) {
        const line = lines[i].trim();
        let matched = false;
        let chapterNum = "";
        let chapterTitle = "";

        for (const pat of chapterPatterns) {
          const m = line.match(pat);
          if (m) { chapterNum = "Chapter " + m[1]; chapterTitle = m[2] || ""; matched = true; break; }
        }
        if (!matched) {
          for (const pat of sectionPatterns) {
            if (pat.test(line)) { chapterNum = ""; chapterTitle = line; matched = true; break; }
          }
        }

        if (matched) {
          if (currentChapter) { currentChapter.body = buffer.join("\n").trim(); chapters.push(currentChapter); }
          if (chapterNum && !chapterTitle) {
            for (let j = i + 1; j < Math.min(i + 4, lines.length); j++) {
              const nextLine = lines[j].trim();
              if (nextLine && !chapterPatterns.some(function(p) { return p.test(nextLine); })) { chapterTitle = nextLine; i = j; break; }
            }
          }
          currentChapter = { id: Math.random().toString(36).slice(2), num: chapterNum, title: chapterTitle, epigraph: "", epigraphAttribution: "", body: "", includeInToc: !isLikelyBackMatter(chapterTitle), images: {} };
          buffer = [];
          
          // Look ahead for epigraph (quoted text after chapter heading)
          let checkLines = [];
          for (let j = i + 1; j < Math.min(i + 8, lines.length); j++) {
            const nl = lines[j].trim();
            if (nl) checkLines.push({ line: nl, idx: j });
          }
          if (checkLines.length > 0) {
            const firstContent = checkLines[0].line;
            if (firstContent.startsWith('"') || firstContent.startsWith("\u201C") || firstContent.startsWith("'")) {
              // Check if attribution is on the same line: "Quote text" - Author Name
              const sameLineMatch = firstContent.match(/^["'\u201C](.+?)["'\u201D]\s*[-\u2014\u2013]\s*(.+)$/);
              if (sameLineMatch) {
                // Attribution on same line
                currentChapter.epigraph = sameLineMatch[1];
                currentChapter.epigraphAttribution = sameLineMatch[2];
                i = checkLines[0].idx;
              } else {
                // Multi-line epigraph: collect lines until we find attribution or a non-quote line
                let epLines = [];
                for (const cl of checkLines) {
                  // Check for standalone attribution line
                  if (cl.line.startsWith("- ") || cl.line.startsWith("\u2014") || cl.line.startsWith("\u2013")) {
                    currentChapter.epigraphAttribution = cl.line.replace(/^[-\u2014\u2013]\s*/, "");
                    i = cl.idx;
                    break;
                  }
                  // Check if this line ends with closing quote + attribution
                  const endMatch = cl.line.match(/["'\u201D]\s*[-\u2014\u2013]\s*(.+)$/);
                  if (endMatch) {
                    epLines.push(cl.line.replace(/\s*[-\u2014\u2013]\s*.+$/, ""));
                    currentChapter.epigraphAttribution = endMatch[1];
                    i = cl.idx;
                    break;
                  }
                  // If line doesn't look like part of a quote (no quote marks, not short), stop
                  if (epLines.length > 0 && !cl.line.match(/["'\u201C\u201D]/) && cl.line.length > 80) {
                    break;
                  }
                  epLines.push(cl.line);
                  i = cl.idx;
                }
                if (epLines.length > 0) {
                  currentChapter.epigraph = epLines.join(" ").replace(/["\u201C\u201D']/g, "").trim();
                }
              }
            }
          }
          continue;
        }
        buffer.push(lines[i]);
      }
      if (currentChapter) { currentChapter.body = buffer.join("\n").trim(); chapters.push(currentChapter); }
      return chapters;
    }

    // =====================================================================
    // Inline formatting helpers.
    // Body text supports a small markdown-lite syntax that the toolbar in
    // Step 3 injects into the textarea:
    //   **bold**       -> bold run
    //   *italic*       -> italic run
    //   __underline__  -> underline run (thin line under the run)
    //   ## Heading     -> H2 at start of paragraph (one size up, bold)
    //   ### Subhead    -> H3 at start of paragraph (smaller, bold, tighter)
    //
    // containsFormatting() gates the run-based render path so paragraphs with
    // no markers keep the existing splitTextToSize / justified rendering. That
    // way an unformatted chapter renders byte-identically to the prior version.
    // =====================================================================

    function parseInlineRuns(text) {
      const runs = [];
      let buf = "";
      const flushBuf = function() { if (buf.length > 0) { runs.push({ text: buf, style: "normal" }); buf = ""; } };
      let i = 0;
      while (i < text.length) {
        const c = text[i], n = text[i + 1];
        if (c === "*" && n === "*") {
          const end = text.indexOf("**", i + 2);
          if (end !== -1) { flushBuf(); runs.push({ text: text.slice(i + 2, end), style: "bold" }); i = end + 2; continue; }
        }
        if (c === "_" && n === "_") {
          const end = text.indexOf("__", i + 2);
          if (end !== -1) { flushBuf(); runs.push({ text: text.slice(i + 2, end), style: "underline" }); i = end + 2; continue; }
        }
        if (c === "*") {
          const end = text.indexOf("*", i + 1);
          if (end !== -1 && text[end + 1] !== "*") { flushBuf(); runs.push({ text: text.slice(i + 1, end), style: "italic" }); i = end + 1; continue; }
        }
        buf += c; i++;
      }
      flushBuf();
      return runs.length > 0 ? runs : [{ text: "", style: "normal" }];
    }

    function plainTextFromRuns(runs) {
      return runs.map(function(r) { return r.text; }).join("");
    }

    function pdfStyleFor(s) { return s === "bold" ? "bold" : s === "italic" ? "italic" : "normal"; }

    // Cheap gate: a paragraph has formatting iff parseInlineRuns produces
    // at least one non-normal run. If false, use the existing render path
    // (which preserves justified body text). If true, use the run path.
    function containsFormatting(text) {
      const runs = parseInlineRuns(text);
      return runs.some(function(r) { return r.style !== "normal"; });
    }

    // Lay out runs into wrapped lines. `widths` can be a single number
    // (uniform width) or an array (different width per line index, last
    // entry repeats). The array form is used by the drop cap path: first
    // 3 line widths are narrow (textW - dropCapWidth), then full width.
    function layoutRunsMixed(doc, runs, widths, fontSize, fontFamily) {
      const tokens = [];
      for (const run of runs) {
        const parts = run.text.split(/(\s+)/);
        for (const p of parts) { if (p.length > 0) tokens.push({ text: p, style: run.style }); }
      }
      const getW = function(i) { return typeof widths === "number" ? widths : (i < widths.length ? widths[i] : widths[widths.length - 1]); };
      const lines = [[]];
      let curW = 0, lineIdx = 0;
      for (const tok of tokens) {
        doc.setFont(fontFamily, pdfStyleFor(tok.style)); doc.setFontSize(fontSize);
        const w = doc.getTextWidth(tok.text);
        const isSpace = /^\s+$/.test(tok.text);
        const maxW = getW(lineIdx);
        if (isSpace) {
          if (lines[lineIdx].length === 0) continue;
          if (curW + w > maxW) { lines.push([]); lineIdx++; curW = 0; continue; }
          lines[lineIdx].push({ text: tok.text, style: tok.style, width: w }); curW += w;
        } else {
          if (curW + w > maxW && lines[lineIdx].length > 0) {
            while (lines[lineIdx].length > 0 && /^\s+$/.test(lines[lineIdx][lines[lineIdx].length - 1].text)) {
              curW -= lines[lineIdx].pop().width;
            }
            lines.push([]); lineIdx++; curW = 0;
          }
          lines[lineIdx].push({ text: tok.text, style: tok.style, width: w }); curW += w;
        }
      }
      if (lines.length > 1 && lines[lines.length - 1].length === 0) lines.pop();
      return lines;
    }

    // Render one wrapped line. Switches font per segment; for underline
    // segments draws a thin line below the segment (jsPDF has no native
    // underline style).
    function drawRunLine(doc, segments, x, y, fontSize, fontFamily) {
      let cx = x;
      for (const seg of segments) {
        doc.setFont(fontFamily, pdfStyleFor(seg.style)); doc.setFontSize(fontSize);
        doc.text(seg.text, cx, y);
        if (seg.style === "underline") {
          doc.setLineWidth(0.4); doc.setDrawColor(30);
          doc.line(cx, y + 1.5, cx + seg.width, y + 1.5);
        }
        cx += seg.width;
      }
    }

    // Detect a "scene break" / section break paragraph. Trade-book typography
    // uses three centered asterisks (or similar ornament) on their own line to
    // mark a narrative transition inside a chapter. Naïvely letting this fall
    // through to the inline-run parser would interpret "* * *" as italic
    // markers and produce garbage. So we detect it here BEFORE classification
    // continues into the markdown-lite parser.
    //
    // Accepts any line that is made up entirely of ornament characters
    // optionally separated by whitespace, with at least 3 ornament characters
    // total. Recognises:
    //   "* * *", "***", "---", "# # #", "~ ~ ~", "• • •"
    //   and the unicode asterisk variants that Word / InDesign / Pages
    //   sometimes substitute: ∗ ⁎ ⋆ ✱ ✦ ❋ ※ ⁂ ‧
    // Also accepts a SINGLE-character variant — many manuscripts use just
    // "*" on its own line to mark a scene break — so long as the whole line
    // (after trim) is exactly one ornament character.
    const SCENE_BREAK_CHARS = "*#~\\-—–•∗⁎⋆✱✦❋※⁂‧";
    function isSectionBreak(p) {
      const t = (p || "").trim();
      if (!t) return false;
      const re = new RegExp("^[" + SCENE_BREAK_CHARS + "]+(?:\\s+[" + SCENE_BREAK_CHARS + "]+)*$");
      if (!re.test(t)) return false;
      // Either a single ornament character on its own line (e.g. "*", "•")
      // or 3+ ornament chars total (e.g. "* * *", "***", "---").
      const chars = t.replace(/\s+/g, "");
      if (chars.length === 1) return true;
      return chars.length >= 3;
    }

    // Split a chapter body into paragraphs, with two extras over the naïve
    // split-on-blank-lines:
    //   1. Markdown tables are preserved as a single paragraph (the row
    //      newlines stay intact, the parser needs them).
    //   2. Any line that is a scene-break ornament is PROMOTED to its own
    //      paragraph, even if it has no blank lines around it. This handles
    //      pastes from Word / Docs / Pages where the source treats "* * *"
    //      as a normal soft-wrap inside surrounding prose, which would
    //      otherwise merge the asterisks into the body and trip the
    //      inline-run italic parser.
    function splitChapterBody(body) {
      const out = [];
      const chunks = String(body || "").split(/\n\s*\n/);
      for (const chunk of chunks) {
        const t = chunk.trim();
        if (!t) continue;
        if (looksLikeMarkdownTable(t)) { out.push(t); continue; }
        const lines = t.split("\n");
        let buf = [];
        function flush() {
          if (buf.length === 0) return;
          const joined = buf.join(" ").replace(/\s+/g, " ").trim();
          if (joined) out.push(joined);
          buf = [];
        }
        for (const line of lines) {
          if (isSectionBreak(line)) {
            flush();
            out.push(line.trim());
          } else {
            buf.push(line);
          }
        }
        flush();
      }
      return out;
    }

    function classifyParagraph(p) {
      // Scene break first — must precede any markdown-marker detection so
      // "* * *" is never mistaken for italic markers downstream.
      if (isSectionBreak(p)) return { type: "scenebreak" };
      if (/^###\s+/.test(p)) return { type: "h3", text: p.replace(/^###\s+/, "") };
      if (/^##\s+/.test(p)) return { type: "h2", text: p.replace(/^##\s+/, "") };
      // Markdown table block. Detected BEFORE images so a stray pipe in
      // an image marker can't fool the table detector.
      if (looksLikeMarkdownTable(p)) {
        const table = parseMarkdownTable(p);
        if (table) return { type: "table", table: table };
      }
      // Image marker as a whole paragraph. Recognized in either the new
      // (📷 filename — img-id) or legacy (![alt](img-id)) form via the
      // parseImageMarker() helper. Only matches when the marker occupies
      // the entire paragraph after whitespace collapse, so accidental
      // inline markers in prose don't turn into floating images.
      const img = parseImageMarker(p);
      if (img) return { type: "image", alt: img.alt, imageId: img.imageId };
      return { type: "body", text: p };
    }

    // =====================================================================
    // Body text justification with English hyphenation.
    //
    // Trade-book typography fully justifies body text AND breaks long words
    // with hyphens at line ends. jsPDF's align:"justify" stretches spaces
    // only, producing visible word-space "rivers" in narrow columns. This
    // implements a custom line-breaker that hyphenates and a custom justify
    // renderer that draws "-" at hyphenated line endings.
    // =====================================================================

    // English hyphenation. Returns sorted array of break-point positions
    // inside the word. Prefers the real Knuth-Liang algorithm via the Hypher
    // library (loaded from CDN in the <head>) and falls back to a rule-based
    // hyphenator if the CDN scripts didn't load (offline, blocked, etc.).
    //
    // Hypher returns the word split into chunks (["phi", "los", "o", "phy"]);
    // we convert that to break-point positions ([3, 6, 7]) so the line
    // breaker can pick the longest hyphenated prefix that still fits.
    let _hypherInstance = null;
    let _hypherInitTried = false;
    function _getHypher() {
      if (_hypherInitTried) return _hypherInstance;
      _hypherInitTried = true;
      if (typeof window === "undefined") return null;
      const Ctor = window.__tbf_Hypher;
      const patterns = window.__tbf_HyphenPatterns;
      if (!Ctor || !patterns) return null;
      try {
        _hypherInstance = new Ctor(patterns);
      } catch (e) {
        console.warn("Hypher init failed, using rule-based fallback:", e);
        _hypherInstance = null;
      }
      return _hypherInstance;
    }

    function hyphenateWord(word) {
      if (word.length < 7) return [];
      // Only hyphenate plain ASCII letter words. Skip URLs, contractions
      // ("self-doubt"), numbers ("20th"), etc.
      if (!/^[a-zA-Z]+$/.test(word)) return [];

      const hypher = _getHypher();
      if (hypher) {
        try {
          const chunks = hypher.hyphenate(word);
          if (chunks.length <= 1) return [];
          const positions = [];
          let pos = 0;
          for (let i = 0; i < chunks.length - 1; i++) {
            pos += chunks[i].length;
            positions.push(pos);
          }
          // Defensive: Hypher already respects leftmin/rightmin from the
          // patterns file (2/3 for en-us), but enforce the same minimums
          // again so a future pattern-file swap can't surprise us.
          return positions.filter(function(p) { return p >= 2 && word.length - p >= 3; });
        } catch (e) {
          // Fall through to rule-based
        }
      }

      return _ruleBasedHyphenateWord(word);
    }

    // Rule-based fallback. Combines prefix and suffix matches with V|CV /
    // VC|CV consonant-cluster patterns. ~75% accuracy vs Knuth-Liang —
    // good enough to eliminate most word-space rivers but produces some
    // sub-optimal breaks ("runn-ing" vs Hypher's "run-ning") on words with
    // double consonants and other patterns the rules don't cover.
    function _ruleBasedHyphenateWord(word) {
      const lower = word.toLowerCase();
      const breaks = new Set();
      const vowels = /[aeiouy]/;

      const prefixes = [
        "un", "re", "in", "im", "dis", "mis", "pre", "pro",
        "non", "anti", "auto", "fore", "hyper", "inter",
        "macro", "micro", "mono", "multi", "over", "post",
        "semi", "sub", "super", "trans", "ultra", "under",
      ];
      for (const pre of prefixes) {
        if (lower.startsWith(pre) && lower.length - pre.length >= 3) {
          breaks.add(pre.length);
        }
      }

      const suffixes = [
        "able", "ible", "ation", "ition", "ment", "ness",
        "ity", "ous", "ful", "less", "ing", "tion", "sion",
        "ly", "ish", "ize", "ise", "ed", "er", "or", "al",
        "ic", "ive",
      ];
      for (const suf of suffixes) {
        if (lower.endsWith(suf) && lower.length - suf.length >= 3) {
          breaks.add(lower.length - suf.length);
        }
      }

      for (let i = 2; i <= lower.length - 3; i++) {
        const prev = lower[i - 1];
        const cur = lower[i];
        if (!vowels.test(prev) || vowels.test(cur)) continue;
        let j = i;
        while (j < lower.length && !vowels.test(lower[j])) j++;
        if (j === lower.length) continue;
        if (j - i === 1) {
          breaks.add(i);
        } else {
          breaks.add(i + 1);
        }
      }

      return Array.from(breaks)
        .filter(function(i) { return i >= 2 && lower.length - i >= 3; })
        .sort(function(a, b) { return a - b; });
    }

    // Break a paragraph into lines for justified rendering. `widths` can be
    // a single number (uniform max width) or an array (per-line widths, last
    // entry repeats) — the array form is used for the drop cap, where the
    // first 3 lines are narrow and lines 4+ are full width.
    //
    // Each returned line is { tokens, lineWidth, hyphenateEnd } where:
    //   - tokens is an array of { text, width, isSpace }
    //   - hyphenateEnd is true if the last word was split via hyphenation
    //     and a "-" should be drawn at the line end
    //   - lineWidth is the sum of token widths, used to compute the
    //     per-space stretch factor for justification
    function breakIntoJustifiedLines(doc, text, widths, fontSize, fontFamily) {
      doc.setFontSize(fontSize); doc.setFont(fontFamily, "normal");
      const spaceWidth = doc.getTextWidth(" ");
      const hyphenWidth = doc.getTextWidth("-");

      const getMaxWidth = function(lineIdx) {
        return typeof widths === "number"
          ? widths
          : (lineIdx < widths.length ? widths[lineIdx] : widths[widths.length - 1]);
      };

      // Tokenize paragraph into runs of spaces and words.
      const tokens = [];
      const parts = text.split(/(\s+)/);
      for (const p of parts) {
        if (p.length === 0) continue;
        if (/^\s+$/.test(p)) {
          tokens.push({ text: " ", width: spaceWidth, isSpace: true });
        } else {
          tokens.push({ text: p, width: doc.getTextWidth(p), isSpace: false });
        }
      }

      const lines = [];
      let i = 0;
      while (i < tokens.length) {
        // Skip whitespace at start of new line.
        while (i < tokens.length && tokens[i].isSpace) i++;
        if (i >= tokens.length) break;

        const maxWidth = getMaxWidth(lines.length);
        const lineTokens = [];
        let lineWidth = 0;

        while (i < tokens.length) {
          const tok = tokens[i];
          if (lineWidth + tok.width <= maxWidth) {
            lineTokens.push(tok);
            lineWidth += tok.width;
            i++;
          } else {
            break;
          }
        }

        // Strip trailing space — never drawn at a line end.
        while (lineTokens.length > 0 && lineTokens[lineTokens.length - 1].isSpace) {
          lineWidth -= lineTokens[lineTokens.length - 1].width;
          lineTokens.pop();
        }

        // Try hyphenation: can we pull the leading part of the next word
        // onto this line via a hyphenated break?
        let hyphenateEnd = false;
        if (i < tokens.length && !tokens[i].isSpace) {
          const nextWord = tokens[i].text;
          const breaks = hyphenateWord(nextWord);
          if (breaks.length > 0) {
            const needsSpace = lineTokens.length > 0;
            let bestBp = null;
            let bestPrefixWidth = 0;
            for (const bp of breaks) {
              const prefix = nextWord.slice(0, bp);
              const prefixWidth = doc.getTextWidth(prefix);
              const needed = (needsSpace ? spaceWidth : 0) + prefixWidth + hyphenWidth;
              if (lineWidth + needed <= maxWidth) {
                bestBp = bp;
                bestPrefixWidth = prefixWidth;
              }
            }
            if (bestBp !== null) {
              if (needsSpace) {
                lineTokens.push({ text: " ", width: spaceWidth, isSpace: true });
                lineWidth += spaceWidth;
              }
              const prefixText = nextWord.slice(0, bestBp);
              lineTokens.push({ text: prefixText, width: bestPrefixWidth, isSpace: false });
              lineWidth += bestPrefixWidth;
              hyphenateEnd = true;
              // Replace current word token with the suffix for the next line.
              const suffix = nextWord.slice(bestBp);
              tokens[i] = { text: suffix, width: doc.getTextWidth(suffix), isSpace: false };
            }
          }
        }

        if (lineTokens.length > 0) {
          lines.push({ tokens: lineTokens, lineWidth: lineWidth, hyphenateEnd: hyphenateEnd });
        } else if (i < tokens.length) {
          // Single word wider than the column — overflow it on its own line
          // (rare; jsPDF's splitTextToSize handles this the same way).
          lines.push({ tokens: [tokens[i]], lineWidth: tokens[i].width, hyphenateEnd: false });
          i++;
        }
      }

      return lines;
    }

    // Render one justified line. Stretches inter-word spaces so the line
    // fills maxWidth. The last line of a paragraph stays left-aligned
    // (ragged-right), which is standard book typography — the last line of
    // a paragraph is usually short, and stretching it produces awkward gaps.
    // Draws a "-" at the line end if the line broke a word via hyphenation.
    function drawJustifiedLine(doc, line, x, y, maxWidth, isLastLine) {
      const tokens = line.tokens;
      let spaceCount = 0;
      for (const tok of tokens) if (tok.isSpace) spaceCount++;

      let extraPerSpace = 0;
      if (!isLastLine && spaceCount > 0) {
        const slack = maxWidth - line.lineWidth;
        if (slack > 0) extraPerSpace = slack / spaceCount;
      }

      let cx = x;
      for (const tok of tokens) {
        if (tok.isSpace) {
          cx += tok.width + extraPerSpace;
        } else {
          doc.text(tok.text, cx, y);
          cx += tok.width;
        }
      }

      if (line.hyphenateEnd) {
        doc.text("-", cx, y);
      }
    }

    // Font loading utility
    // Uses Fontsource's partnered jsDelivr CDN. URL pattern:
    //   https://cdn.jsdelivr.net/fontsource/fonts/{font}@{version}/{subset}-{weight}-{style}.ttf
    // We explicitly request TTF (not the default woff2) because jsPDF needs TTF for VFS embedding.
    async function loadFontsForPDF(doc) {
      const CDN = "https://cdn.jsdelivr.net/fontsource/fonts";
      const VERSION = "5"; // pin to v5 for stable cache; "latest" also works

      const fonts = [
        { family: "Gelasio", slug: "gelasio", weight: "400", style: "normal", jsPDFStyle: "normal" },
        { family: "Gelasio", slug: "gelasio", weight: "700", style: "normal", jsPDFStyle: "bold" },
        { family: "Gelasio", slug: "gelasio", weight: "400", style: "italic", jsPDFStyle: "italic" },
        { family: "EB Garamond", slug: "eb-garamond", weight: "400", style: "italic", jsPDFStyle: "italic" },
        { family: "Inter", slug: "inter", weight: "400", style: "normal", jsPDFStyle: "normal" },
      ];

      let loadedCount = 0;

      for (const font of fonts) {
        try {
          const url = CDN + "/" + font.slug + "@" + VERSION + "/latin-" + font.weight + "-" + font.style + ".ttf";
          const response = await fetch(url);

          if (!response.ok) {
            console.warn("Font fetch failed (HTTP " + response.status + "): " + url);
            continue;
          }

          // Validate we got a real TTF (starts with 0x00 0x01 0x00 0x00 or 'OTTO' for OTF)
          const buffer = await response.arrayBuffer();
          const binary = new Uint8Array(buffer);
          if (binary.length < 4) {
            console.warn("Font file too small: " + url);
            continue;
          }
          const header = binary[0] + "-" + binary[1] + "-" + binary[2] + "-" + binary[3];
          const validTTF = (binary[0] === 0x00 && binary[1] === 0x01 && binary[2] === 0x00 && binary[3] === 0x00);
          const validOTF = (binary[0] === 0x4F && binary[1] === 0x54 && binary[2] === 0x54 && binary[3] === 0x4F);
          if (!validTTF && !validOTF) {
            console.warn("Font file not a valid TTF/OTF (header " + header + "): " + url);
            continue;
          }

          // Convert to binary string for jsPDF's VFS (chunk to avoid stack overflow)
          let binaryStr = "";
          const CHUNK = 0x8000;
          for (let i = 0; i < binary.length; i += CHUNK) {
            binaryStr += String.fromCharCode.apply(null, binary.subarray(i, i + CHUNK));
          }

          const vfsName = font.family.replace(/\s+/g, "") + "-" + font.jsPDFStyle + ".ttf";
          doc.addFileToVFS(vfsName, binaryStr);
          doc.addFont(vfsName, font.family, font.jsPDFStyle);
          loadedCount++;
        } catch (e) {
          console.warn("Failed to load font " + font.family + " " + font.jsPDFStyle + ":", e);
        }
      }

      console.log("Font embedding: " + loadedCount + "/" + fonts.length + " variants loaded");
      return loadedCount > 0;
    }

    async function generatePDF(bookData, chapters, onProgress, textSizePreset = 'default') {
      onProgress("Preparing your book...");
