      // Insert a block image marker at the current cursor position. Asks
      // the parent (ChapterCard) to stash the bytes and assign an id.
      const handleImagePick = function(file) {
        if (!file || !onImageUpload) return;
        setImageBusy(true);
        Promise.resolve(onImageUpload(file)).then(function(meta) {
          if (!meta || !meta.id) return;
          const label = meta.filename || meta.alt || "image";
          insertBlockAtCursor(formatImageMarker(label, meta.id));
        }).catch(function(e) {
          console.warn("Image upload failed:", e);
        }).then(function() {
          setImageBusy(false);
          if (fileInputRef.current) fileInputRef.current.value = "";
        });
      };

      const wrapSelection = function(before, after) {
        const ta = taRef.current; if (!ta) return;
        snapshotBeforeEdit();
        const start = ta.selectionStart, end = ta.selectionEnd;
        // Save scrollTop so we can restore it after React re-renders the
        // textarea. Some browsers reset scrollTop when the value prop changes,
        // which scrolls the visible content back to the top.
        const scrollTop = ta.scrollTop;
        const selected = value.slice(start, end);
        const newValue = value.slice(0, start) + before + selected + after + value.slice(end);
        onChange(newValue);
        requestAnimationFrame(function() {
          const t = taRef.current; if (!t) return;
          t.focus({ preventScroll: true });
          if (selected.length > 0) t.setSelectionRange(start + before.length, end + before.length);
          else t.setSelectionRange(start + before.length, start + before.length);
          t.scrollTop = scrollTop;
        });
      };

      const toggleLinePrefix = function(prefix) {
        const ta = taRef.current; if (!ta) return;
        snapshotBeforeEdit();
        const start = ta.selectionStart;
        const scrollTop = ta.scrollTop;
        const lineStart = value.lastIndexOf("\n", start - 1) + 1;
        const lineMatch = value.slice(lineStart).match(/^(#{1,6})\s/);
        let newValue, newPos;
        const target = prefix.trim();
        if (lineMatch && lineMatch[1] === target) {
          newValue = value.slice(0, lineStart) + value.slice(lineStart + lineMatch[0].length);
          newPos = Math.max(lineStart, start - lineMatch[0].length);
        } else if (lineMatch) {
          newValue = value.slice(0, lineStart) + prefix + value.slice(lineStart + lineMatch[0].length);
          newPos = start + (prefix.length - lineMatch[0].length);
        } else {
          newValue = value.slice(0, lineStart) + prefix + value.slice(lineStart);
          newPos = start + prefix.length;
        }
        onChange(newValue);
        requestAnimationFrame(function() {
          const t = taRef.current; if (!t) return;
          t.focus({ preventScroll: true });
          t.setSelectionRange(newPos, newPos);
          t.scrollTop = scrollTop;
        });
      };

      // Prevent mousedown on toolbar buttons from moving focus off the textarea.
      // Without this, clicking a button briefly defocuses the textarea, the
      // value prop changes, then we refocus — which on some browsers loses the
      // saved scrollTop. Suppressing the default focus shift keeps the textarea
      // focused throughout the click and avoids the visible scroll jump.
      const swallowFocus = function(e) { e.preventDefault(); };

      const btnStyle = { padding: "4px 10px", fontSize: 12, fontFamily: FONT, fontWeight: 600, background: BRAND.white, color: BRAND.textSecondary, border: "1px solid " + BRAND.border, borderRadius: 6, cursor: "pointer", minWidth: 28, lineHeight: 1.2, whiteSpace: "nowrap", flexShrink: 0 };
      const divider = { width: 1, alignSelf: "stretch", background: BRAND.border, margin: "0 4px" };

      return (
        <div style={{ marginBottom: 16 }}>
          {label && <label style={{ display: "block", fontSize: 12, fontFamily: FONT, color: BRAND.textSecondary, marginBottom: 6, fontWeight: 500 }}>{label}</label>}
          <div style={{ display: "flex", alignItems: "center", gap: 4, padding: 6, background: BRAND.bgSubtle, border: "1px solid " + BRAND.border, borderBottom: "none", borderTopLeftRadius: 8, borderTopRightRadius: 8 }}>
            <button
              type="button"
              title="Undo (Cmd+Z / Ctrl+Z). Reverts the last typing burst or toolbar action."
              onMouseDown={swallowFocus}
              onClick={performUndo}
              disabled={!canUndo}
              style={Object.assign({}, btnStyle, { opacity: canUndo ? 1 : 0.4, cursor: canUndo ? "pointer" : "default", fontSize: 14 })}
            >{"↺"}</button>
            <div style={divider} />
            <button type="button" title="Bold (wraps selection in **)" onMouseDown={swallowFocus} onClick={function() { wrapSelection("**", "**"); }} style={Object.assign({}, btnStyle, { fontWeight: 800 })}>B</button>
            <button type="button" title="Italic (wraps selection in *)" onMouseDown={swallowFocus} onClick={function() { wrapSelection("*", "*"); }} style={Object.assign({}, btnStyle, { fontStyle: "italic" })}>I</button>
            <button type="button" title="Underline (wraps selection in __)" onMouseDown={swallowFocus} onClick={function() { wrapSelection("__", "__"); }} style={Object.assign({}, btnStyle, { textDecoration: "underline" })}>U</button>
            <div style={divider} />
            <button type="button" title="Heading (adds ## to current line)" onMouseDown={swallowFocus} onClick={function() { toggleLinePrefix("## "); }} style={btnStyle}>H2</button>
            <button type="button" title="Subheading (adds ### to current line)" onMouseDown={swallowFocus} onClick={function() { toggleLinePrefix("### "); }} style={btnStyle}>H3</button>
            {onImageUpload && <div style={divider} />}
            {onImageUpload && (
              <button
                type="button"
                title="Insert image at cursor (PNG or JPEG). Renders centered between paragraphs in the PDF and EPUB."
                onMouseDown={swallowFocus}
                onClick={function() { if (fileInputRef.current) fileInputRef.current.click(); }}
                disabled={imageBusy}
                style={Object.assign({}, btnStyle, { opacity: imageBusy ? 0.5 : 1 })}
              >
                {imageBusy ? "…" : "+ Image"}
              </button>
            )}
            {onImageUpload && (
              <input
                ref={fileInputRef}
                type="file"
                accept="image/png,image/jpeg,image/gif,image/webp"
                onChange={function(e) {
                  const f = e.target.files && e.target.files[0];
                  if (f) handleImagePick(f);
                }}
                style={{ display: "none" }}
              />
            )}
            <button
              type="button"
              title="Insert a markdown table template at the cursor. Edit the cells to taste; the PDF and EPUB will render it as a real table."
              onMouseDown={swallowFocus}
              onClick={function() {
                // Minimal usable template: 2 columns × 2 data rows + header.
                // The separator row is what marks this as a table in the parser.
                const template = [
                  "| Header 1 | Header 2 |",
                  "|----------|----------|",
                  "| Cell 1   | Cell 2   |",
                  "| Cell 3   | Cell 4   |",
                ].join("\n");
                insertBlockAtCursor(template);
              }}
              style={btnStyle}
            >
              + Table
            </button>
            <div style={{ flex: 1 }} />
            <span style={{ fontSize: 10, fontFamily: FONT, color: BRAND.textMuted, paddingRight: 4 }}>**bold** *italic* __underline__ ## heading</span>
          </div>
          <textarea ref={taRef} value={value} onChange={handleTextareaChange} onKeyDown={handleTextareaKeyDown} onPaste={normalizePasteIntoTextarea} rows={rows}
            style={{ width: "100%", padding: "10px 14px", background: BRAND.white, border: "1px solid " + BRAND.border, borderTopLeftRadius: 0, borderTopRightRadius: 0, borderBottomLeftRadius: 8, borderBottomRightRadius: 8, color: BRAND.textPrimary, fontSize: 14, fontFamily: "'Gelasio', Georgia, serif", lineHeight: 1.55, outline: "none", resize: "vertical", boxSizing: "border-box", display: "block" }} />
        </div>
      );
    });

    // ImageGallery: thumbnails of every image uploaded to a chapter, with
    // Re-insert (drops the marker back into the body at the cursor) and
    // Remove (deletes from chapter.images AND strips the markers from the
    // body text). Renders nothing if the chapter has no images, so the
    // chapter card stays compact for text-only chapters.
    function ImageGallery({ chapter, onReinsert, onRemove }) {
      const images = chapter.images || {};
      const ids = Object.keys(images);
      if (ids.length === 0) return null;
      const cardStyle = { width: 150, background: BRAND.white, border: "1px solid " + BRAND.border, borderRadius: 8, padding: 8, fontSize: 11, fontFamily: FONT, boxSizing: "border-box" };
      const thumbStyle = { width: "100%", height: 90, background: BRAND.bgSubtle, borderRadius: 4, display: "flex", alignItems: "center", justifyContent: "center", marginBottom: 8, overflow: "hidden", border: "1px solid " + BRAND.borderLight };
      const markerStyle = { fontFamily: "ui-monospace, Menlo, Consolas, monospace", fontSize: 10, color: BRAND.textMuted, background: BRAND.bgSubtle, padding: "3px 6px", borderRadius: 4, marginBottom: 8, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" };
      const reinsertBtn = { flex: 1, padding: "5px 6px", fontSize: 11, fontFamily: FONT, fontWeight: 600, background: BRAND.white, color: BRAND.accentDeep, border: "1px solid " + BRAND.border, borderRadius: 4, cursor: "pointer" };
      const removeBtn = { padding: "5px 10px", fontSize: 11, fontFamily: FONT, color: BRAND.danger, background: BRAND.white, border: "1px solid " + BRAND.border, borderRadius: 4, cursor: "pointer" };
      return (
        <div style={{ marginTop: 20, paddingTop: 16, borderTop: "1px solid " + BRAND.borderLight }}>
          <div style={{ fontSize: 12, fontFamily: FONT, color: BRAND.textSecondary, marginBottom: 12, fontWeight: 500 }}>
            Images in this chapter ({ids.length})
          </div>
          <div style={{ display: "flex", flexWrap: "wrap", gap: 12 }}>
            {ids.map(function(id) {
              const img = images[id];
              const label = (img && img.filename) ? img.filename : id;
              const marker = formatImageMarker(label, id);
              return (
                <div key={id} style={cardStyle}>
                  <div style={thumbStyle}>
                    <img src={img && img.dataUrl} alt={img && img.filename || ""} style={{ maxWidth: "100%", maxHeight: "100%", objectFit: "contain", display: "block" }} />
                  </div>
                  <div style={{ color: BRAND.textPrimary, fontWeight: 600, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap", marginBottom: 4 }} title={label}>
                    {label}
                  </div>
                  <div style={markerStyle} title={marker}>
                    {marker}
                  </div>
                  <div style={{ display: "flex", gap: 4 }}>
                    <button type="button" onClick={function() { onReinsert(id, label); }} style={reinsertBtn}>Re-insert</button>
                    <button type="button" onClick={function() { onRemove(id); }} style={removeBtn} title="Remove this image AND any markers referencing it from the body text">Remove</button>
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    function Button({ children, onClick, variant, disabled, style: extraStyle }) {
      variant = variant || "primary";
      const [hovered, setHovered] = useState(false);
      const base = {
        padding: "11px 24px",
        borderRadius: 10,
        border: "none",
        fontSize: 14,
        fontFamily: FONT,
        fontWeight: 600,
        cursor: disabled ? "not-allowed" : "pointer",
        transition: "all 0.15s",
        opacity: disabled ? 0.55 : 1,
        display: "inline-flex",
        alignItems: "center",
        gap: 6,
      };
      // Primary button at rest uses the deep brand blue so it reads as a clearly
      // clickable primary action on a white background. Hover deepens further.
      // Disabled falls back to the pale lavender + reduced opacity so the two states
      // are unambiguously distinct at a glance.
      const variants = {
        primary: {
          background: disabled ? BRAND.accent : (hovered ? "#3D4BC4" : BRAND.accentDeep),
          color: BRAND.white,
          boxShadow: disabled ? "none" : "0 1px 3px rgba(79, 95, 217, 0.35)",
        },
        secondary: {
          background: BRAND.white,
          color: BRAND.textSecondary,
          border: "1px solid " + BRAND.border,
        },
      };
      return (
        <button
          onClick={disabled ? undefined : onClick}
          disabled={disabled}
          aria-disabled={disabled ? "true" : "false"}
          onMouseEnter={function() { if (!disabled) setHovered(true); }}
          onMouseLeave={function() { setHovered(false); }}
          style={Object.assign({}, base, variants[variant], extraStyle)}
        >{children}</button>
      );
    }

    function ChapterCard({ chapter, index, onEdit, onRemove }) {
      const [expanded, setExpanded] = useState(false);
      const wordCount = chapter.body.split(/\s+/).filter(Boolean).length;
      // Ref to the body RichTextInput so the ImageGallery's Re-insert
      // button can drop a marker at the textarea's current cursor.
      const richTextRef = React.useRef(null);
      return (
        <div style={{ background: BRAND.white, border: "1px solid " + BRAND.border, borderRadius: 10, padding: 16, marginBottom: 8 }}>
          <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}>
            <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
              <div style={{ width: 28, height: 28, borderRadius: 8, background: BRAND.stepBadgeBg, color: BRAND.stepBadgeText, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 12, fontWeight: 700, fontFamily: FONT }}>{index + 1}</div>
              <div>
                <div style={{ fontWeight: 600, fontSize: 14, fontFamily: FONT, color: BRAND.textPrimary }}>
                  {chapter.num && <span style={{ color: BRAND.textMuted, fontWeight: 400 }}>{chapter.num} &middot; </span>}
                  {chapter.title || "Untitled"}
                </div>
                <div style={{ fontSize: 12, fontFamily: FONT, color: BRAND.textMuted, marginTop: 2 }}>
                  {wordCount.toLocaleString()} words
                  {chapter.epigraph ? " \u00b7 has epigraph" : ""}
                  {chapter.includeInToc === false ? " \u00b7 hidden from TOC" : ""}
                </div>
              </div>
            </div>
            <div style={{ display: "flex", gap: 6 }}>
              <button onClick={function() { setExpanded(!expanded); }} style={{ background: "none", border: "none", color: BRAND.accentDeep, cursor: "pointer", fontSize: 12, fontFamily: FONT, padding: "4px 8px", fontWeight: 600 }}>{expanded ? "Collapse" : "Edit"}</button>
              <button onClick={function() { onRemove(chapter.id); }} style={{ background: "none", border: "none", color: BRAND.danger + "88", cursor: "pointer", fontSize: 12, fontFamily: FONT, padding: "4px 8px" }}>Remove</button>
            </div>
          </div>
          {expanded && (
            <div style={{ marginTop: 16, paddingTop: 16, borderTop: "1px solid " + BRAND.borderLight }}>
              <Input label="Chapter Number/Label" value={chapter.num} onChange={function(v) { onEdit(chapter.id, "num", v); }} placeholder="e.g. Chapter 1" />
              <Input label="Chapter Title" value={chapter.title} onChange={function(v) { onEdit(chapter.id, "title", v); }} placeholder="e.g. Discovering The Tinybook Client System" />
              <Input label="Epigraph (optional)" value={chapter.epigraph} onChange={function(v) { onEdit(chapter.id, "epigraph", v); }} placeholder="Opening quote for the chapter" />
              <Input label="Epigraph Attribution" value={chapter.epigraphAttribution} onChange={function(v) { onEdit(chapter.id, "epigraphAttribution", v); }} placeholder="e.g. Helen Hayes" />

              {/* Table of Contents inclusion. Default true; auto-detected to false
                  for likely back-matter titles by detectChapters. User can toggle. */}
              <label
                title="Uncheck for back matter (About the Author, Acknowledgments, etc.). The chapter still renders in the book and gets a page number — it just won't be listed in the Contents page."
                style={{ display: "inline-flex", alignItems: "center", gap: 8, marginBottom: 16, padding: "4px 0", fontSize: 13, fontFamily: FONT, color: BRAND.textPrimary, cursor: "pointer", userSelect: "none" }}
              >
                <input
                  type="checkbox"
                  checked={chapter.includeInToc !== false}
                  onChange={function(e) { onEdit(chapter.id, "includeInToc", e.target.checked); }}
                  style={{ width: 14, height: 14, margin: 0, cursor: "pointer", accentColor: BRAND.accentDeep }}
                />
                <span>Include in Table of Contents</span>
                <span style={{ color: BRAND.textMuted, fontSize: 12 }}>(uncheck for back matter)</span>
              </label>

              <RichTextInput
                ref={richTextRef}
                label="Body Text"
                value={chapter.body}
                onChange={function(v) { onEdit(chapter.id, "body", v); }}
                rows={10}
                onImageUpload={async function(file) {
                  // Read the file, probe its natural dimensions, stash it in
                  // chapter.images under a freshly-generated id. Resolves with
                  // { id, alt } so the RichTextInput can drop the marker
                  // into the body at the cursor.
                  const dataUrl = await readFileAsDataUrl(file);
                  const dims = await getImageNaturalSize(dataUrl);
                  const id = "img-" + Math.random().toString(36).slice(2, 8);
                  const altDefault = (file.name || "image").replace(/\.[^.]+$/, "");
                  const newImages = Object.assign({}, chapter.images || {}, {
                    [id]: {
                      dataUrl: dataUrl,
                      filename: file.name || "",
                      naturalWidth: dims.width,
                      naturalHeight: dims.height,
                    },
                  });
                  onEdit(chapter.id, "images", newImages);
                  return { id: id, alt: altDefault, filename: file.name || "" };
                }}
              />

              <ImageGallery
                chapter={chapter}
                onReinsert={function(id, label) {
                  if (richTextRef.current && richTextRef.current.insertAtCursor) {
                    richTextRef.current.insertAtCursor(formatImageMarker(label, id));
                  }
                }}
                onRemove={function(id) {
                  // Drop the image from the chapter's image map and strip
                  // every marker that references it from the body text
                  // (both the new "📷 filename — img-id" form AND the legacy
                  // "![alt](img-id)" form). Otherwise stale markers would
                  // render as "[missing image: id]" placeholders later.
                  const newImages = Object.assign({}, chapter.images || {});
                  delete newImages[id];
                  onEdit(chapter.id, "images", newImages);
                  const escapedId = String(id).replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
                  const newForm = new RegExp("\\n*📷[^\\n]+\\s—\\s" + escapedId + "(?=\\s|$)\\n*", "g");
                  const oldForm = new RegExp("\\n*!\\[[^\\]]*\\]\\(" + escapedId + "\\)\\n*", "g");
                  const oldBody = chapter.body || "";
                  const newBody = oldBody.replace(newForm, "\n\n").replace(oldForm, "\n\n").replace(/\n{3,}/g, "\n\n");
                  if (newBody !== oldBody) {
                    onEdit(chapter.id, "body", newBody);
                  }
                }}
              />
            </div>
          )}
        </div>
      );
    }

    function PagePreview({ bookData, chapters }) {
      const ch = chapters[0];
      if (!ch) return null;
      return (
        <div style={{ width: 220, height: 352, background: "#fff", borderRadius: 4, overflow: "hidden", flexShrink: 0, border: "1px solid " + BRAND.border, boxShadow: "0 4px 24px rgba(26,33,44,0.1)" }}>
          <div style={{ padding: "24px 20px 16px", textAlign: "center" }}>
            {ch.num && <div style={{ fontFamily: "'Gelasio', Georgia, serif", fontSize: 9, color: "#555", marginBottom: 14 }}>{ch.num}</div>}
            <div style={{ fontFamily: "'Gelasio', Georgia, serif", fontSize: 12, fontWeight: 700, color: "#111", lineHeight: 1.3, marginBottom: 12 }}>{ch.title}</div>
            {ch.epigraph && <div style={{ fontFamily: "'EB Garamond', Georgia, serif", fontStyle: "italic", fontSize: 9, color: "#555", lineHeight: 1.4, marginBottom: 3 }}>&ldquo;{ch.epigraph}&rdquo;</div>}
            {ch.epigraphAttribution && <div style={{ fontFamily: "'EB Garamond', Georgia, serif", fontStyle: "italic", fontSize: 8, color: "#888", marginBottom: 12 }}>- {ch.epigraphAttribution}</div>}
            {ch.body && (
              <div style={{ textAlign: "justify" }}>
                <span style={{ fontFamily: "'Gelasio', Georgia, serif", fontSize: 20, fontWeight: 400, float: "left", lineHeight: 1, marginRight: 3, marginTop: 2, color: "#111" }}>{ch.body[0] ? ch.body[0].toUpperCase() : ""}</span>
                <span style={{ fontFamily: "'Gelasio', Georgia, serif", fontSize: 6.5, lineHeight: 1.5, color: "#444" }}>{ch.body.slice(1, 350)}...</span>
              </div>
            )}
          </div>
        </div>
      );
    }

    /* ---- Main App ---- */

    // Legacy single-project autosave key (kept for one-time migration).
    const AUTOSAVE_KEY = "tinybook-formatter-state";
    // Multi-project store. Shape: { activeId, projects: { id: projectState } }
    // where projectState = { bookData, rawText, chapters, step, textSizePreset,
    // lastModified }. Image bytes are stripped before save (same as before).
    const PROJECTS_KEY = "tinybook-formatter-projects";

    const BLANK_BOOK_DATA = {
      title: "", subtitle: "", author: "", publisher: "", isbn: "",
      dedication: "", copyrightText: "",
      ctaTitle: "", ctaBody: "", ctaUrl: "",
    };

    function makeProjectId() {
      return "p-" + Math.random().toString(36).slice(2, 8) + "-" + Date.now().toString(36);
    }

    function blankProject() {
      return {
        bookData: Object.assign({}, BLANK_BOOK_DATA),
        rawText: "",
        chapters: [],
        step: 0,
        textSizePreset: "default",
        lastModified: Date.now(),
      };
    }

    function clampRestoredStep(s) {
      // Step 4 (Download) needs pdfUrl/epubUrl which are session-only.
      // Clamp back to Step 3 (Preview) so reload doesn't land on a blank card.
      if (typeof s !== "number") return 0;
      if (s >= 4) return 3;
      return s;
    }

    // Load the projects store on first render. Tries the new key first,
    // then migrates the legacy single-project autosave if present, then
    // falls back to a fresh blank project. Returns { activeId, projects }.
    function loadInitialProjects() {
      try {
        const raw = localStorage.getItem(PROJECTS_KEY);
        if (raw) {
          const parsed = JSON.parse(raw);
          if (parsed && parsed.projects && parsed.activeId && parsed.projects[parsed.activeId]) {
            // Sanitize: clamp step on every project so restored state is safe.
            for (const id in parsed.projects) {
              const p = parsed.projects[id];
              if (p) p.step = clampRestoredStep(p.step);
            }
            return parsed;
          }
        }
      } catch (e) { /* fall through */ }
      // Migrate from legacy key.
      try {
        const legacy = localStorage.getItem(AUTOSAVE_KEY);
        if (legacy) {
          const old = JSON.parse(legacy);
          if (old && (old.bookData || old.rawText || (Array.isArray(old.chapters) && old.chapters.length > 0))) {
            const id = makeProjectId();
            const proj = {
              bookData: Object.assign({}, BLANK_BOOK_DATA, old.bookData || {}),
              rawText: typeof old.rawText === "string" ? old.rawText : "",
              chapters: Array.isArray(old.chapters) ? old.chapters : [],
              step: clampRestoredStep(old.step),
              textSizePreset: old.textSizePreset || "default",
              lastModified: Date.now(),
            };
            return { activeId: id, projects: { [id]: proj } };
          }
        }
      } catch (e) { /* fall through */ }
      // Fresh start.
      const id = makeProjectId();
      return { activeId: id, projects: { [id]: blankProject() } };
    }

    // Auto-derive the display name from the book title. Falls back to
    // "Untitled" when the title field is empty. (Project naming choice 1A.)
    function getProjectName(project) {
      const t = ((project && project.bookData && project.bookData.title) || "").trim();
      return t || "Untitled";
    }

    function relativeTimeString(ts) {
      if (!ts) return "just now";
      const ago = (Date.now() - ts) / 1000;
      if (ago < 60) return "just now";
      if (ago < 3600) return Math.floor(ago / 60) + "m ago";
      if (ago < 86400) return Math.floor(ago / 3600) + "h ago";
      return Math.floor(ago / 86400) + "d ago";
    }

    function describeProject(project) {
      if (!project) return "";
      const chCount = (project.chapters || []).length;
      let wordCount = 0;
      for (const c of (project.chapters || [])) {
        wordCount += (c.body || "").split(/\s+/).filter(Boolean).length;
      }
      if (chCount === 0 && project.rawText) {
        wordCount = (project.rawText || "").split(/\s+/).filter(Boolean).length;
      }
      const time = relativeTimeString(project.lastModified);
      if (chCount > 0) {
        return chCount + " chapter" + (chCount === 1 ? "" : "s") + " · " + wordCount.toLocaleString() + " words · " + time;
      }
      if (wordCount > 0) {
        return wordCount.toLocaleString() + " words · " + time;
      }
      return "empty · " + time;
    }

    // Dropdown picker in the top-right header. Renders the active project's
    // name + chevron; opens a flat list of all saved projects with a "+ New
    // Project" entry at the bottom. Closes on outside click.
    function ProjectPicker({ projects, activeId, onSwitch, onCreate, onDelete }) {
      const [open, setOpen] = useState(false);
      const rootRef = React.useRef(null);

      React.useEffect(function() {
        if (!open) return;
        function onDocClick(e) {
          if (rootRef.current && !rootRef.current.contains(e.target)) setOpen(false);
        }
        document.addEventListener("mousedown", onDocClick);
        return function() { document.removeEventListener("mousedown", onDocClick); };
      }, [open]);

      const ids = Object.keys(projects).sort(function(a, b) {
        if (a === activeId) return -1;
        if (b === activeId) return 1;
        const ta = (projects[a] && projects[a].lastModified) || 0;
        const tb = (projects[b] && projects[b].lastModified) || 0;
        return tb - ta;
      });
      const activeName = getProjectName(projects[activeId]);

    function TinybookFormatter() {
      // Hydrate the project store on first render. Reads PROJECTS_KEY (the
      // multi-project store), falls back to one-time migration from the
      // legacy AUTOSAVE_KEY single-project blob, then to a fresh blank.
      // Wrapped in useMemo so the localStorage read happens once per
      // component instance.
      const initialStore = React.useMemo(loadInitialProjects, []);
      const initialProject = initialStore.projects[initialStore.activeId] || blankProject();

      // The full projects map and which one is active. Updated only on
      // switch / create / delete events. The autosave effect mirrors the
      // current form-state into the active slot.
      const [projects, setProjects] = useState(initialStore.projects);
      const [activeProjectId, setActiveProjectId] = useState(initialStore.activeId);

      // Form state for the ACTIVE project. clampRestoredStep already runs
      // inside loadInitialProjects, so Step 4 (Download) is safely demoted
      // to Step 3 (Preview): pdfUrl / epubUrl are session-only blob URLs.
      const [step, setStep] = useState(initialProject.step);
      const [generating, setGenerating] = useState(false);
      const [progress, setProgress] = useState("");
      const [error, setError] = useState("");
      const [pdfUrl, setPdfUrl] = useState(null);
      const [epubUrl, setEpubUrl] = useState(null);
      const [textSizePreset, setTextSizePreset] = useState(initialProject.textSizePreset || 'default');
      const [bookData, setBookData] = useState(Object.assign({}, BLANK_BOOK_DATA, initialProject.bookData || {}));
      const [rawText, setRawText] = useState(typeof initialProject.rawText === "string" ? initialProject.rawText : "");
      const [chapters, setChapters] = useState(Array.isArray(initialProject.chapters) ? initialProject.chapters : []);

      const [showChangelog, setShowChangelog] = useState(false);

      // Autosave: 400ms debounced write of the active project's form state
      // into the projects map, then persist the whole map to localStorage.
      // Triggered every time the form state or active project changes.
      // Image bytes (chapter.images data URLs) are stripped before save —
      // they're session-only by design because a few base64 PNGs would blow
      // the 5-10 MB origin quota. The body-text markers (e.g. "📷 file —
      // img-id") still save, so on reload the user only re-uploads images,
      // not the surrounding text.
      React.useEffect(function() {
        const handle = setTimeout(function() {
          try {
            const chaptersForSave = chapters.map(function(c) {
              const out = Object.assign({}, c);
              delete out.images;
              return out;
            });
            const snapshot = {
              bookData: bookData,
              rawText: rawText,
              chapters: chaptersForSave,
              step: step,
              textSizePreset: textSizePreset,
              lastModified: Date.now(),
            };
            setProjects(function(prev) {
              const next = Object.assign({}, prev, { [activeProjectId]: snapshot });
              try { localStorage.setItem(PROJECTS_KEY, JSON.stringify({ activeId: activeProjectId, projects: next })); } catch (e) { /* ignore */ }
              return next;
            });
          } catch (e) { /* ignore — disabled, full, or private mode */ }
        }, 400);
        return function() { clearTimeout(handle); };
      }, [step, textSizePreset, bookData, rawText, chapters, activeProjectId]);

      // Iframe height reporter: when this app is embedded inside an iframe on
      // a hosting page, post the current document height to the parent on
      // mount and on every resize so the parent can auto-size the iframe.
      // Payload: { type: "tinybook:height", height: <number> }.
      React.useEffect(function() {
        if (typeof window === "undefined" || window === window.parent) return;
        function report() {
          const h = document.documentElement.scrollHeight || document.body.scrollHeight;
          try { window.parent.postMessage({ type: "tinybook:height", height: h }, "*"); } catch (e) { /* cross-origin parent may reject */ }
        }
        report();
        const obs = (typeof ResizeObserver !== "undefined") ? new ResizeObserver(report) : null;
        if (obs) obs.observe(document.documentElement);
        window.addEventListener("load", report);
        return function() { if (obs) obs.disconnect(); window.removeEventListener("load", report); };
      }, []);

      const loadSampleData = function() {
        setBookData({
          title: "Get Big Clients With Tiny Books",
          subtitle: "The New Mechanics of Earning More and Working Less",
          author: "Gary White",
          publisher: "Bestseller Profits Publishing",
          isbn: "978-1-9193202-1-2",
          dedication: "To my wife Sammi, my partner in every adventure and the foundation of all we've built together.\n\nTo my daughter Summer, whose laughter reminds me daily why freedom matters.\n\nAnd to Franklin, our golden retriever, whose unrelenting joy on our midweek hikes taught me what true presence looks like.\n\nYou three are my why, the reason I pursue freedom, and the best part of having found it. Thank you for showing me that success without family time isn't success at all.\n\nThis book, like everything I do, is for you.",
          copyrightText: "",
          ctaTitle: "Join The 48-Hour Tinybook Challenge",
          ctaBody: "Finally, quickly and easily create your first (or next) Tinybook and start generating leads in the next 48 hours or less, guaranteed.",
          ctaUrl: "GetClientsWithBooks.com/Challenge",
        });
        setRawText("Chapter 1\nDiscovering The Tinybook Client System\n\n\"The expert in anything was once a beginner.\" - Helen Hayes\n\nMany years earlier, while standing in that Boise conference room, I could feel my heart pounding. There I was, surrounded by the best funnel builders in the world at Russell Brunson's Mastermind.\n\nMy fingers were cramped from hours of repetitive mouse clicking, my eyes burned from staring at the screen, and my desk was littered with empty energy drink cans. But I was in the zone.\n\nWhen they announced the finalists, my heart nearly stopped. Then came the moment when Russell himself pointed to my funnel and said it was the winner. Not just top thirty, but number one.\n\nBut life has a funny way of humbling you just when you think you've made it. I flew home from that Mastermind on cloud nine. I updated my website, I rewrote my freelancer profile, and waited for clients to start pouring in. They didn't.\n\nMeanwhile, I watched as other funnel builders from the same Mastermind began launching very successful ventures, posted about their million-dollar months, and began to build large online followings. I would scroll through my Facebook feed at 2 AM, a growing unease tightening in my chest as I wondered what secrets they possessed that I lacked.\n\nI had the skills. I had the recognition. I had the title. But I didn't have the clients.\n\nChapter 2\nT is for \"The Perfect Bait\"\n\n\"The best bait catches the fish without forcing them to bite.\" - Chet Holmes\n\nLong before the birth of the Tinybook Client System, one of the first book marketing campaigns I led was for Brendan Kane's bestselling book.\n\nThe core premise of the book was that building a massive social media following is about implementing a systematic, data-driven approach. To prove this, Brendan built an online following of one million people in just 30 days.\n\nSuch a powerful hook meant that our book sales scaled well. Our specific campaign directly sold 9,077 books in the first 150 Days, not including traditional Amazon or bookstore sales.\n\nOn the surface, the results looked great, but a huge problem was lurking in the shadows. We were finding it incredibly difficult to convert book buyers into high-value backend clients. We tested various angles, programs, and offers, but nothing seemed to hit the mark.\n\nChapter 3\nI is for \"Independent Selling System\"\n\nThe real breakthrough came when I stopped thinking about funnels as technology and started thinking about them as conversations. Every great salesperson knows that the key to closing is not the pitch. It is the sequence of trust-building moments that precede it.\n\nYour book funnel is that sequence, automated and running around the clock. While you sleep, while you walk the dog, while you sit in a coffee shop with your family, your funnel is having that conversation with hundreds of potential clients simultaneously.\n\nThe Independent Selling System has three core components. First, the book itself acts as the initial trust builder. Second, the order bump and one-click offer qualify buyer intent. Third, the backend conversion mechanism turns qualified buyers into high-value clients.\n\nEach component works independently, but together they create a self-sustaining client acquisition engine that does not depend on your personal time or energy.\n\nMaking It Happen\n\nIf you have read this far, you already know more about book-based client acquisition than most experts in your field will ever learn. The question now is not whether this works. The question is whether you will take action.\n\nThe difference between those who succeed with this system and those who do not comes down to one thing: implementation speed. The longer you wait, the more reasons you will find not to start.");
        setChapters([]);
        setStep(0);
      };

      // Reset every form field on the CURRENT project so the user can start
      // it over without affecting the other projects in the picker. The
      // autosave effect will mirror the cleared state into the projects map
      // on the next tick.
      const handleClearAll = function() {
        const hasContent = (
          rawText.trim().length > 0 ||
          chapters.length > 0 ||
          bookData.title.trim().length > 0 ||
          bookData.author.trim().length > 0 ||
          bookData.subtitle.trim().length > 0 ||
          (bookData.dedication || "").trim().length > 0
        );
        if (hasContent) {
          const ok = window.confirm("Clear this project?\n\nResets the current project to a blank state — title, manuscript, chapters, dedication, CTA, and any uploaded images. Other projects in the picker are untouched.\n\nNo undo. Continue?");
          if (!ok) return;
        }
        setBookData(Object.assign({}, BLANK_BOOK_DATA));
        setRawText("");
        setChapters([]);
        setStep(0);
        setPdfUrl(null);
        setEpubUrl(null);
        setError("");
        setProgress("");
        setTextSizePreset('default');
      };

      // Helper used by all three project handlers — bundles the current form
      // state into a saveable snapshot (image bytes stripped, lastModified
      // stamped) so the active project's slot stays accurate when switching
      // away from it.
      const snapshotCurrent = function() {
        const chaptersForSave = chapters.map(function(c) {
          const out = Object.assign({}, c);
          delete out.images;
          return out;
        });
        return {
          bookData: bookData,
          rawText: rawText,
          chapters: chaptersForSave,
          step: step,
          textSizePreset: textSizePreset,
          lastModified: Date.now(),
        };
      };

      // Load a stored project into the form state. Used by switch and delete.
      const loadProjectIntoForm = function(target) {
        setBookData(Object.assign({}, BLANK_BOOK_DATA, target.bookData || {}));
        setRawText(target.rawText || "");
        setChapters(Array.isArray(target.chapters) ? target.chapters : []);
        setStep(clampRestoredStep(target.step));
        setTextSizePreset(target.textSizePreset || "default");
        setPdfUrl(null);
        setEpubUrl(null);
        setError("");
        setProgress("");
      };

      const handleSwitchProject = function(newId) {
        if (newId === activeProjectId) return;
        const target = projects[newId];
        if (!target) return;
        const nextProjects = Object.assign({}, projects, { [activeProjectId]: snapshotCurrent() });
        loadProjectIntoForm(target);
        setProjects(nextProjects);
        setActiveProjectId(newId);
        try { localStorage.setItem(PROJECTS_KEY, JSON.stringify({ activeId: newId, projects: nextProjects })); } catch (e) {}
      };

      const handleCreateProject = function() {
        const newId = makeProjectId();
        const newProj = blankProject();
        const nextProjects = Object.assign({}, projects, { [activeProjectId]: snapshotCurrent(), [newId]: newProj });
        loadProjectIntoForm(newProj);
        setProjects(nextProjects);
        setActiveProjectId(newId);
        try { localStorage.setItem(PROJECTS_KEY, JSON.stringify({ activeId: newId, projects: nextProjects })); } catch (e) {}
      };

      const handleDeleteProject = function(id) {
        const nextProjects = Object.assign({}, projects);
        delete nextProjects[id];
        if (id === activeProjectId) {
          // Active was deleted — switch to most-recently-modified remaining,
          // or fall back to a fresh blank if none remain.
          const remaining = Object.keys(nextProjects);
          if (remaining.length === 0) {
            const freshId = makeProjectId();
            const fresh = blankProject();
            nextProjects[freshId] = fresh;
            loadProjectIntoForm(fresh);
            setProjects(nextProjects);
            setActiveProjectId(freshId);
            try { localStorage.setItem(PROJECTS_KEY, JSON.stringify({ activeId: freshId, projects: nextProjects })); } catch (e) {}
          } else {
            remaining.sort(function(a, b) {
              return ((nextProjects[b] && nextProjects[b].lastModified) || 0) - ((nextProjects[a] && nextProjects[a].lastModified) || 0);
            });
            const newActive = remaining[0];
            loadProjectIntoForm(nextProjects[newActive]);
            setProjects(nextProjects);
            setActiveProjectId(newActive);
            try { localStorage.setItem(PROJECTS_KEY, JSON.stringify({ activeId: newActive, projects: nextProjects })); } catch (e) {}
          }
        } else {
          setProjects(nextProjects);
          try { localStorage.setItem(PROJECTS_KEY, JSON.stringify({ activeId: activeProjectId, projects: nextProjects })); } catch (e) {}
        }
      };

      const updateBook = function(field, value) { setBookData(function(prev) { return Object.assign({}, prev, { [field]: value }); }); };
      const handleDetectChapters = function() {
        console.log('=== Chapter Detection Debug ===');
        console.log('Raw text length:', rawText.length);
        console.log('Raw text (first 500 chars):', rawText.substring(0, 500));
        console.log('Raw text (trimmed):', rawText.trim().length > 0);
        
        const detected = detectChapters(rawText);
        console.log('Detected chapters:', detected.length);
        detected.forEach(function(ch, i) {
          console.log(`Chapter ${i + 1}:`, { num: ch.num, title: ch.title, bodyLength: ch.body.length });
        });
        
        if (detected.length === 0) {
          console.log('No chapters detected, creating single chapter with all text');
          setChapters([{ id: Math.random().toString(36).slice(2), num: "Chapter 1", title: "Untitled", epigraph: "", epigraphAttribution: "", body: rawText }]);
        } else { 
          setChapters(detected); 
        }
        setStep(2);
      };
      const handleEditChapter = function(id, field, value) { setChapters(function(prev) { return prev.map(function(ch) { return ch.id === id ? Object.assign({}, ch, { [field]: value }) : ch; }); }); };
      const handleRemoveChapter = function(id) { setChapters(function(prev) { return prev.filter(function(ch) { return ch.id !== id; }); }); };
      const handleAddChapter = function() { setChapters(function(prev) { return prev.concat([{ id: Math.random().toString(36).slice(2), num: "Chapter " + (prev.length + 1), title: "", epigraph: "", epigraphAttribution: "", body: "", includeInToc: true, images: {} }]); }); };

      const handleGenerate = async function() {
        setGenerating(true); setProgress("Starting..."); setError("");
        try {
          const blob = await generatePDF(bookData, chapters, setProgress, textSizePreset);

        }
      };

      const handleGenerateEpub = async function() {
        setGenerating(true); setProgress("Starting..."); setError("");
        try {
          const blob = await generateEPUB(bookData, chapters, setProgress);
          if (!blob || blob.size === 0) { setError("EPUB generation produced an empty file."); return; }
          setEpubUrl(URL.createObjectURL(blob));

        } catch (err) {
          console.error("EPUB generation error:", err);
          setError("EPUB generation failed: " + (err.message || String(err)));

          setGenerating(false);
        }
      };

      const handleFileUpload = function(e) {
        const file = e.target.files && e.target.files[0];
        if (!file) return;
        
        const fileName = file.name.toLowerCase();
        setError(''); // Clear any previous errors
        setProgress(''); // Clear any previous progress
        
        console.log('File selected:', fileName, 'Size:', file.size, 'Type:', file.type);
        
        // Basic file validation
        if (file.size === 0) {
          setError('The selected file is empty.');
          return;
        }
        
        if (file.size > 50 * 1024 * 1024) { // 50MB limit
          setError('File is too large (max 50MB). Try a smaller document.');
          return;
        }
        
        if (fileName.endsWith('.docx')) {
          // Handle .docx files with mammoth.js. We use convertToHtml with a style map
          // so that Word's Heading 1 becomes <h1> and Heading 2 becomes <h2>. This lets
          // us preserve chapter and subheading structure that extractRawText would lose.
          console.log('Processing .docx file...');
          console.log('Mammoth available?', typeof mammoth !== 'undefined');

          if (typeof mammoth === 'undefined') {
            setError('DOCX support library not loaded. Please refresh the page and try again.');
            return;
          }

          if (typeof mammoth.convertToHtml !== 'function') {
            setError('DOCX support library incomplete. Please refresh the page and try again.');
            return;
          }

          setProgress('Reading Word document...');

          const reader = new FileReader();
          reader.onload = function(e) {
            const arrayBuffer = e.target.result;
            console.log('ArrayBuffer created, size:', arrayBuffer.byteLength);

            if (arrayBuffer.byteLength === 0) {
              setError('The selected file appears to be empty or corrupted.');
              setProgress('');
              return;
            }

            // Style map: force Word heading styles to HTML h1/h2. Body paragraphs
            // become <p>. Everything else (bold, italic, lists) is stripped down to
            // plain text per the Phase 4 scope decision.
            const styleMap = [
              "p[style-name='Heading 1'] => h1",
              "p[style-name='heading 1'] => h1",
              "p[style-name='Title'] => h1",
              "p[style-name='Heading 2'] => h2",
              "p[style-name='heading 2'] => h2",
              "p[style-name='Subtitle'] => h2",
            ];

            mammoth.convertToHtml({ arrayBuffer: arrayBuffer }, { styleMap: styleMap }).then(function(result) {
              console.log('Mammoth HTML success, length:', (result.value || '').length);
              const html = result.value || '';
              if (html.length === 0) {
                setError('No text could be extracted from this Word document. Try saving it as .txt instead.');
                setProgress('');
                return;
              }

              // Flatten the HTML into a plain-text form the chapter detector understands:
              //   <h1>Text</h1>  -> "Text\n\n" treated as a chapter heading line
              //   <h2>Text</h2>  -> "## Text\n\n" subheading marker (handled in render)
              //   <p>Text</p>    -> "Text\n\n"
              //   all other tags -> stripped, their inner text preserved
              const extractedText = flattenDocxHtml(html);

              console.log('Flattened text length:', extractedText.length);
              console.log('First 500 chars:', extractedText.substring(0, 500));

              setRawText(extractedText);
              setProgress('');

              if (result.messages && result.messages.length > 0) {
                console.log('Mammoth warnings:', result.messages);
              }
            }).catch(function(err) {
              console.error('Mammoth conversion error:', err);
              setError('Could not read Word document: ' + (err.message || 'File may be corrupted or password-protected. Try saving as .txt instead.'));
              setProgress('');
            });
          };

          reader.onerror = function(err) {
            console.error('File reading error:', err);
            setError('Failed to read file. Try saving your Word document as .txt instead.');
            setProgress('');
          };

          reader.readAsArrayBuffer(file);
        } else {
          // Handle .txt and .md files
          console.log('Processing text file...');
          const reader = new FileReader();
          reader.onload = function(ev) { 
            const text = ev.target.result || '';
            console.log('Text file loaded, length:', text.length);
            setRawText(text);
          };
          reader.onerror = function(err) {
            console.error('File reading error:', err);
            setError('Failed to read text file.');
          };
          reader.readAsText(file);
        }
      };

      const steps = ["Book Details", "Manuscript", "Chapters", "Preview", "Download"];
      const totalWords = chapters.reduce(function(sum, ch) { return sum + ch.body.split(/\s+/).filter(Boolean).length; }, 0);

      return (
        <div style={{ minHeight: "100vh", background: BRAND.bgPage, color: BRAND.textPrimary, fontFamily: FONT }}>

            >Clear This Project</button>
            <button onClick={function() { setShowChangelog(!showChangelog); }} style={{ padding: "4px 10px", borderRadius: 4, border: "1px solid " + BRAND.border, background: BRAND.white, color: BRAND.textMuted, cursor: "pointer", fontSize: 10, fontFamily: FONT, fontWeight: 600 }}>v{APP_VERSION.version}</button>
          </div>

          {showChangelog && (
            <div style={{ position: "absolute", top: 52, right: 20, background: BRAND.white, border: "1px solid " + BRAND.border, borderRadius: 10, padding: "14px 18px", boxShadow: "0 8px 24px rgba(26,33,44,0.08)", maxWidth: 420, zIndex: 20 }}>
              <div style={{ fontSize: 11, fontWeight: 700, color: BRAND.navy, fontFamily: FONT, marginBottom: 8, letterSpacing: "0.05em", textTransform: "uppercase" }}>Version History</div>
              {APP_VERSION.changes.map(function(change, i) {

              })}
            </div>
          )}

          {/* Hero header */}
          <div style={{ padding: "56px 20px 32px", textAlign: "center" }}>
            <h1 style={{ fontSize: 38, fontWeight: 800, color: BRAND.navy, fontFamily: FONT, letterSpacing: "-0.02em", marginBottom: 12 }}>Tinybook Formatter</h1>
            <p style={{ fontSize: 15, color: BRAND.textSecondary, fontFamily: FONT, maxWidth: 560, margin: "0 auto", lineHeight: 1.5 }}>
              Turn your manuscript into a print-ready 5" &times; 8" interior PDF with professional typography, drop caps, and table of contents.
            </p>
          </div>

          <div style={{ maxWidth: 760, margin: "0 auto", padding: "0 20px 60px" }}>
            <div style={{ background: BRAND.white, borderRadius: 16, border: "1px solid " + BRAND.border, boxShadow: "0 4px 16px rgba(26,33,44,0.04)", padding: "32px 32px 28px" }}>
              <StepIndicator currentStep={step} steps={steps} />

            {step === 0 && (
              <div>
                <div style={{ display: "flex", alignItems: "center", marginBottom: 4 }}>
                  <StepBadge num="1" />
                  <SectionLabel>Book Details</SectionLabel>
                </div>
                <p style={{ color: BRAND.textSecondary, fontSize: 13, marginBottom: 20, fontFamily: FONT, lineHeight: 1.5 }}>Enter your book information. These details appear on the title page, copyright page, and running headers.</p>
                
                <div style={{ marginBottom: 24, padding: 16, background: BRAND.light, borderRadius: 10, border: "1px solid " + BRAND.border }}>
                  <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}>
                    <div>
                      <div style={{ fontSize: 13, fontWeight: 600, marginBottom: 4, color: BRAND.navy, fontFamily: FONT }}>Body Text Size</div>
                      <div style={{ fontSize: 12, color: BRAND.textMuted, fontFamily: FONT }}>Choose between default and spacious settings</div>
                    </div>
                    <select 
                      value={textSizePreset} 
                      onChange={function(e) { setTextSizePreset(e.target.value); }}
                      style={{ 
                        padding: "8px 12px", 
                        borderRadius: 6, 
                        border: "1px solid " + BRAND.border, 
                        background: BRAND.white, 
                        fontFamily: FONT, 
                        fontSize: 12,
                        color: BRAND.textPrimary,
                        cursor: "pointer"
                      }}
                    >
                      {Object.entries(TEXT_PRESETS).map(function([key, preset]) {
                        return <option key={key} value={key}>{preset.label}</option>;
                      })}
                    </select>
                  </div>
                </div>
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
                  <Input label="Book Title *" value={bookData.title} onChange={function(v) { updateBook("title", v); }} placeholder="Get Big Clients With Tiny Books" />
                  <Input label="Author Name *" value={bookData.author} onChange={function(v) { updateBook("author", v); }} placeholder="Gary White" />
                </div>
                <Input label="Subtitle" value={bookData.subtitle} onChange={function(v) { updateBook("subtitle", v); }} placeholder="The New Mechanics of Earning More and Working Less" />
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
                  <Input label="Publisher" value={bookData.publisher} onChange={function(v) { updateBook("publisher", v); }} placeholder="Bestseller Profits Publishing" />
                  <Input label="ISBN" value={bookData.isbn} onChange={function(v) { updateBook("isbn", v); }} placeholder="978-1-9193202-1-2" />
                </div>
                <Input label="Dedication" value={bookData.dedication} onChange={function(v) { updateBook("dedication", v); }} multiline={true} rows={4} placeholder="To my wife Sammi..." />
                <div style={{ marginTop: 8, padding: 16, background: BRAND.light, borderRadius: 10, border: "1px solid " + BRAND.border }}>
                  <div style={{ fontSize: 13, fontWeight: 600, marginBottom: 12, color: BRAND.navy, fontFamily: FONT }}>Reader Bonus Page (Optional)</div>
                  <Input label="CTA Title" value={bookData.ctaTitle} onChange={function(v) { updateBook("ctaTitle", v); }} placeholder="Join The 48-Hour Tinybook Challenge" />
                  <Input label="CTA Description" value={bookData.ctaBody} onChange={function(v) { updateBook("ctaBody", v); }} multiline={true} rows={3} placeholder="Finally, quickly and easily create your first Tinybook..." />
                  <Input label="CTA URL" value={bookData.ctaUrl} onChange={function(v) { updateBook("ctaUrl", v); }} placeholder="GetClientsWithBooks.com/Challenge" />
                </div>
                <div style={{ display: "flex", justifyContent: "flex-end", marginTop: 20 }}>
                  <Button onClick={function() { setStep(1); }} disabled={!bookData.title || !bookData.author}>Next: Add Manuscript &rarr;</Button>
                </div>
              </div>
            )}

            {step === 1 && (
              <div>
                <div style={{ display: "flex", alignItems: "center", marginBottom: 4 }}>
                  <StepBadge num="2" />
                  <SectionLabel>Manuscript</SectionLabel>
                </div>
                <p style={{ color: BRAND.textSecondary, fontSize: 13, marginBottom: 24, fontFamily: FONT, lineHeight: 1.5 }}>Paste your manuscript text or upload a .txt or .docx file. The formatter will automatically detect chapters. <em>If .docx upload fails, save your Word document as .txt and try again.</em></p>
                
                {progress && (
                  <div style={{ padding: 12, background: BRAND.light, border: "1px solid " + BRAND.border, borderRadius: 10, marginBottom: 16 }}>
                    <div style={{ fontSize: 14, fontWeight: 600, fontFamily: FONT, color: BRAND.accentDeep }}>{progress}</div>
                  </div>
                )}
                {error && (
                  <div style={{ padding: 16, background: "#FEF2F2", border: "1px solid #FECACA", borderRadius: 10, marginBottom: 16 }}>
                    <div style={{ fontSize: 13, fontFamily: FONT, color: "#991B1B", fontWeight: 500 }}>{error}</div>
                  </div>
                )}
                <label style={{ padding: "10px 20px", borderRadius: 8, border: "1px solid " + BRAND.border, cursor: "pointer", fontSize: 14, fontFamily: FONT, color: BRAND.textPrimary, background: BRAND.white, display: "inline-flex", alignItems: "center", gap: 6, marginBottom: 16 }}>
                  Upload .txt or .docx File
                  <input type="file" accept=".txt,.md,.docx" onChange={handleFileUpload} style={{ display: "none" }} />
                </label>
                <textarea value={rawText} onChange={function(e) { setRawText(e.target.value); }} onPaste={normalizePasteIntoTextarea}
                  placeholder="Paste your manuscript here..."
                  style={{ width: "100%", height: 400, padding: 16, background: BRAND.white, border: "1px solid " + BRAND.border, borderRadius: 10, color: BRAND.textPrimary, fontSize: 13, fontFamily: "'Gelasio', Georgia, serif", lineHeight: 1.6, outline: "none", resize: "vertical", boxSizing: "border-box" }} />
                <div style={{ display: "flex", justifyContent: "space-between", marginTop: 20 }}>
                  <Button variant="secondary" onClick={function() { setStep(0); }}>&larr; Back</Button>
                  <Button onClick={handleDetectChapters} disabled={!rawText.trim()}>Detect Chapters &rarr;</Button>
                </div>
              </div>
            )}

            {step === 2 && (
              <div>
                <div style={{ display: "flex", alignItems: "center", marginBottom: 4 }}>
                  <StepBadge num="3" />
                  <SectionLabel>Chapters</SectionLabel>
                </div>
                <p style={{ color: BRAND.textSecondary, fontSize: 13, marginBottom: 8, fontFamily: FONT }}>{chapters.length} chapters detected &middot; {totalWords.toLocaleString()} total words</p>
                <p style={{ color: BRAND.textMuted, fontSize: 12, marginBottom: 20, fontFamily: FONT }}>Click "Edit" on any chapter to adjust titles, epigraphs, or body text.</p>
                {chapters.map(function(ch, i) { return <ChapterCard key={ch.id} chapter={ch} index={i} onEdit={handleEditChapter} onRemove={handleRemoveChapter} />; })}
                <button onClick={handleAddChapter} style={{ width: "100%", padding: 12, borderRadius: 10, border: "1px dashed " + BRAND.border, background: "transparent", color: BRAND.textMuted, cursor: "pointer", fontSize: 13, fontFamily: FONT, marginTop: 8 }}>+ Add Chapter</button>
                <div style={{ display: "flex", justifyContent: "space-between", marginTop: 20 }}>
                  <Button variant="secondary" onClick={function() { setStep(1); }}>&larr; Back</Button>
                  <Button onClick={function() { setStep(3); }} disabled={chapters.length === 0}>Preview &rarr;</Button>
                </div>
              </div>
            )}

            {step === 3 && (
              <div>
                <div style={{ display: "flex", alignItems: "center", marginBottom: 4 }}>
                  <StepBadge num="4" />
                  <SectionLabel>Preview & Generate</SectionLabel>
                </div>
                <p style={{ color: BRAND.textSecondary, fontSize: 13, marginBottom: 24, fontFamily: FONT, lineHeight: 1.5 }}>Review your book details before generating the print-ready PDF.</p>
                <div style={{ display: "flex", gap: 24, marginBottom: 24 }}>
                  <PagePreview bookData={bookData} chapters={chapters} />
                  <div style={{ flex: 1 }}>
                    <div style={{ background: BRAND.white, borderRadius: 10, border: "1px solid " + BRAND.border, padding: 16 }}>
                      <div style={{ fontSize: 11, fontFamily: FONT, color: BRAND.textMuted, marginBottom: 12, textTransform: "uppercase", letterSpacing: "0.05em", fontWeight: 600 }}>Book Summary</div>
                      {[["Title", bookData.title], ["Author", bookData.author], ["Chapters", chapters.length], ["Total Words", totalWords.toLocaleString()], ["Format", '5" \u00d7 8"']].filter(function(pair) { return pair[1]; }).map(function(pair) {
                        return (
                          <div key={pair[0]} style={{ display: "flex", justifyContent: "space-between", padding: "6px 0", borderBottom: "1px solid " + BRAND.borderLight, fontSize: 13, fontFamily: FONT }}>
                            <span style={{ color: BRAND.textSecondary }}>{pair[0]}</span>
                            <span style={{ fontWeight: 500, color: BRAND.navy }}>{pair[1]}</span>
                          </div>
                        );
                      })}
                    </div>
                  </div>
                </div>
                {generating && (
                  <div style={{ padding: 16, background: BRAND.stepBadgeBg, border: "1px solid " + BRAND.accent + "44", borderRadius: 10, marginBottom: 16, textAlign: "center" }}>
                    <div style={{ fontSize: 14, fontWeight: 600, fontFamily: FONT, color: BRAND.accentDeep }}>{progress}</div>
                  </div>
                )}
                {error && (
                  <div style={{ padding: 16, background: "#FEF2F2", border: "1px solid #FECACA", borderRadius: 10, marginBottom: 16 }}>
                    <div style={{ fontSize: 13, fontFamily: FONT, color: "#991B1B", fontWeight: 500 }}>{error}</div>
                  </div>
                )}
                <div style={{ display: "flex", justifyContent: "space-between", marginTop: 20, gap: 10, flexWrap: "wrap" }}>
                  <Button variant="secondary" onClick={function() { setStep(2); }}>&larr; Back</Button>
                  <div style={{ display: "flex", gap: 8 }}>
                    <Button variant="secondary" onClick={handleGenerateEpub} disabled={generating}>{generating ? "Working..." : "Generate EPUB"}</Button>
                    <Button onClick={handleGenerate} disabled={generating}>{generating ? "Generating..." : "Generate PDF"}</Button>
                  </div>
                </div>
              </div>
            )}

            {step === 4 && (pdfUrl || epubUrl) && (
              <div style={{ textAlign: "center", paddingTop: 40 }}>
                <div style={{ width: 64, height: 64, borderRadius: 16, background: BRAND.success + "15", display: "flex", alignItems: "center", justifyContent: "center", margin: "0 auto 20px", fontSize: 28 }}>&#10003;</div>
                <h2 style={{ fontSize: 22, fontWeight: 700, marginBottom: 8, color: BRAND.navy, fontFamily: FONT }}>Your Tinybook is Ready</h2>
                <p style={{ color: BRAND.textSecondary, fontSize: 14, marginBottom: 32, fontFamily: FONT }}>{bookData.title} &middot; {chapters.length} chapters &middot; {totalWords.toLocaleString()} words</p>
                <div style={{ display: "flex", gap: 12, justifyContent: "center", flexWrap: "wrap" }}>
                  {pdfUrl && (
                    <a href={pdfUrl} download={(bookData.title.replace(/\s+/g, "_")) + "_Interior.pdf"} style={{ padding: "13px 32px", borderRadius: 10, background: BRAND.accentDeep, color: BRAND.white, fontWeight: 700, fontSize: 15, fontFamily: FONT, textDecoration: "none", display: "inline-flex", alignItems: "center", gap: 8, boxShadow: "0 1px 3px rgba(79, 95, 217, 0.35)" }}>&darr; Download PDF</a>
                  )}
                  {epubUrl && (
                    <a href={epubUrl} download={(bookData.title.replace(/\s+/g, "_")) + ".epub"} style={{ padding: "13px 32px", borderRadius: 10, background: BRAND.accentDeep, color: BRAND.white, fontWeight: 700, fontSize: 15, fontFamily: FONT, textDecoration: "none", display: "inline-flex", alignItems: "center", gap: 8, boxShadow: "0 1px 3px rgba(79, 95, 217, 0.35)" }}>&darr; Download EPUB</a>
                  )}
                  {!pdfUrl && epubUrl && (
                    <Button variant="secondary" onClick={handleGenerate} disabled={generating}>Also Generate PDF</Button>
                  )}
                  {pdfUrl && !epubUrl && (
                    <Button variant="secondary" onClick={handleGenerateEpub} disabled={generating}>Also Generate EPUB</Button>
                  )}
                  <Button variant="secondary" onClick={function() { setPdfUrl(null); setEpubUrl(null); setStep(3); }}>Back to Preview</Button>
                </div>
                <div style={{ marginTop: 40, padding: 16, background: BRAND.white, borderRadius: 10, border: "1px solid " + BRAND.border, textAlign: "left", maxWidth: 480, margin: "40px auto 0" }}>
                  <div style={{ fontSize: 12, fontWeight: 600, marginBottom: 8, color: BRAND.navy, fontFamily: FONT }}>Before sending to print or publish:</div>
                  <div style={{ fontSize: 12, color: BRAND.textSecondary, lineHeight: 1.7, fontFamily: FONT }}>
                    1. Open the file and check all pages render correctly<br />
                    2. For print PDF: verify chapter openings start on right-hand (recto) pages<br />
                    3. Check drop caps display properly at chapter starts<br />
                    4. Confirm page numbers and running headers are correct<br />
                    5. Review the table of contents<br />
                    6. For EPUB: test in Apple Books or Kindle Previewer before uploading to retailers
                  </div>
                </div>
              </div>
            )}
            </div>
          </div>

          {/* Footer */}
          <div style={{ borderTop: "1px solid " + BRAND.border, padding: "20px 20px 28px", textAlign: "center" }}>
            <div style={{ width: 36, height: 3, background: BRAND.border, borderRadius: 2, margin: "0 auto 12px" }}></div>
            <div style={{ fontSize: 12, color: BRAND.textMuted, fontFamily: FONT, fontWeight: 500 }}>
              Powered by <span style={{ color: BRAND.textSecondary, fontWeight: 600 }}>Bookfunnels.io</span>
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<TinybookFormatter />);
  </script>
</body>
</html>
