      // Run every user-supplied string through typographic cleanup before rendering.
      // URLs are preserved because they should never have curly quotes.
      const ctaUrlOriginal = bookData && bookData.ctaUrl ? bookData.ctaUrl : "";
      bookData = smartQuotesDeep(bookData);
      if (bookData) bookData.ctaUrl = ctaUrlOriginal;
      chapters = smartQuotesDeep(chapters);

      // Update SPEC based on selected text size preset
      SPEC = createSpec(textSizePreset);
      
      if (!window.jspdf || !window.jspdf.jsPDF) {
        throw new Error("jsPDF library not loaded. Please refresh the page and try again.");
      }
      
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF({ unit: "pt", format: [SPEC.pageW, SPEC.pageH], compress: true });
      
      // Try to load custom fonts (silent - single progress message already showing)
      const fontsLoaded = await loadFontsForPDF(doc).catch(function(e) {
        console.warn("Font loading failed, falling back to helvetica:", e);
        return false;
      });
      
      // Font helpers - use custom fonts if loaded, fallback to helvetica
      const BODY_FONT = fontsLoaded ? "Gelasio" : "helvetica";
      const EPIGRAPH_FONT = fontsLoaded ? "EB Garamond" : "helvetica";
      const HEADER_FONT = fontsLoaded ? "Inter" : "helvetica";
      
      let pageNum = 0;
      let bookPageNum = 0;

      function newPage() { if (pageNum > 0) doc.addPage([SPEC.pageW, SPEC.pageH]); pageNum++; }
      function isRecto() { return pageNum % 2 === 1; }
      function getMargins() { return isRecto() ? SPEC.margins.recto : SPEC.margins.verso; }
      function getTextWidth() { const m = getMargins(); return SPEC.pageW - m.inside - m.outside; }
      function getTextX() { return getMargins().inside; }
      // Horizontal center of the current page's text block. Use this for all centered
      // text (chapter titles, TOC, title page, CTA, etc.) instead of SPEC.pageW / 2 —
      // on bound books the text block is offset toward the outside edge because the
      // spine-side gutter is larger, so centering on pageW/2 pushes text toward the spine.
      function getCenterX() { const m = getMargins(); return m.inside + (SPEC.pageW - m.inside - m.outside) / 2; }

      // Single source of truth for "where the body text starts after a page break".
      // Used by both pass 1 (dry-run page counting) and pass 2 (actual render) so
      // they cannot drift apart. Margins are mirrored (recto.top === verso.top),
      // so reading recto here is equivalent to reading either page's top margin.
      function bodyTopY() { return SPEC.margins.recto.top + 30; }

      // Helper function to reset font properties after page breaks
      function resetBodyFont() {
        doc.setFont(BODY_FONT, "normal");
        doc.setFontSize(SPEC.bodySize);
        doc.setTextColor(30);
      }

      function addRunningHeader(chapterTitle) {
        const m = getMargins();
        doc.setFont(HEADER_FONT, "normal"); doc.setFontSize(SPEC.headerSize); doc.setTextColor(80);
        if (isRecto()) { doc.text(chapterTitle, SPEC.pageW - m.outside, m.top + SPEC.headerSize, { align: "right" }); }
        else { doc.text(bookData.title, m.inside, m.top + SPEC.headerSize); }
      }

      function addPageNumber(num) {
        const m = getMargins();
        doc.setFont(HEADER_FONT, "normal"); doc.setFontSize(SPEC.headerSize); doc.setTextColor(80);
        if (isRecto()) { doc.text(String(num), SPEC.pageW - m.outside, SPEC.pageNumY, { align: "right" }); }
        else { doc.text(String(num), m.inside, SPEC.pageNumY); }
      }

      function wrapText(text, maxWidth, fontSize, fontStyle) {
        fontStyle = fontStyle || "normal";
        doc.setFontSize(fontSize); doc.setFont(BODY_FONT, fontStyle);
        return doc.splitTextToSize(text, maxWidth);
      }

      // Smart title wrapping that considers semantic breaks
      function wrapTitle(title, maxWidth, fontSize) {
        doc.setFontSize(fontSize); doc.setFont(BODY_FONT, "bold");
        
        // If it fits on one line, return as-is
        if (doc.getTextWidth(title) <= maxWidth) {
          return [title];
        }
        
        // Smart breaking rules for better title flow
        const words = title.split(' ');
        if (words.length <= 1) {
          // Single long word, use basic wrapping
          return doc.splitTextToSize(title, maxWidth);
        }
        
        // Try different break strategies in order of preference
        const strategies = [
          // Strategy 1: Break after prepositions and articles at natural pause points
          function() {
            const breakAfter = ['the', 'of', 'in', 'on', 'at', 'to', 'for', 'with', 'by', 'from', 'up', 'about', 'into', 'through', 'during', 'before', 'after', 'above', 'below', 'between', 'among', 'within'];
            for (let i = 1; i < words.length - 1; i++) {
              if (breakAfter.includes(words[i].toLowerCase())) {
                const firstLine = words.slice(0, i + 1).join(' ');
                const secondLine = words.slice(i + 1).join(' ');
                if (doc.getTextWidth(firstLine) <= maxWidth && doc.getTextWidth(secondLine) <= maxWidth) {
                  return [firstLine, secondLine];
                }
              }
            }
            return null;
          },
          
          // Strategy 2: Break at punctuation marks
          function() {
            const text = title;
            const puncts = [': ', '- ', '. ', ', ', '; '];
            for (const punct of puncts) {
              const idx = text.indexOf(punct);
              if (idx > 0 && idx < text.length - 2) {
                const firstLine = text.slice(0, idx + punct.length - 1);
                const secondLine = text.slice(idx + punct.length);
                if (doc.getTextWidth(firstLine) <= maxWidth && doc.getTextWidth(secondLine) <= maxWidth) {
                  return [firstLine, secondLine];
                }
              }
            }
            return null;
          },
          
          // Strategy 3: Break avoiding orphaned articles/prepositions
          function() {
            const orphanWords = ['the', 'a', 'an', 'of', 'in', 'on', 'at', 'to', 'for', 'with', 'by', 'and', 'or'];
            for (let i = Math.floor(words.length / 2); i >= 2; i--) {
              // Don't break before orphan words
              if (orphanWords.includes(words[i].toLowerCase())) continue;
              // Don't break after orphan words at line end
              if (i < words.length - 1 && orphanWords.includes(words[i - 1].toLowerCase())) continue;
              
              const firstLine = words.slice(0, i).join(' ');
              const secondLine = words.slice(i).join(' ');
              if (doc.getTextWidth(firstLine) <= maxWidth && doc.getTextWidth(secondLine) <= maxWidth) {
                return [firstLine, secondLine];
              }
            }
            return null;
          },
          
          // Strategy 4: Balanced split (prefer middle)
          function() {
            const mid = Math.floor(words.length / 2);
            for (let offset = 0; offset <= 2; offset++) {
              for (const i of [mid + offset, mid - offset]) {
                if (i >= 2 && i < words.length - 1) {
                  const firstLine = words.slice(0, i).join(' ');
                  const secondLine = words.slice(i).join(' ');
                  if (doc.getTextWidth(firstLine) <= maxWidth && doc.getTextWidth(secondLine) <= maxWidth) {
                    return [firstLine, secondLine];
                  }
                }
              }
            }
            return null;
          }
        ];
        
        // Try each strategy until one works
        for (const strategy of strategies) {
          const result = strategy();
          if (result) return result;
        }
        
        // Fallback: use jsPDF's basic wrapping
        return doc.splitTextToSize(title, maxWidth);
      }

      // Renders a single reader-bonus CTA page on the current page. Used at both front
      // (before title page) and back (after final chapter) of the book. Same copy, same
      // layout, rendered twice so readers have two chances to convert.
      //
      // Layout strategy:
      //  1. Measure every element's height (both bars, title lines, body lines)
      //  2. Sum total content height
      //  3. Start y so the block sits optically centered on the page (slight upper bias)
      //  4. Horizontal center uses the text-block midline (textX + textW/2), which on
      //     verso/recto differs from the absolute page center. Drawing everything against
      //     the text block keeps the bars and the centered text visually aligned.
      function renderCTAPage() {
        const textX = getTextX();
        const textW = getTextWidth();
        const centerX = textX + textW / 2;

        // Layout constants
        const HEADER_BAR_H = 40;
        const URL_BAR_H = 40;
        const TITLE_SIZE = 22;
        const TITLE_LINE_H = 28;   // baseline-to-baseline within title
        const BODY_SIZE = 12;
        const BODY_LINE_H = 16;    // baseline-to-baseline within body

        // VISUAL gaps. Each is measured edge-to-edge of the visible text,
        // not baseline-to-baseline, so the rendered output matches the number.
        //   HEADER_TO_TITLE: bar bottom -> title cap-top
        //   TITLE_TO_BODY:   last title baseline (= cap-bottom) -> body cap-top
        //   BODY_TO_URL:     last body baseline -> URL bar top
        //   TITLE_TO_URL:    last title baseline -> URL bar top (when no body)
        const GAP_HEADER_TO_TITLE = 16;
        const GAP_TITLE_TO_BODY = 16;
        const GAP_BODY_TO_URL = 20;
        const GAP_TITLE_TO_URL = 22;

        const titleCapH = TITLE_SIZE * SPEC.capHeightRatio;
        const bodyCapH = BODY_SIZE * SPEC.capHeightRatio;

        // Helper: baseline y to vertically center text on cap-height inside a bar.
        function barBaseline(barTopY, barH, fontSize) {
          return barTopY + (barH / 2) + (fontSize * SPEC.capHeightRatio / 2);
        }

        // Measure lines (full text-block width to match the bars above/below)
        doc.setFont(BODY_FONT, "bold"); doc.setFontSize(TITLE_SIZE);
        const ctaLines = wrapTitle(bookData.ctaTitle || "", textW, TITLE_SIZE);

        let bodyLines = [];
        if (bookData.ctaBody) {
          bodyLines = wrapText(bookData.ctaBody, textW, BODY_SIZE);
        }

        // Visual height of each multi-line block = capH + (N-1) * lineHeight
        const titleBlockH = titleCapH + Math.max(0, ctaLines.length - 1) * TITLE_LINE_H;
        const bodyBlockH = bodyLines.length > 0
          ? bodyCapH + Math.max(0, bodyLines.length - 1) * BODY_LINE_H
          : 0;

        // Total visual height of the whole CTA block
        let totalH = HEADER_BAR_H + GAP_HEADER_TO_TITLE + titleBlockH;
        if (bodyLines.length > 0) totalH += GAP_TITLE_TO_BODY + bodyBlockH;
        if (bookData.ctaUrl) {
          totalH += (bodyLines.length > 0 ? GAP_BODY_TO_URL : GAP_TITLE_TO_URL) + URL_BAR_H;
        }

        // Vertically center the block on the page with a slight upper bias.
        const availableH = SPEC.pageH;
        let y = Math.max(60, (availableH - totalH) * 0.40);

        // READER BONUS header bar
        doc.setFillColor(30, 30, 30);
        doc.rect(textX, y, textW, HEADER_BAR_H, "F");
        const headerSize = 18;
        doc.setFont(BODY_FONT, "bold"); doc.setFontSize(headerSize); doc.setTextColor(255);
        doc.text("READER BONUS", centerX, barBaseline(y, HEADER_BAR_H, headerSize), { align: "center" });
        doc.setTextColor(30);

        // Main title — first cap-top sits GAP_HEADER_TO_TITLE below the bar
        const titleCapTop = y + HEADER_BAR_H + GAP_HEADER_TO_TITLE;
        doc.setFont(BODY_FONT, "bold"); doc.setFontSize(TITLE_SIZE);
        let lastTitleBaseline = titleCapTop + titleCapH;
        for (let i = 0; i < ctaLines.length; i++) {
          const baseline = titleCapTop + titleCapH + i * TITLE_LINE_H;
          doc.text(ctaLines[i], centerX, baseline, { align: "center" });
          lastTitleBaseline = baseline;
        }

        // Description text — first cap-top sits GAP_TITLE_TO_BODY below the last title baseline
        let lastVisibleBaseline = lastTitleBaseline;
        if (bodyLines.length > 0) {
          const bodyCapTop = lastTitleBaseline + GAP_TITLE_TO_BODY;
          doc.setFontSize(BODY_SIZE); doc.setFont(BODY_FONT, "normal");
          let lastBodyBaseline = bodyCapTop + bodyCapH;
          for (let i = 0; i < bodyLines.length; i++) {
            const baseline = bodyCapTop + bodyCapH + i * BODY_LINE_H;
            doc.text(bodyLines[i], centerX, baseline, { align: "center" });
            lastBodyBaseline = baseline;
          }
          lastVisibleBaseline = lastBodyBaseline;
        }

        // URL in black bar — bar top sits the appropriate gap below the last baseline
        if (bookData.ctaUrl) {
          const gap = (bodyLines.length > 0) ? GAP_BODY_TO_URL : GAP_TITLE_TO_URL;
          const urlBarTop = lastVisibleBaseline + gap;
          doc.setFillColor(30, 30, 30);
          doc.rect(textX, urlBarTop, textW, URL_BAR_H, "F");
          doc.setFont(BODY_FONT, "normal"); doc.setTextColor(255);
          const maxUrlWidth = textW - 32;
          let urlSize = 16;
          doc.setFontSize(urlSize);
          while (doc.getTextWidth(bookData.ctaUrl) > maxUrlWidth && urlSize > 9) {
            urlSize -= 0.5;
            doc.setFontSize(urlSize);
          }
          doc.text(bookData.ctaUrl, centerX, barBaseline(urlBarTop, URL_BAR_H, urlSize), { align: "center" });
          doc.setTextColor(30);
        }
      }

      onProgress("Generating front matter...");
      newPage(); newPage();

      // FRONT CTA: before title page
      if (bookData.ctaTitle) {
        newPage();
        renderCTAPage();
        newPage();
      }

      newPage();
      let ty = 140;
      doc.setFont(BODY_FONT, "bold"); doc.setFontSize(28); doc.setTextColor(30);
      const titleLines = wrapText(bookData.title, getTextWidth(), 28, "bold");
      for (const line of titleLines) { doc.text(line, getCenterX(), ty, { align: "center" }); ty += 35; }
      ty += 10; doc.setDrawColor(30); doc.setLineWidth(0.5);
      doc.line(getCenterX() - 80, ty, getCenterX() + 80, ty); ty += 25;
      if (bookData.subtitle) {
        doc.setFont(BODY_FONT, "normal"); doc.setFontSize(16);
        const subLines = wrapText(bookData.subtitle, getTextWidth(), 16);
        for (const line of subLines) { doc.text(line, getCenterX(), ty, { align: "center" }); ty += 22; }
      }
      ty = 430; doc.setFont(BODY_FONT, "bold"); doc.setFontSize(14);
      doc.text(bookData.author.toUpperCase(), getCenterX(), ty, { align: "center" });

      newPage();
      // Copyright page: start block around 35% down the page so the text sits in the upper
      // middle of the page, which is the standard placement for a copyright/imprint page.
      ty = 200; doc.setFont(BODY_FONT, "normal"); doc.setFontSize(9); doc.setTextColor(60);
      if (bookData.publisher) { doc.text("PUBLISHED BY " + bookData.publisher.toUpperCase(), getCenterX(), ty, { align: "center" }); ty += 20; }
      doc.text("Copyright \u00A9 " + new Date().getFullYear() + " by " + bookData.author, getCenterX(), ty, { align: "center" }); ty += 18;
      const copyrightText = bookData.copyrightText || "All rights reserved. Without limiting the rights under copyright reserved above, no part of this book may be reproduced, stored, or introduced into a retrieval system, or transmitted, in any form or by any means (electronic, mechanical, photocopying, recording or otherwise), without the prior written permission of both the copyright owner and the publisher.";
      const copLines = wrapText(copyrightText, getTextWidth() - 40, 9);
      for (const line of copLines) { doc.text(line, getCenterX(), ty, { align: "center" }); ty += 13; }
      if (bookData.isbn) { ty += 10; doc.text("ISBN: " + bookData.isbn, getCenterX(), ty, { align: "center" }); }
      doc.setTextColor(30);

      if (bookData.dedication) {
        newPage(); ty = 150;
        doc.setFont(EPIGRAPH_FONT, "italic"); doc.setFontSize(10);
        const dedLines = bookData.dedication.split("\n").filter(function(l) { return l.trim(); });
        for (const para of dedLines) {
          const wrapped = wrapText(para, getTextWidth() - 20, 10, "italic");
          for (const line of wrapped) { doc.text(line, getCenterX(), ty, { align: "center" }); ty += 16; }
          ty += 10;
        }
        newPage();
      }

      // ---- TWO-PASS RENDERING ----
      // Pass 1: Dry run to calculate chapter page numbers (no actual rendering)
      // Pass 2: Render everything with correct TOC page numbers
      
      onProgress("Calculating page layout...");
      
      // Helper: calculate how many pages a chapter's body text will take
      function calcBodyPages(ch, startY) {
        const textW = SPEC.pageW - SPEC.margins.recto.inside - SPEC.margins.recto.outside; // use recto for calc
        const maxY = SPEC.pageH - 50;
        // splitChapterBody promotes embedded scene-break lines to their
        // own paragraphs (handles pastes where "* * *" sits between prose
        // with only single newlines around it).
        const paragraphs = splitChapterBody(ch.body);
        let y = startY;
        let pages = 1;
        let isFirstPara = true;

        for (let pi = 0; pi < paragraphs.length; pi++) {
          const para = paragraphs[pi];
          const cls = classifyParagraph(para);

          // First paragraph with drop cap (body only — a heading at the top of
          // a chapter does not get a drop cap).
          if (isFirstPara && cls.type === "body" && para.length > 0) {
            const dc = pickDropCap(para);
            if (!dc) {
              const fl = doc.splitTextToSize(para, textW);
              for (const line of fl) { if (y > maxY) { pages++; y = bodyTopY(); } y += SPEC.lineHeight; }
              isFirstPara = false; y += SPEC.paraGap; continue;
            }
            const dropLetter = dc.letter;
            doc.setFont(BODY_FONT, "normal"); doc.setFontSize(getDropCapSize());
            const rawDropCapWidth = doc.getTextWidth(dropLetter);
            const dropCapWidth = dropCapTuckedWidth(rawDropCapWidth, dropLetter) + 5;
            doc.setFontSize(SPEC.bodySize);
            const narrowWidth = textW - dropCapWidth - 5;

            if (containsFormatting(para)) {
              // Run-based drop cap: parse the remaining text into runs and
              // count lines via layoutRunsMixed with [narrow, narrow, narrow, full].
              const runs = parseInlineRuns(dc.rest);
              const widths = [narrowWidth, narrowWidth, narrowWidth, textW];
              const lines = layoutRunsMixed(doc, runs, widths, SPEC.bodySize, BODY_FONT);
              for (let li = 0; li < lines.length; li++) {
                if (y > maxY) { pages++; y = bodyTopY(); }
                y += SPEC.lineHeight;
              }
            } else {
              // Hyphenation-aware breaker; first 3 lines are narrow (next to
              // drop cap), subsequent lines are full width.
              const widths = [narrowWidth, narrowWidth, narrowWidth, textW];
              const lines = breakIntoJustifiedLines(doc, dc.rest, widths, SPEC.bodySize, BODY_FONT);
              for (let li = 0; li < lines.length; li++) {
                if (y > maxY) { pages++; y = bodyTopY(); }
                y += SPEC.lineHeight;
              }
            }
            isFirstPara = false; y += SPEC.paraGap; continue;
          }

          // Image block. Look up the image in chapter.images, compute its
          // rendered size, and reserve that vertical space. If it would
          // overflow the current page, push it to a new page.
          //
          // Spacing: we want visible padding on both sides of the image that
          // looks even. The previous block already left `paraGap` of trailing
          // space — backtrack that and substitute a symmetric IMAGE_GAP both
          // above and below. The image renderer below DOES NOT add a trailing
          // paraGap because IMAGE_GAP handles separation from the next block.
          if (cls.type === "image") {
            const IMAGE_GAP = SPEC.lineHeight; // visible padding above & below
            const img = ch.images && ch.images[cls.imageId];
            if (!img || !img.dataUrl) {
              if (y > maxY) { pages++; y = bodyTopY(); }
              y += SPEC.lineHeight + SPEC.paraGap;
              continue;
            }
            const maxImageW = textW;
            const maxImageH = (SPEC.pageH - bodyTopY() - 50) * 0.85;
            const size = computeImageRenderSize(img.naturalWidth, img.naturalHeight, maxImageW, maxImageH);
            // Roll back the previous block's trailing paraGap so it doesn't
            // stack on top of IMAGE_GAP, then add IMAGE_GAP above.
            y = y - SPEC.paraGap + IMAGE_GAP;
            // Page break if the image + below-image gap wouldn't fit.
            if (y + size.height + IMAGE_GAP > maxY) {
              pages++; y = bodyTopY();
            }
            y += size.height + IMAGE_GAP;
            continue;
          }

          // Table block. Measure the rendered height on a sacrificial jsPDF
          // instance (jspdf-autotable can't be asked for a height without
          // actually drawing), then reserve that space in the dry-run page
          // count so the TOC stays accurate.
          if (cls.type === "table") {
            const TABLE_GAP = SPEC.lineHeight; // same symmetric padding as images
            y = y - SPEC.paraGap + TABLE_GAP;
            let tableHeight = 0;
            let tablePagesUsed = 0;
            try {
              const tempDoc = new (window.jspdf ? window.jspdf.jsPDF : jsPDF)({ unit: "pt", format: [SPEC.pageW, SPEC.pageH], compress: true });
              const startPage = tempDoc.internal.getNumberOfPages();
              tempDoc.autoTable(buildAutoTableOptions(cls.table, SPEC.margins.recto.inside, textW, y, bodyTopY()));
              const endPage = tempDoc.internal.getNumberOfPages();
              tablePagesUsed = endPage - startPage;
              tableHeight = tempDoc.lastAutoTable.finalY - y;
            } catch (e) {
              // Fallback: rough estimate if autotable isn't available
              tableHeight = (cls.table.rows.length + 1) * (SPEC.lineHeight + 8);
            }
            if (tablePagesUsed > 0) {
              pages += tablePagesUsed;
              // After autotable spans pages, y resumes at top of the last
              // page (since autotable's finalY is page-relative to the last
              // page it drew on). Approximate by setting y to bodyTopY() +
              // any remaining content on the final page.
              y = bodyTopY() + ((tableHeight % SPEC.pageH) || 0);
            } else {
              if (y + tableHeight + TABLE_GAP > maxY) {
                pages++; y = bodyTopY();
              }
              y += tableHeight;
            }
            y += TABLE_GAP;
            continue;
          }

          // Scene break ornament ("* * *"). Reserve one line above, one line
          // for the ornament, one line below — roughly 3 line-heights of
          // vertical space. Does NOT consume isFirstPara: a chapter that
          // opens with a break still drops the cap on the first body
          // paragraph that follows.
          if (cls.type === "scenebreak") {
            const needed = SPEC.lineHeight * 3;
            if (y + needed > maxY) { pages++; y = bodyTopY(); }
            y += SPEC.lineHeight;       // space above
            y += SPEC.lineHeight;       // ornament line
            y += SPEC.lineHeight;       // space below
            continue;
          }

          // H2 / H3 headings. Smart break: never let a heading dangle alone at
          // the bottom of a page — reserve ~2 body lines beneath it.
          if (cls.type === "h2" || cls.type === "h3") {
            const subSize = cls.type === "h2" ? SPEC.bodySize + 3 : SPEC.bodySize + 1;
            const subLineHeight = subSize * 1.35;
            const gapAbove = cls.type === "h2" ? SPEC.paraGap * 2 : SPEC.paraGap * 1.5;
            const gapBelow = cls.type === "h2" ? 4 : 3;
            doc.setFont(BODY_FONT, "bold"); doc.setFontSize(subSize);

            let subLineCount;
            if (containsFormatting(cls.text)) {
              const headRuns = parseInlineRuns(cls.text).map(function(r) {
                return { text: r.text, style: r.style === "italic" ? "italic" : "bold" };
              });
              subLineCount = layoutRunsMixed(doc, headRuns, textW, subSize, BODY_FONT).length;
            } else {
              subLineCount = doc.splitTextToSize(cls.text, textW).length;
            }
            const needed = gapAbove + subLineCount * subLineHeight + gapBelow + (SPEC.lineHeight * 2);

            if (y + needed > maxY) {
              pages++; y = bodyTopY();
            }
            y += gapAbove;
            for (let _i = 0; _i < subLineCount; _i++) y += subLineHeight;
            y += gapBelow;
            continue;
          }

          // Regular body paragraph
          doc.setFont(BODY_FONT, "normal"); doc.setFontSize(SPEC.bodySize);
          let bodyLineCount;
          if (containsFormatting(para)) {
            const runs = parseInlineRuns(para);
            bodyLineCount = layoutRunsMixed(doc, runs, textW, SPEC.bodySize, BODY_FONT).length;
          } else {
            // Hyphenation-aware line counter — must match the renderer in
            // pass 2 exactly so TOC page numbers stay accurate.
            bodyLineCount = breakIntoJustifiedLines(doc, para, textW, SPEC.bodySize, BODY_FONT).length;
          }

          // Apply same widow/orphan control as in rendering
          if (WIDOW_ORPHAN.enabled && bodyLineCount > 0) {
            let linesOnCurrentPage = 0;
            let tempY = y;
            for (let _i = 0; _i < bodyLineCount; _i++) {
              if (tempY > maxY) break;
              linesOnCurrentPage++;
              tempY += SPEC.lineHeight;
            }
            const remainingLines = bodyLineCount - linesOnCurrentPage;
            if ((remainingLines > 0 && remainingLines <= WIDOW_ORPHAN.minLinesAtPageStart) ||
                (linesOnCurrentPage > 0 && linesOnCurrentPage <= WIDOW_ORPHAN.minLinesAtPageEnd && remainingLines > 0)) {
              if (linesOnCurrentPage > 0) {
                pages++; y = bodyTopY();
              }
            }
          }

          for (let _i = 0; _i < bodyLineCount; _i++) {
            if (y > maxY) { pages++; y = bodyTopY(); }
            y += SPEC.lineHeight;
          }
          y += SPEC.paraGap;
        }
        return pages;
      }

      // Calculate chapter opening Y position. textW and the epigraph wrap width
      // (textW - 60) are derived from SPEC the same way pass 2 derives them via
      // getTextWidth(), so they cannot drift apart if margins ever change.
      function calcOpeningHeight(ch) {
        const textW = SPEC.pageW - SPEC.margins.recto.inside - SPEC.margins.recto.outside;
        let y = 55;
        if (ch.num) y += 45;
        // Title - use same smart wrapping as actual rendering
        const titleWrapped = wrapTitle(ch.title, textW, SPEC.chapterTitleSize);
        y += titleWrapped.length * 28 + 35;
        // Epigraph
        if (ch.epigraph) {
          doc.setFont(EPIGRAPH_FONT, "italic"); doc.setFontSize(14);
          const epLines = doc.splitTextToSize("\u201C" + ch.epigraph + "\u201D", textW - 60);
          y += epLines.length * 20;
          if (ch.epigraphAttribution) y += 20;
          y += 30;
        } else { y += 25; }
        return y;
      }

      // PASS 1: Calculate page numbers
      const chapterPageNumbers = [];
      let currentArabicPage = 1;
      
      for (let ci = 0; ci < chapters.length; ci++) {
        const ch = chapters[ci];
        // Chapters start on odd pages
        if (currentArabicPage % 2 === 0) currentArabicPage++;
        chapterPageNumbers.push(currentArabicPage);
        
        const openingY = calcOpeningHeight(ch);
        const bodyPages = calcBodyPages(ch, openingY);
        currentArabicPage += bodyPages;
      }

      // ---- PASS 2: RENDER TOC WITH CORRECT PAGE NUMBERS ----
      // TOC typography (trade-book convention used by Penguin, Random House,
      // O'Reilly, etc.):
      //   * "Contents" heading: 18pt bold — smaller than the 20pt chapter
      //     titles so the TOC reads as a reference, not a competing display.
      //   * Entries: match SPEC.bodySize (10pt default / 11pt spacious) so
      //     TOC rhythm is consistent with body text in the chapters.
      //   * Row spacing: 2x line-height for breathing room without bloat.
      onProgress("Building table of contents...");
      newPage(); ty = 60;
      doc.setFont(BODY_FONT, "bold"); doc.setFontSize(18); doc.setTextColor(30);
      doc.text("Contents", getCenterX(), ty, { align: "center" }); ty += 44;

      const tocTextX = getTextX();
      const tocTextW = getTextWidth();
      const tocEntrySize = SPEC.bodySize;
      const tocRowAdvance = SPEC.lineHeight * 2;

      // Compute the widest page number actually in this TOC so that short books
      // (single-digit pages) do not waste a two-digit reservation and truncate titles.
      // Skip chapters flagged as excluded from the TOC (back matter like
      // "About the Author", "Acknowledgments", etc.) — their pages still
      // exist in the book but their rows do not appear in the TOC.
      doc.setFont(BODY_FONT, "normal"); doc.setFontSize(tocEntrySize);
      let maxPageNumWidth = 0;
      for (let i = 0; i < chapters.length; i++) {
        if (chapters[i].includeInToc === false) continue;
        const w = doc.getTextWidth(String(chapterPageNumbers[i]));
        if (w > maxPageNumWidth) maxPageNumWidth = w;
      }

      // Consistent dot spacing: measure one dot glyph width + a fixed gap, used for every row.
      const dotGlyphWidth = doc.getTextWidth(".");
      const dotStep = dotGlyphWidth + 3; // 3pt gap between dots, same for every row

      for (let i = 0; i < chapters.length; i++) {
        const ch = chapters[i];
        if (ch.includeInToc === false) continue;
        // In the real book TOC, titles are shown without "Chapter X:" prefix
        const displayTitle = ch.title || ch.num;
        const pageNumStr = String(chapterPageNumbers[i]);

        doc.setFont(BODY_FONT, "normal"); doc.setFontSize(tocEntrySize); doc.setTextColor(30);

        // Reserve: [title] [gap] [dots...] [gap] [page num, right aligned]
        const gap = 6;
        const minDotsSpace = 18; // at least ~5 dots worth
        const maxTitleWidth = tocTextW - maxPageNumWidth - (gap * 2) - minDotsSpace;

        // Truncate title with ellipsis only if truly necessary
        let truncatedTitle = displayTitle;
        let titleWidth = doc.getTextWidth(truncatedTitle);
        if (titleWidth > maxTitleWidth) {
          while (titleWidth > maxTitleWidth && truncatedTitle.length > 10) {
            truncatedTitle = truncatedTitle.slice(0, -1);
            titleWidth = doc.getTextWidth(truncatedTitle + "\u2026");
          }
          truncatedTitle = truncatedTitle + "\u2026";
          titleWidth = doc.getTextWidth(truncatedTitle);
        }

        // Draw title (left)
        doc.text(truncatedTitle, tocTextX, ty);

        // Draw page number (right)
        const pageNumX = tocTextX + tocTextW;
        doc.text(pageNumStr, pageNumX, ty, { align: "right" });

        // Draw dot leaders between, using the same dotStep for every row so density is consistent
        const dotsStart = tocTextX + titleWidth + gap;
        const dotsEnd = pageNumX - maxPageNumWidth - gap;
        if (dotsEnd > dotsStart) {
          // Right-align the dots against the page-number column so dots end at the same x on every row
          let dotX = dotsEnd;
          while (dotX >= dotsStart) {
            doc.text(".", dotX, ty);
            dotX -= dotStep;
          }
        }

        ty += tocRowAdvance;
        if (ty > SPEC.pageH - 80) { newPage(); ty = 60; }
      }
      newPage(); // blank after TOC

      // ---- PASS 2: RENDER CHAPTERS ----
      for (let ci = 0; ci < chapters.length; ci++) {
        const ch = chapters[ci];
        onProgress("Formatting chapter " + (ci + 1) + " of " + chapters.length + "...");
        
        // Chapters always start on a recto (right-hand) page.
        // Advance one page off the previous content, then if that landed us on a
        // verso, advance once more (so the verso ends up blank, the chapter on recto).
        newPage();
        if (!isRecto()) newPage();
        
        bookPageNum = chapterPageNumbers[ci];
        // textX/textW are mutable across the chapter render because the
        // mirrored verso/recto margins flip the text-block X position on
        // every page boundary. They MUST be re-captured after every
        // newPage() call inside this loop — see the bodyTopY() + resetBodyFont
        // pattern below, which now also refreshes textX/textW.
        let textW = getTextWidth();
        let textX = getTextX();
        let y = 55;

        // Chapter number label. If there's no number (section pages like "Making It
        // Happen"), still advance y by the same amount so the title baseline matches
        // a regular chapter's title baseline. This keeps the visual grid consistent
        // across numbered chapters and named sections.
        if (ch.num) {
          doc.setFont(BODY_FONT, "normal"); doc.setFontSize(SPEC.chapterNumSize); doc.setTextColor(30);
          doc.text(ch.num, getCenterX(), y, { align: "center" });
          y += 45;
        } else {
          y += 45;
        }

        // Chapter title
        doc.setFont(BODY_FONT, "bold"); doc.setFontSize(SPEC.chapterTitleSize);
        const titleWrapped = wrapTitle(ch.title, textW, SPEC.chapterTitleSize);
        for (const line of titleWrapped) { doc.text(line, getCenterX(), y, { align: "center" }); y += 28; }
        y += 35;

        // Epigraph
        if (ch.epigraph) {
          doc.setFont(EPIGRAPH_FONT, "italic"); doc.setFontSize(14);
          const epText = "\u201C" + ch.epigraph + "\u201D";
          const epLines = wrapText(epText, textW - 60, 14, "italic");
          for (const line of epLines) { doc.text(line, getCenterX(), y, { align: "center" }); y += 20; }
          if (ch.epigraphAttribution) { 
            y += 5; 
            doc.setFontSize(12); 
            doc.text("\u2013 " + ch.epigraphAttribution, getCenterX(), y, { align: "center" }); 
            y += 15; 
          }
          y += 30;
        } else { 
          y += 25; 
        }

        // Body text with drop cap on first paragraph. Same splitter as
        // pass 1 — scene-break lines are promoted to their own paragraphs.
        const paragraphs = splitChapterBody(ch.body);
        let isFirstPara = true;
        const maxY = SPEC.pageH - 50;
        let pagesUsed = 0;

        // Consistent baseline offset for all body text lines.
        // A line advances y by SPEC.lineHeight (15pt). The baseline of the glyph within that
        // slot sits at a fixed offset from the top. Using bodySize * 0.8 throughout matches
        // how non-drop-cap chapters render and keeps rhythm consistent.
        const BASELINE_OFFSET = SPEC.bodySize * 0.8;

        for (let pi = 0; pi < paragraphs.length; pi++) {
          let para = paragraphs[pi];
          const cls = classifyParagraph(para);

          // First paragraph with drop cap (body only — a heading at the top
          // of a chapter does not get a drop cap).
          if (isFirstPara && cls.type === "body" && para.length > 0) {
            const dc = pickDropCap(para);
            if (!dc) {
              isFirstPara = false;
              pi--; continue;
            }
            const dropLetter = dc.letter;
            const restText = dc.rest;

            // Drop cap positioning (unchanged from prior versions):
            // Top of the drop cap's cap-height sits flush with the top of the
            // first body line's cap-height. jsPDF positions by baseline, so:
            //   firstLineCapTop = (y + BASELINE_OFFSET) - (bodySize * capHeightRatio)
            //   dropCapBaseline = firstLineCapTop + (dropCapSize * capHeightRatio)
            const dropCapSize = getDropCapSize();
            doc.setFont(BODY_FONT, "normal"); doc.setFontSize(dropCapSize); doc.setTextColor(30);
            const rawDropCapWidth = doc.getTextWidth(dropLetter);
            const dropCapWidth = dropCapTuckedWidth(rawDropCapWidth, dropLetter) + 5;
            const firstLineCapTop = (y + BASELINE_OFFSET) - (SPEC.bodySize * SPEC.capHeightRatio);
            const dropCapBaseline = firstLineCapTop + (dropCapSize * SPEC.capHeightRatio);
            doc.text(dropLetter, textX, dropCapBaseline);

            doc.setFontSize(SPEC.bodySize);
            const narrowWidth = textW - dropCapWidth - 5;

            if (containsFormatting(para)) {
              // Run-based drop cap body: parse the rest into runs, lay out
              // with [narrow, narrow, narrow, full] widths, drawRunLine each.
              // Ragged-right (drawRunLine doesn't justify).
              const runs = parseInlineRuns(restText);
              const widths = [narrowWidth, narrowWidth, narrowWidth, textW];
              const lines = layoutRunsMixed(doc, runs, widths, SPEC.bodySize, BODY_FONT);
              doc.setTextColor(30);
              for (let li = 0; li < lines.length; li++) {
                if (y > maxY) { newPage(); pagesUsed++; addRunningHeader(ch.title || ch.num || ""); addPageNumber(bookPageNum + pagesUsed); y = bodyTopY(); resetBodyFont(); textX = getTextX(); textW = getTextWidth(); }
                const x = li < SPEC.dropCapLines ? textX + dropCapWidth : textX;
                drawRunLine(doc, lines[li], x, y + BASELINE_OFFSET, SPEC.bodySize, BODY_FONT);
                y += SPEC.lineHeight;
              }
              resetBodyFont();
              isFirstPara = false; y += SPEC.paraGap; continue;
            }

            // Plain drop cap body (no inline markers) — hyphenation-aware
            // line breaker + justify renderer. First 3 lines are narrow
            // (next to the drop cap), subsequent lines are full width.
            const widths = [narrowWidth, narrowWidth, narrowWidth, textW];
            const lines = breakIntoJustifiedLines(doc, restText, widths, SPEC.bodySize, BODY_FONT);
            for (let li = 0; li < lines.length; li++) {
              if (y > maxY) { newPage(); pagesUsed++; addRunningHeader(ch.title || ch.num || ""); addPageNumber(bookPageNum + pagesUsed); y = bodyTopY(); resetBodyFont(); textX = getTextX(); textW = getTextWidth(); }
              const isNarrow = li < SPEC.dropCapLines;
              const lineX = isNarrow ? textX + dropCapWidth : textX;
              const lineMaxW = isNarrow ? narrowWidth : textW;
              const isLastLine = li === lines.length - 1;
              drawJustifiedLine(doc, lines[li], lineX, y + BASELINE_OFFSET, lineMaxW, isLastLine);
              y += SPEC.lineHeight;
            }
            isFirstPara = false; y += SPEC.paraGap; continue;
          }

          // Image block. Mirrors the pass-1 sizing logic so TOC page numbers
          // stay accurate. Center horizontally inside the text column, draw
          // via jsPDF's addImage. If the image won't fit on the current page
          // do a clean page break first (header + footer follow).
          //
          // Spacing: ensure even visible padding above and below the image.
          // The previous block already added a small trailing paraGap; we
          // roll that back and substitute IMAGE_GAP (one line height) on
          // each side. The image renderer DOES NOT then add paraGap below
          // because IMAGE_GAP already handles separation from the next block.
          if (cls.type === "image") {
            const IMAGE_GAP = SPEC.lineHeight;
            const img = ch.images && ch.images[cls.imageId];
            if (!img || !img.dataUrl) {
              if (y > maxY) { newPage(); pagesUsed++; addRunningHeader(ch.title || ch.num || ""); addPageNumber(bookPageNum + pagesUsed); y = bodyTopY(); resetBodyFont(); textX = getTextX(); textW = getTextWidth(); }
              doc.setFont(BODY_FONT, "italic"); doc.setFontSize(SPEC.bodySize); doc.setTextColor(120);
              doc.text("[missing image: " + cls.imageId + "]", textX, y + BASELINE_OFFSET);
              doc.setTextColor(30); resetBodyFont();
              y += SPEC.lineHeight + SPEC.paraGap;
              continue;
            }
            const maxImageW = textW;
            const maxImageH = (SPEC.pageH - bodyTopY() - 50) * 0.85;
            const size = computeImageRenderSize(img.naturalWidth, img.naturalHeight, maxImageW, maxImageH);
            // Roll back previous paraGap, then add IMAGE_GAP above.
            y = y - SPEC.paraGap + IMAGE_GAP;
            // Page break if the image + below-image gap wouldn't fit.
            if (y + size.height + IMAGE_GAP > maxY) {
              newPage(); pagesUsed++;
              addRunningHeader(ch.title || ch.num || "");
              addPageNumber(bookPageNum + pagesUsed);
              y = bodyTopY(); resetBodyFont(); textX = getTextX(); textW = getTextWidth();
            }
            const drawX = textX + (textW - size.width) / 2;
            const fmt = getImageFormatFromDataUrl(img.dataUrl);
            try {
              doc.addImage(img.dataUrl, fmt.jsPdfFormat, drawX, y, size.width, size.height);
            } catch (e) {
              doc.setFont(BODY_FONT, "italic"); doc.setFontSize(SPEC.bodySize); doc.setTextColor(120);
              doc.text("[image error: " + cls.imageId + "]", textX, y + BASELINE_OFFSET);
              doc.setTextColor(30); resetBodyFont();
            }
            y += size.height + IMAGE_GAP;
            continue;
          }

          // Table block. Render with jspdf-autotable. We hook didDrawPage so
          // when autotable spans multiple pages, our running header + page
          // number get drawn on each new page just like a normal page break.
          if (cls.type === "table") {
            const TABLE_GAP = SPEC.lineHeight;
            y = y - SPEC.paraGap + TABLE_GAP;
            // If the table can't fit any rows on the current page, push to next
            // page first so autotable doesn't start with just the header.
            const minTableHeight = (SPEC.lineHeight + 8) * 2; // header + 1 row roughly
            if (y + minTableHeight > maxY) {
              newPage(); pagesUsed++;
              addRunningHeader(ch.title || ch.num || "");
              addPageNumber(bookPageNum + pagesUsed);
              y = bodyTopY(); resetBodyFont(); textX = getTextX(); textW = getTextWidth();
            }
            const opts = buildAutoTableOptions(cls.table, textX, textW, y, bodyTopY());
            // Use the same body font that the rest of the chapter uses.
            opts.styles.font = BODY_FONT;
            opts.headStyles.font = BODY_FONT;
            // Track new pages autotable creates so our running header /
            // page number appear on them too.
            const chTitle = ch.title || ch.num || "";
            opts.didDrawPage = function(data) {
              if (data.pageNumber > 1) {
                pageNum++;
                pagesUsed++;
                addRunningHeader(chTitle);
                addPageNumber(bookPageNum + pagesUsed);
              }
            };
            try {
              doc.autoTable(opts);
              y = doc.lastAutoTable.finalY + TABLE_GAP;
            } catch (e) {
              console.warn("Table render failed:", e);
              doc.setFont(BODY_FONT, "italic"); doc.setFontSize(SPEC.bodySize); doc.setTextColor(120);
              doc.text("[table render error]", textX, y + BASELINE_OFFSET);
              doc.setTextColor(30); resetBodyFont();
              y += SPEC.lineHeight + TABLE_GAP;
            }
            resetBodyFont();
            continue;
          }

          // Scene break ornament. Draws three centered asterisks at body
          // size on the text-block midline, with one line of breathing room
          // above and below. Mirrors the dry-run height accounting in
          // calcBodyPages so the TOC stays accurate.
          if (cls.type === "scenebreak") {
            const needed = SPEC.lineHeight * 3;
            if (y + needed > maxY) {
              newPage(); pagesUsed++;
              addRunningHeader(ch.title || ch.num || "");
              addPageNumber(bookPageNum + pagesUsed);
              y = bodyTopY(); resetBodyFont(); textX = getTextX(); textW = getTextWidth();
            }
            y += SPEC.lineHeight;  // breathing room above
            doc.setFont(BODY_FONT, "normal");
            doc.setFontSize(SPEC.bodySize);
            doc.setTextColor(30);
            doc.text("* * *", getCenterX(), y + BASELINE_OFFSET, { align: "center" });
            y += SPEC.lineHeight;  // ornament line
            y += SPEC.lineHeight;  // breathing room below
            resetBodyFont();
            continue;
          }

          // H2 / H3 headings. Reserve at least 2 body lines beneath so the
          // heading does not dangle alone at the bottom of a page.
          if (cls.type === "h2" || cls.type === "h3") {
            const subSize = cls.type === "h2" ? SPEC.bodySize + 3 : SPEC.bodySize + 1;
            const subLineHeight = subSize * 1.35;
            const gapAbove = cls.type === "h2" ? SPEC.paraGap * 2 : SPEC.paraGap * 1.5;
            const gapBelow = cls.type === "h2" ? 4 : 3;

            doc.setFont(BODY_FONT, "bold"); doc.setFontSize(subSize);

            // Two parallel forms: run-based when the heading has inline
            // markers, plain splitTextToSize otherwise.
            let plainSubLines = null;
            let runSubLines = null;
            if (containsFormatting(cls.text)) {
              const headRuns = parseInlineRuns(cls.text).map(function(r) {
                return { text: r.text, style: r.style === "italic" ? "italic" : "bold" };
              });
              runSubLines = layoutRunsMixed(doc, headRuns, textW, subSize, BODY_FONT);
            } else {
              plainSubLines = doc.splitTextToSize(cls.text, textW);
            }
            const subLineCount = (runSubLines || plainSubLines).length;
            const needed = gapAbove + subLineCount * subLineHeight + gapBelow + (SPEC.lineHeight * 2);

            if (y + needed > maxY) {
              newPage(); pagesUsed++; addRunningHeader(ch.title || ch.num || "");
              addPageNumber(bookPageNum + pagesUsed);
              y = bodyTopY(); resetBodyFont(); textX = getTextX(); textW = getTextWidth();
            }

            y += gapAbove;
            doc.setFont(BODY_FONT, "bold"); doc.setFontSize(subSize); doc.setTextColor(30);
            if (runSubLines) {
              for (const line of runSubLines) {
                drawRunLine(doc, line, textX, y + subSize * 0.8, subSize, BODY_FONT);
                y += subLineHeight;
              }
            } else {
              for (const sline of plainSubLines) {
                doc.text(sline, textX, y + subSize * 0.8);
                y += subLineHeight;
              }
            }
            y += gapBelow;
            resetBodyFont();
            continue;
          }

          // Regular body paragraph. Formatted paragraphs render through
          // drawRunLine and are ragged-right; plain paragraphs keep the
          // existing justified rendering so unformatted chapters look
          // identical to v0.7.x.
          doc.setFont(BODY_FONT, "normal"); doc.setFontSize(SPEC.bodySize); doc.setTextColor(30);

          if (containsFormatting(para)) {
            const runs = parseInlineRuns(para);
            const runLines = layoutRunsMixed(doc, runs, textW, SPEC.bodySize, BODY_FONT);

            // Widow/orphan control mirrors the plain-text path below.
            if (WIDOW_ORPHAN.enabled && runLines.length > 0) {
              let linesOnCurrentPage = 0;
              let tempY = y;
              for (let _i = 0; _i < runLines.length; _i++) {
                if (tempY > maxY) break;
                linesOnCurrentPage++;
                tempY += SPEC.lineHeight;
              }
              const remainingLines = runLines.length - linesOnCurrentPage;
              if (remainingLines > 0 && remainingLines <= WIDOW_ORPHAN.minLinesAtPageStart) {
                if (linesOnCurrentPage > 0) {
                  newPage(); pagesUsed++; addRunningHeader(ch.title || ch.num || "");
                  addPageNumber(bookPageNum + pagesUsed);
                  y = bodyTopY(); resetBodyFont(); textX = getTextX(); textW = getTextWidth();
                }
              } else if (linesOnCurrentPage > 0 && linesOnCurrentPage <= WIDOW_ORPHAN.minLinesAtPageEnd && remainingLines > 0) {
                newPage(); pagesUsed++; addRunningHeader(ch.title || ch.num || "");
                addPageNumber(bookPageNum + pagesUsed);
                y = bodyTopY(); resetBodyFont(); textX = getTextX(); textW = getTextWidth();
              }
            }

            for (const line of runLines) {
              if (y > maxY) { newPage(); pagesUsed++; addRunningHeader(ch.title || ch.num || ""); addPageNumber(bookPageNum + pagesUsed); y = bodyTopY(); resetBodyFont(); textX = getTextX(); textW = getTextWidth(); }
              drawRunLine(doc, line, textX, y + BASELINE_OFFSET, SPEC.bodySize, BODY_FONT);
              y += SPEC.lineHeight;
            }
            resetBodyFont();
            y += SPEC.paraGap;
            continue;
          }

          // Hyphenation-aware justify: build line objects with token-level
          // widths so the renderer can stretch inter-word spaces correctly
          // and draw "-" at any hyphenated line endings.
          const lines = breakIntoJustifiedLines(doc, para, textW, SPEC.bodySize, BODY_FONT);

          // Widow/orphan control
          if (WIDOW_ORPHAN.enabled && lines.length > 0) {
            // Check how many lines can fit on current page
            let linesOnCurrentPage = 0;
            let tempY = y;
            for (let _li = 0; _li < lines.length; _li++) {
              if (tempY > maxY) break;
              linesOnCurrentPage++;
              tempY += SPEC.lineHeight;
            }

            const remainingLines = lines.length - linesOnCurrentPage;

            // Widow prevention: if 1-2 lines would be left alone on next page
            if (remainingLines > 0 && remainingLines <= WIDOW_ORPHAN.minLinesAtPageStart) {
              // Force page break before this paragraph to keep it together
              if (linesOnCurrentPage > 0) {
                newPage(); pagesUsed++; addRunningHeader(ch.title || ch.num || "");
                addPageNumber(bookPageNum + pagesUsed);
                y = bodyTopY();
                resetBodyFont();
              }
            }

            // Orphan prevention: if only 1-2 lines would fit at bottom of current page
            else if (linesOnCurrentPage > 0 && linesOnCurrentPage <= WIDOW_ORPHAN.minLinesAtPageEnd && remainingLines > 0) {
              // Force page break to avoid orphaning just 1-2 lines
              newPage(); pagesUsed++; addRunningHeader(ch.title || ch.num || "");
              addPageNumber(bookPageNum + pagesUsed);
              y = bodyTopY();
              resetBodyFont();
            }
          }

          // Render all lines. Each line except the last is fully justified
          // (inter-word spaces stretched, hyphen drawn at hyphenated endings).
          // The last line stays left-aligned (ragged-right) per industry
          // convention so end-of-paragraph stretching doesn't leave awkward
          // gaps on a typically-short final line.
          for (let li = 0; li < lines.length; li++) {
            if (y > maxY) { newPage(); pagesUsed++; addRunningHeader(ch.title || ch.num || ""); addPageNumber(bookPageNum + pagesUsed); y = bodyTopY(); resetBodyFont(); textX = getTextX(); textW = getTextWidth(); }
            const isLastLine = li === lines.length - 1;
            drawJustifiedLine(doc, lines[li], textX, y + BASELINE_OFFSET, textW, isLastLine);
            y += SPEC.lineHeight;
          }
          y += SPEC.paraGap;
        }
      }

      // BACK CTA: one more pass at the end of the book, on a fresh recto so it
      // doesn't sit on the reverse of a chapter end. Same content as the front CTA.
      if (bookData.ctaTitle) {
        newPage();
        if (!isRecto()) newPage();
        renderCTAPage();
      }

      onProgress("Finalizing PDF...");
      return doc.output("blob");
    }

    // EPUB 3.0 generator. Produces a valid .epub zip that KDP, Apple Books, Kobo, and
    // Google Play all accept. Reflowable text (no fixed layout) since this is prose.
    async function generateEPUB(bookData, chapters, onProgress) {
      onProgress("Preparing EPUB...");

      if (typeof JSZip === "undefined") {
        throw new Error("JSZip not loaded. Please refresh the page.");
      }

      // Run smart quotes on all user text (same as PDF path)
      const ctaUrlOriginal = bookData && bookData.ctaUrl ? bookData.ctaUrl : "";
      bookData = smartQuotesDeep(bookData);
      if (bookData) bookData.ctaUrl = ctaUrlOriginal;
      chapters = smartQuotesDeep(chapters);

      const zip = new JSZip();

      // 1. mimetype file MUST be first and uncompressed
      zip.file("mimetype", "application/epub+zip", { compression: "STORE" });

      // 2. META-INF/container.xml - points to the OPF
      zip.folder("META-INF").file("container.xml",
        '<?xml version="1.0" encoding="UTF-8"?>\n' +
        '<container version="1.0" xmlns="urn:oasis:names:tc:opendocument:xmlns:container">\n' +
        '  <rootfiles>\n' +
        '    <rootfile full-path="OEBPS/content.opf" media-type="application/oebps-package+xml"/>\n' +
        '  </rootfiles>\n' +
        '</container>'
      );

      // 3. Stylesheet
      const css = [
        '@charset "UTF-8";',
        'body { font-family: Georgia, "Times New Roman", serif; line-height: 1.55; margin: 0 4%; color: #111; }',
        // IMPORTANT: h1 does NOT force a page break by itself. The page break is forced
        // by whichever element opens the chapter (chapter-num when present, h1 otherwise).
        // This prevents "Chapter 1" landing on one page and its title on the next.
        'h1 { font-size: 1.8em; font-weight: bold; text-align: center; margin: 2em 0 1em; page-break-after: avoid; break-after: avoid; }',
        'h2 { font-size: 1.25em; font-weight: bold; margin: 1.8em 0 0.5em; page-break-after: avoid; break-after: avoid; }',
        'p { margin: 0 0 0.6em; text-align: justify; text-indent: 0; }',
        'p.epigraph { font-style: italic; margin: 1.5em 2em; text-align: center; }',
        // Centered block image (body image markers ![alt](img-id))
        'p.figure { text-align: center; margin: 1.5em 0; }',
        'p.figure img { max-width: 100%; height: auto; }',
        // Markdown tables — reflowable, accessible, native to the EPUB reader.
        // Trade-book convention: table text 90% of body, more horizontal
        // padding than vertical, header slightly more padded.
        'table.md-table { border-collapse: collapse; margin: 1.5em 0; width: 100%; font-size: 0.9em; }',
        'table.md-table td { border: 0.5px solid #d0d0d0; padding: 5px 7px; vertical-align: top; }',
        'table.md-table th { border: 1px solid #8c8c8c; background: #f0f0f0; font-weight: bold; text-align: left; padding: 6px 7px; vertical-align: top; }',
        // Scene break ornament: three centered asterisks separated by spaces,
        // wide breathing room above and below to read clearly as a transition.
        'p.scene-break { text-align: center; margin: 1.8em 0; letter-spacing: 0.5em; }',
        'p.epigraph-attribution { font-style: italic; text-align: center; margin: 0 2em 2em; font-size: 0.95em; }',
        // chapter-num opens a new page; h1 that follows stays on the same page as the number.
        'p.chapter-num { text-align: center; font-size: 1.05em; margin: 2em 0 0.5em; page-break-before: always; break-before: page; page-break-after: avoid; break-after: avoid; }',
        // When there is no chapter-num (named section), h1 is the page opener. A dedicated
        // class handles this case so we do not put page-break-before on every h1.
        'h1.chapter-opener { page-break-before: always; break-before: page; }',
        'p.dedication { font-style: italic; text-align: center; margin: 1em 2em; }',
        'p.copyright { font-size: 0.85em; text-align: center; margin: 0.3em 0; }',
        'div.title-page { text-align: center; margin-top: 5em; page-break-before: always; break-before: page; }',
        'div.title-page h1 { font-size: 2.4em; page-break-before: auto; break-before: auto; }',
        'div.title-page .subtitle { font-style: italic; font-size: 1.2em; margin: 1em 2em; }',
        'div.title-page .author { font-weight: bold; margin-top: 3em; letter-spacing: 0.1em; text-transform: uppercase; }',
        'div.cta-page { text-align: center; margin: 3em 0; page-break-before: always; break-before: page; }',
        'div.cta-page .cta-banner { background: #111; color: #fff; padding: 0.8em; font-weight: bold; letter-spacing: 0.1em; margin-bottom: 2em; }',
        'div.cta-page .cta-title { font-size: 1.8em; font-weight: bold; margin: 1em 0; }',
        'div.cta-page .cta-body { font-size: 1.05em; margin: 2em 10%; }',
        'div.cta-page .cta-url { background: #111; color: #fff; padding: 0.8em; margin: 2em 0; font-weight: bold; word-break: break-all; }',
      ].join("\n");

      const oebps = zip.folder("OEBPS");
      oebps.file("styles.css", css);

      // 4. Helpers
      function esc(s) {
        if (s == null) return "";
        return String(s)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }
      function xhtmlDoc(title, bodyContent) {
        return '<?xml version="1.0" encoding="UTF-8"?>\n' +
          '<!DOCTYPE html>\n' +
          '<html xmlns="http://www.w3.org/1999/xhtml" xmlns:epub="http://www.idpf.org/2007/ops" lang="en">\n' +
          '<head>\n' +
          '  <meta charset="UTF-8"/>\n' +
          '  <title>' + esc(title) + '</title>\n' +
          '  <link rel="stylesheet" type="text/css" href="styles.css"/>\n' +
          '</head>\n' +
          '<body>\n' + bodyContent + '\n</body>\n</html>';
      }

      // 5. Title page
      let titlePageBody = '<div class="title-page">\n';
      titlePageBody += '  <h1>' + esc(bookData.title) + '</h1>\n';
      if (bookData.subtitle) titlePageBody += '  <p class="subtitle">' + esc(bookData.subtitle) + '</p>\n';
      titlePageBody += '  <p class="author">' + esc(bookData.author) + '</p>\n';
      titlePageBody += '</div>';
      oebps.file("titlepage.xhtml", xhtmlDoc(bookData.title || "Title", titlePageBody));

      // 6. Copyright page
      let copyBody = '<div>\n';
      if (bookData.publisher) copyBody += '  <p class="copyright">PUBLISHED BY ' + esc(bookData.publisher.toUpperCase()) + '</p>\n';
      copyBody += '  <p class="copyright">Copyright \u00A9 ' + new Date().getFullYear() + ' by ' + esc(bookData.author) + '</p>\n';
      const copyrightText = bookData.copyrightText || "All rights reserved. Without limiting the rights under copyright reserved above, no part of this book may be reproduced, stored, or introduced into a retrieval system, or transmitted, in any form or by any means (electronic, mechanical, photocopying, recording or otherwise), without the prior written permission of both the copyright owner and the publisher.";
      copyBody += '  <p class="copyright">' + esc(copyrightText) + '</p>\n';
      if (bookData.isbn) copyBody += '  <p class="copyright">ISBN: ' + esc(bookData.isbn) + '</p>\n';
      copyBody += '</div>';
      oebps.file("copyright.xhtml", xhtmlDoc("Copyright", copyBody));

      // 7. Dedication
      let dedFile = null;
      if (bookData.dedication) {
        const dedParas = bookData.dedication.split("\n").filter(function(l) { return l.trim(); });
        let dedBody = '<div>\n';
        for (const p of dedParas) dedBody += '  <p class="dedication">' + esc(p) + '</p>\n';
        dedBody += '</div>';
        oebps.file("dedication.xhtml", xhtmlDoc("Dedication", dedBody));
        dedFile = "dedication.xhtml";
      }

      // 8. Reader bonus CTA pages (front + back)
      let ctaFile = null;
      if (bookData.ctaTitle) {
        let ctaBody = '<div class="cta-page">\n';
        ctaBody += '  <div class="cta-banner">READER BONUS</div>\n';
        ctaBody += '  <p class="cta-title">' + esc(bookData.ctaTitle) + '</p>\n';
        if (bookData.ctaBody) ctaBody += '  <p class="cta-body">' + esc(bookData.ctaBody) + '</p>\n';
        if (bookData.ctaUrl) ctaBody += '  <div class="cta-url">' + esc(bookData.ctaUrl) + '</div>\n';
        ctaBody += '</div>';
        oebps.file("cta-front.xhtml", xhtmlDoc("Reader Bonus", ctaBody));
        oebps.file("cta-back.xhtml", xhtmlDoc("Reader Bonus", ctaBody));
        ctaFile = true;
      }

      // 9. Chapters - one XHTML file each. Preserve subheadings (## marker) as <h2>.
      const chapterFiles = [];
      // Images referenced from any chapter body are accumulated here and
      // written out (once each) into OEBPS/images/ after the chapter loop.
      // Keyed by image id so the same image referenced from multiple
      // chapters is only packaged once.
      const imagesToPackage = {};
      for (let ci = 0; ci < chapters.length; ci++) {
        const ch = chapters[ci];
        let body = '';
        // Page break: forced on whichever element opens the chapter.
        // - If ch.num is present, chapter-num.p gets the break, h1 follows on same page.
        // - If only h1 is present (unnumbered section), h1 gets the "chapter-opener" class.
        if (ch.num) {
          body += '  <p class="chapter-num">' + esc(ch.num) + '</p>\n';
          body += '  <h1>' + esc(ch.title || "Chapter " + (ci + 1)) + '</h1>\n';
        } else {
          body += '  <h1 class="chapter-opener">' + esc(ch.title || "Chapter " + (ci + 1)) + '</h1>\n';
        }
        if (ch.epigraph) {
          body += '  <p class="epigraph">\u201C' + esc(ch.epigraph) + '\u201D</p>\n';
          if (ch.epigraphAttribution) body += '  <p class="epigraph-attribution">\u2013 ' + esc(ch.epigraphAttribution) + '</p>\n';
        }
        // Same scene-break-aware splitter as the PDF path.
        const paragraphs = splitChapterBody(ch.body);
        for (const p of paragraphs) {
          // Image marker as a whole paragraph (either the new
          // 📷 filename — img-id form or the legacy ![alt](img-id) form).
          // Emit an <img> tag inside a centered <p> and queue the image
          // bytes for packaging into OEBPS/images/.
          const imgMatch = parseImageMarker(p);
          if (imgMatch) {
            const alt = imgMatch.alt;
            const id = imgMatch.imageId;
            const img = ch.images && ch.images[id];
            if (img && img.dataUrl) {
              const fmt = getImageFormatFromDataUrl(img.dataUrl);
              const filename = id + "." + fmt.ext;
              // Track this image for the manifest and the OEBPS/images/ zip entry.
              imagesToPackage[id] = { dataUrl: img.dataUrl, filename: filename, mime: fmt.mime };
              body += '  <p class="figure"><img src="images/' + filename + '" alt="' + esc(alt) + '" /></p>\n';
            } else {
              // Missing image — emit a small placeholder note instead so the
              // EPUB still validates and the reader sees the gap.
              body += '  <p class="figure"><em>[missing image: ' + esc(id) + ']</em></p>\n';
            }
            continue;
          }
          // Markdown table block → native <table> with <thead>/<tbody>.
          // EPUB readers reflow these correctly and they remain
          // searchable / selectable / accessible.
          if (looksLikeMarkdownTable(p)) {
            const table = parseMarkdownTable(p);
            if (table) {
              let tableHtml = '  <table class="md-table">\n    <thead>\n      <tr>';
              for (let ci2 = 0; ci2 < table.headers.length; ci2++) {
                const align = (table.alignments[ci2] || "left");
                tableHtml += '<th style="text-align:' + align + '">' + esc(table.headers[ci2]) + '</th>';
              }
              tableHtml += '</tr>\n    </thead>\n    <tbody>\n';
              for (const row of table.rows) {
                tableHtml += '      <tr>';
                for (let ci2 = 0; ci2 < row.length; ci2++) {
                  const align = (table.alignments[ci2] || "left");
                  tableHtml += '<td style="text-align:' + align + '">' + esc(row[ci2]) + '</td>';
                }
                tableHtml += '</tr>\n';
              }
              tableHtml += '    </tbody>\n  </table>\n';
              body += tableHtml;
              continue;
            }
          }
          // Scene break ornament. Detected the same way as the PDF path
          // (matches "* * *", "***", "---", etc.) and rendered as a
          // centered <p class="scene-break"> so EPUB readers display the
          // same visible transition.
          if (isSectionBreak(p)) {
            body += '  <p class="scene-break">* * *</p>\n';
            continue;
          }
          if (p.startsWith("## ")) body += '  <h2>' + esc(p.slice(3).trim()) + '</h2>\n';
          else body += '  <p>' + esc(p) + '</p>\n';
        }
        const fname = "chapter-" + String(ci + 1).padStart(3, "0") + ".xhtml";
        oebps.file(fname, xhtmlDoc(ch.title || ("Chapter " + (ci + 1)), body));
        chapterFiles.push({ file: fname, title: ch.title || ch.num || ("Chapter " + (ci + 1)), includeInToc: ch.includeInToc !== false });
      }

      // Write image bytes and collect manifest entries for every referenced
      // image. Done after the chapter loop so we have the deduped set.
      const imageManifestItems = [];
      Object.keys(imagesToPackage).forEach(function(id) {
        const info = imagesToPackage[id];
        try {
          oebps.file("images/" + info.filename, dataUrlToBytes(info.dataUrl));
          imageManifestItems.push('    <item id="img-' + id + '" href="images/' + info.filename + '" media-type="' + info.mime + '"/>');
        } catch (e) { /* skip malformed image */ }
      });

      // 10. Navigation document (EPUB 3 requires this).
      // Same filter as the PDF TOC — chapters flagged includeInToc=false
      // (typically back matter: About the Author, Acknowledgments, etc.)
      // still appear in the spine and render in the book, but they are
      // omitted from the reader-facing table of contents.
      let navBody = '<nav epub:type="toc" id="toc">\n  <h1>Contents</h1>\n  <ol>\n';
      for (const cf of chapterFiles) {
        if (!cf.includeInToc) continue;
        navBody += '    <li><a href="' + cf.file + '">' + esc(cf.title) + '</a></li>\n';
      }
      navBody += '  </ol>\n</nav>';
      oebps.file("nav.xhtml", xhtmlDoc("Contents", navBody));

      // 11. Manifest + spine (content.opf)
      const uuid = "urn:uuid:" + 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
        const r = Math.random() * 16 | 0;
        return (c === 'x' ? r : (r & 0x3 | 0x8)).toString(16);
      });

      const manifestItems = [
        '    <item id="nav" href="nav.xhtml" media-type="application/xhtml+xml" properties="nav"/>',
        '    <item id="css" href="styles.css" media-type="text/css"/>',
        '    <item id="titlepage" href="titlepage.xhtml" media-type="application/xhtml+xml"/>',
        '    <item id="copyright" href="copyright.xhtml" media-type="application/xhtml+xml"/>',
      ].concat(imageManifestItems);
      const spineItems = [
        '    <itemref idref="titlepage"/>',
        '    <itemref idref="copyright"/>',
      ];
      if (ctaFile) {
        manifestItems.push('    <item id="cta-front" href="cta-front.xhtml" media-type="application/xhtml+xml"/>');
        spineItems.unshift('    <itemref idref="cta-front"/>'); // front CTA before title
      }
      if (dedFile) {
        manifestItems.push('    <item id="dedication" href="dedication.xhtml" media-type="application/xhtml+xml"/>');
        spineItems.push('    <itemref idref="dedication"/>');
      }
      spineItems.push('    <itemref idref="nav"/>'); // TOC after front matter
      for (let ci = 0; ci < chapterFiles.length; ci++) {
        const id = "ch" + (ci + 1);
        manifestItems.push('    <item id="' + id + '" href="' + chapterFiles[ci].file + '" media-type="application/xhtml+xml"/>');
        spineItems.push('    <itemref idref="' + id + '"/>');
      }
      if (ctaFile) {
        manifestItems.push('    <item id="cta-back" href="cta-back.xhtml" media-type="application/xhtml+xml"/>');
        spineItems.push('    <itemref idref="cta-back"/>');
      }

      const opf = '<?xml version="1.0" encoding="UTF-8"?>\n' +
        '<package xmlns="http://www.idpf.org/2007/opf" version="3.0" unique-identifier="pub-id" xml:lang="en">\n' +
        '  <metadata xmlns:dc="http://purl.org/dc/elements/1.1/">\n' +
        '    <dc:identifier id="pub-id">' + uuid + '</dc:identifier>\n' +
        '    <dc:title>' + esc(bookData.title) + '</dc:title>\n' +
        '    <dc:creator>' + esc(bookData.author) + '</dc:creator>\n' +
        '    <dc:language>en</dc:language>\n' +
        (bookData.publisher ? '    <dc:publisher>' + esc(bookData.publisher) + '</dc:publisher>\n' : '') +
        (bookData.isbn ? '    <dc:identifier>urn:isbn:' + esc(bookData.isbn) + '</dc:identifier>\n' : '') +
        '    <meta property="dcterms:modified">' + new Date().toISOString().replace(/\.\d+Z$/, "Z") + '</meta>\n' +
        '  </metadata>\n' +
        '  <manifest>\n' + manifestItems.join("\n") + '\n  </manifest>\n' +
        '  <spine>\n' + spineItems.join("\n") + '\n  </spine>\n' +
        '</package>';
      oebps.file("content.opf", opf);

      onProgress("Packaging EPUB...");
      const blob = await zip.generateAsync({ type: "blob", mimeType: "application/epub+zip" });
      return blob;
    }

    /* ---- UI Components ---- */

    function StepIndicator({ currentStep, steps }) {
      return (
        <div style={{ display: "flex", gap: 4, marginBottom: 28 }}>
          {steps.map((s, i) => (
            <div key={i} style={{ flex: 1 }}>
              <div style={{ height: 3, borderRadius: 2, background: i <= currentStep ? BRAND.accent : BRAND.border, transition: "background 0.3s" }} />
              <div style={{ fontSize: 11, fontFamily: FONT, color: i <= currentStep ? BRAND.textPrimary : BRAND.textMuted, marginTop: 8, fontWeight: i === currentStep ? 600 : 500, letterSpacing: "0.02em" }}>{s}</div>
            </div>
          ))}
        </div>
      );
    }

    // Numbered step badge (blue number on soft blue background), matching Mockup tool
    function StepBadge({ num }) {
      return (
        <div style={{ display: "inline-flex", alignItems: "center", justifyContent: "center", width: 28, height: 28, borderRadius: 8, background: BRAND.stepBadgeBg, color: BRAND.stepBadgeText, fontSize: 13, fontWeight: 700, fontFamily: FONT, marginRight: 10, verticalAlign: "middle" }}>{num}</div>
      );
    }

    // Small uppercase section label
    function SectionLabel({ children }) {
      return (
        <div style={{ fontSize: 11, fontFamily: FONT, color: BRAND.label, fontWeight: 700, letterSpacing: "0.1em", textTransform: "uppercase", marginBottom: 8 }}>{children}</div>
      );
    }

    function Input({ label, value, onChange, placeholder, multiline, rows, serif }) {
      rows = rows || 3;
      const baseStyle = {
        width: "100%", padding: "10px 14px", background: BRAND.white,
        border: "1px solid " + BRAND.border, borderRadius: 8,
        color: BRAND.textPrimary, fontSize: 14,
        fontFamily: serif ? "'Gelasio', Georgia, serif" : FONT,
        outline: "none", resize: multiline ? "vertical" : "none",
        transition: "border-color 0.2s", boxSizing: "border-box",
      };
      return (
        <div style={{ marginBottom: 16 }}>
          {label && <label style={{ display: "block", fontSize: 12, fontFamily: FONT, color: BRAND.textSecondary, marginBottom: 6, fontWeight: 500 }}>{label}</label>}
          {multiline ? (
            <textarea value={value} onChange={function(e) { onChange(e.target.value); }} onPaste={normalizePasteIntoTextarea} placeholder={placeholder} rows={rows} style={baseStyle} />
          ) : (
            <input value={value} onChange={function(e) { onChange(e.target.value); }} placeholder={placeholder} style={baseStyle} />
          )}
        </div>
      );
    }

    // RichTextInput: drop-in body editor with a B / I / U + H2 / H3 toolbar.
    // Stores the markdown-lite syntax that parseInlineRuns / classifyParagraph
    // understand. Toolbar handlers either wrap the current selection in markers
    // (B / I / U) or toggle a line prefix (H2 / H3) on the line containing
    // the cursor.
    const RichTextInput = React.forwardRef(function RichTextInput({ label, value, onChange, rows, onImageUpload }, ref) {
      rows = rows || 8;
      const taRef = React.useRef(null);
      const fileInputRef = React.useRef(null);
      const [imageBusy, setImageBusy] = useState(false);

      // ----- Undo support -----
      // The textarea is React-controlled, which means the browser's native
      // undo stack is unreliable — programmatic edits (toolbar wraps,
      // image / table inserts) bypass it entirely, and on some browsers
      // the stack gets cleared whenever the value prop changes. We
      // maintain our own undo history per RichTextInput instance.
      //
      // Snapshots are pushed on two occasions:
      //   1. Before any programmatic edit (toolbar button, image/table
      //      insert) — see snapshotBeforeEdit().
      //   2. At the start of a typing burst — the pre-burst value is
      //      held in pendingPreBurstRef and committed to the stack when
      //      the user pauses typing for 700ms (handleTextareaChange).
      //
      // Cmd+Z / Ctrl+Z and the toolbar button both invoke performUndo().
      // ChapterCard keys each chapter by chapter.id, so switching
      // chapters mounts a fresh RichTextInput with an empty stack —
      // no cross-chapter bleed.
      const undoStackRef = React.useRef([]);
      const pendingPreBurstRef = React.useRef(null);
      const typingTimerRef = React.useRef(null);
      const [, setTick] = useState(0);
      const forceTick = function() { setTick(function(n) { return (n + 1) | 0; }); };

      function currentSnap() {
        const ta = taRef.current;
        return {
          value: value,
          selStart: ta ? ta.selectionStart : value.length,
          selEnd: ta ? ta.selectionEnd : value.length,
          scrollTop: ta ? ta.scrollTop : 0,
        };
      }

      function pushUndo(snap) {
        const stack = undoStackRef.current;
        // Skip no-ops (identical to top of stack).
        if (stack.length > 0 && stack[stack.length - 1].value === snap.value) return;
        stack.push(snap);
        // Cap at 100 entries so this can't grow unbounded.
        if (stack.length > 100) stack.shift();
      }

      function flushPendingTyping() {
        if (typingTimerRef.current) {
          clearTimeout(typingTimerRef.current);
          typingTimerRef.current = null;
        }
        if (pendingPreBurstRef.current) {
          pushUndo(pendingPreBurstRef.current);
          pendingPreBurstRef.current = null;
        }
      }

      // Call this at the top of every programmatic edit (B/I/U wrap,
      // heading prefix, image/table insert). It commits any in-flight
      // typing burst first so the typing is its own undo step, then
      // pushes the current value as the pre-edit state.
      function snapshotBeforeEdit() {
        flushPendingTyping();
        pushUndo(currentSnap());
        forceTick();
      }

      function performUndo() {
        flushPendingTyping();
        const stack = undoStackRef.current;
        if (stack.length === 0) { forceTick(); return; }
        const snap = stack.pop();
        onChange(snap.value);
        requestAnimationFrame(function() {
          const t = taRef.current; if (!t) return;
          t.focus({ preventScroll: true });
          try { t.setSelectionRange(snap.selStart, snap.selEnd); } catch (e) {}
          if (typeof snap.scrollTop === "number") t.scrollTop = snap.scrollTop;
        });
        forceTick();
      }

      function handleTextareaChange(e) {
        // Start of a new typing burst: snapshot the pre-burst state so
        // undo restores to where the burst began.
        if (pendingPreBurstRef.current === null) {
          pendingPreBurstRef.current = currentSnap();
          forceTick(); // update the Undo button's disabled state
        }
        if (typingTimerRef.current) clearTimeout(typingTimerRef.current);
        typingTimerRef.current = setTimeout(function() {
          flushPendingTyping();
          forceTick();
        }, 700);
        onChange(e.target.value);
      }

      function handleTextareaKeyDown(e) {
        // Cmd+Z (Mac) / Ctrl+Z (Win/Linux). Shift+Cmd+Z (redo) intentionally
        // not intercepted — let the browser handle redo if it can; otherwise
        // it's a no-op. Keeping scope tight for v1.
        if ((e.metaKey || e.ctrlKey) && !e.shiftKey && (e.key === "z" || e.key === "Z")) {
          e.preventDefault();
          performUndo();
        }
      }

      const canUndo = undoStackRef.current.length > 0 || pendingPreBurstRef.current !== null;

      // Helper: insert arbitrary text at the textarea's current cursor
      // position, surrounded by blank lines so a paragraph-level marker
      // (like an image marker) becomes its own paragraph.
      function insertBlockAtCursor(insertText) {
        const ta = taRef.current; if (!ta) return;
        snapshotBeforeEdit();
        const start = ta.selectionStart || 0;
        const end = ta.selectionEnd || 0;
        const before = value.slice(0, start);
        const after = value.slice(end);
        const leftPad = (before.length === 0 || /\n\n$/.test(before)) ? "" : (before.endsWith("\n") ? "\n" : "\n\n");
        const rightPad = (after.length === 0 || /^\n\n/.test(after)) ? "" : (after.startsWith("\n") ? "\n" : "\n\n");
        const insertion = leftPad + insertText + rightPad;
        const newValue = before + insertion + after;
        onChange(newValue);
        const newPos = start + insertion.length;
        requestAnimationFrame(function() {
          const t = taRef.current; if (!t) return;
          t.focus({ preventScroll: true });
          try { t.setSelectionRange(newPos, newPos); } catch (e) {}
        });
      }

      // Imperative API exposed to parents (e.g. ChapterCard's image gallery
      // uses it when the user clicks "Re-insert" on a previously-uploaded
      // image — we need to drop the marker at the current cursor position
      // inside this textarea).
      React.useImperativeHandle(ref, function() {
        return {
          insertAtCursor: function(text) { insertBlockAtCursor(text); },
        };
      });
