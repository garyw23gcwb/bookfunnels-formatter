    const FONT = "'Inter', -apple-system, BlinkMacSystemFont, sans-serif";

    // Text size presets
    const TEXT_PRESETS = {
      default: { bodySize: 10, lineHeight: 15, label: "Default (10pt/15pt)" },
      lisa: { bodySize: 11, lineHeight: 16.5, label: "Spacious (11pt/16.5pt)" }
    };

    // Create configurable SPEC object - will be updated based on selected preset
    function createSpec(textPreset = 'default') {
      const preset = TEXT_PRESETS[textPreset];
      return {
        pageW: 360, pageH: 576, 
        bodySize: preset.bodySize, 
        lineHeight: preset.lineHeight, 
        paraGap: 5,
        headerSize: 8, chapterNumSize: 16, chapterTitleSize: 20,
        epigraphSize: 18, dropCapLines: 3,
        // Cap-height ratio for serif fonts (distance from baseline to top of capital letter,
        // as a fraction of font size). Gelasio and most serifs sit around 0.72.
        capHeightRatio: 0.72,
        margins: {
          verso: { inside: 42, outside: 66, top: 24, bottom: 30 },
          recto: { inside: 66, outside: 42, top: 24, bottom: 30 },
        },
        pageNumY: 546,
      };
    }

    // Default spec for initial UI rendering
    let SPEC = createSpec('default');

    // Drop cap font size is computed so that its cap-height spans exactly dropCapLines
    // of body text at the current line height. This matches how InDesign's "span N lines"
    // drop cap feature works.
    //   cap-height wanted = dropCapLines * lineHeight
    //   font size needed  = cap-height wanted / capHeightRatio
    // For 10pt body / 15pt leading / 3 lines / 0.72 ratio ≈ 62.5pt font size
    // For 11pt body / 16.5pt leading / 3 lines / 0.72 ratio ≈ 68.75pt font size
    function getDropCapSize() {
      return (SPEC.dropCapLines * SPEC.lineHeight) / SPEC.capHeightRatio;
    }

    // Widow/orphan control settings
    const WIDOW_ORPHAN = {
      minLinesAtPageEnd: 2,    // Don't leave fewer than 2 lines at bottom of page
      minLinesAtPageStart: 2,  // Don't start a page with fewer than 2 lines from previous paragraph
      enabled: true            // Toggle for testing
    };

    const APP_VERSION = {

      date: "2026-04-18",

        "0.4.0 - UI refreshed to match Bookfunnels Mockup tool. Font loading reworked (but URL pattern still broken - fixed in 0.5.0).",
        "0.3.0 - Font embedding: Gelasio (body/titles), EB Garamond (epigraphs/dedication), Inter (headers/page numbers) loaded from Google Fonts and embedded in PDF",
        "0.2.2 - Expanded sample data with 4 test cases (epigraph/no epigraph/named section)",
        "0.2.1 - Fixed TOC dot leaders for long titles, TOC shows chapter titles without prefix",
        "0.2.0 - Two-pass rendering for accurate TOC page numbers, dot leaders, en-dash attribution",
        "0.1.4 - Fixed epigraph parsing (handles attribution on same line)",
        "0.1.3 - Fixed jsPDF CDN version (2.5.1), added version badge",
        "0.1.2 - Inter font across UI, light theme with GCWB branding",
        "0.1.0 - Initial prototype",
      ]
    };

    // Convert straight ASCII quotes and apostrophes to typographic curly equivalents.
    // Runs on every string that will be rendered into the PDF (titles, body, epigraphs,
    // dedication, CTA copy) so that the final output matches professional typesetting.
    // Handles: straight double quotes, straight single quotes/apostrophes, hyphen pairs,
    // triple-dot ellipsis. Leaves existing curly glyphs untouched.
    function smartQuotes(s) {
      if (s == null) return s;
      let t = String(s);
      // Triple-dot ellipsis -> single ellipsis char (nicer tracking than three periods)
      t = t.replace(/\.{3}/g, "\u2026");
      // Double dashes -> en-dash
      t = t.replace(/([^-])--([^-])/g, "$1\u2013$2");
      // Double quotes: opening if at string start, after whitespace, or after opening bracket/paren
      t = t.replace(/(^|[\s\(\[\{\u2014\u2013])"/g, "$1\u201C");
      t = t.replace(/"/g, "\u201D"); // remaining straight doubles become closing
      // Single quotes / apostrophes: opening only after whitespace or at start
      t = t.replace(/(^|[\s\(\[\{\u2014\u2013])'/g, "$1\u2018");
      t = t.replace(/'/g, "\u2019"); // remaining (including mid-word apostrophes) are closing/apostrophe
      return t;
    }

    function smartQuotesDeep(obj) {
      if (obj == null) return obj;
      if (typeof obj === "string") return smartQuotes(obj);
      if (Array.isArray(obj)) return obj.map(smartQuotesDeep);
      if (typeof obj === "object") {
        const out = {};
        for (const k of Object.keys(obj)) out[k] = smartQuotesDeep(obj[k]);
        return out;
      }
      return obj;
    }

    function detectChapters(text) {
      const lines = text.split(/\n/);
      const chapters = [];
      let currentChapter = null;
      let buffer = [];
      const chapterPatterns = [
        /^chapter\s+(\d+|[ivxlc]+)\s*$/i,
        /^chapter\s+(\d+|[ivxlc]+)\s*[:\-\u2013\u2014]\s*(.+)$/i,
        /^(\d+)\.\s+(.+)$/,
        /^part\s+(\d+|[ivxlc]+)/i,
      ];
      const sectionPatterns = [
        /^(foreword|preface|introduction|prologue|epilogue|afterword|acknowledgments|acknowledgements|about the author|your next steps|making it happen|conclusion|who should read this book\??|my promise to you)$/i,
      ];

      for (let i = 0; i < lines.length; i++) {
        const line = lines[i].trim();
        let matched = false;
        let chapterNum = "";
        let chapterTitle = "";

        for (const pat of chapterPatterns) {
          const m = line.match(pat);
          if (m) { chapterNum = "Chapter " + m[1]; chapterTitle = m[2] || ""; matched = true; break; }
        }
        if (!matched) {
          for (const pat of sectionPatterns) {
            if (pat.test(line)) { chapterNum = ""; chapterTitle = line; matched = true; break; }
          }
        }

        if (matched) {
          if (currentChapter) { currentChapter.body = buffer.join("\n").trim(); chapters.push(currentChapter); }
          if (chapterNum && !chapterTitle) {
            for (let j = i + 1; j < Math.min(i + 4, lines.length); j++) {
              const nextLine = lines[j].trim();
              if (nextLine && !chapterPatterns.some(function(p) { return p.test(nextLine); })) { chapterTitle = nextLine; i = j; break; }
            }
          }
          currentChapter = { id: Math.random().toString(36).slice(2), num: chapterNum, title: chapterTitle, epigraph: "", epigraphAttribution: "", body: "" };
          buffer = [];
          
          // Look ahead for epigraph (quoted text after chapter heading)
          let checkLines = [];
          for (let j = i + 1; j < Math.min(i + 8, lines.length); j++) {
            const nl = lines[j].trim();
            if (nl) checkLines.push({ line: nl, idx: j });
          }
          if (checkLines.length > 0) {
            const firstContent = checkLines[0].line;
            if (firstContent.startsWith('"') || firstContent.startsWith("\u201C") || firstContent.startsWith("'")) {
              // Check if attribution is on the same line: "Quote text" - Author Name
              const sameLineMatch = firstContent.match(/^["'\u201C](.+?)["'\u201D]\s*[-\u2014\u2013]\s*(.+)$/);
              if (sameLineMatch) {
                // Attribution on same line
                currentChapter.epigraph = sameLineMatch[1];
                currentChapter.epigraphAttribution = sameLineMatch[2];
                i = checkLines[0].idx;
              } else {
                // Multi-line epigraph: collect lines until we find attribution or a non-quote line
                let epLines = [];
                for (const cl of checkLines) {
                  // Check for standalone attribution line
                  if (cl.line.startsWith("- ") || cl.line.startsWith("\u2014") || cl.line.startsWith("\u2013")) {
                    currentChapter.epigraphAttribution = cl.line.replace(/^[-\u2014\u2013]\s*/, "");
                    i = cl.idx;
                    break;
                  }
                  // Check if this line ends with closing quote + attribution
                  const endMatch = cl.line.match(/["'\u201D]\s*[-\u2014\u2013]\s*(.+)$/);
                  if (endMatch) {
                    epLines.push(cl.line.replace(/\s*[-\u2014\u2013]\s*.+$/, ""));
                    currentChapter.epigraphAttribution = endMatch[1];
                    i = cl.idx;
                    break;
                  }
                  // If line doesn't look like part of a quote (no quote marks, not short), stop
                  if (epLines.length > 0 && !cl.line.match(/["'\u201C\u201D]/) && cl.line.length > 80) {
                    break;
                  }
                  epLines.push(cl.line);
                  i = cl.idx;
                }
                if (epLines.length > 0) {
                  currentChapter.epigraph = epLines.join(" ").replace(/["\u201C\u201D']/g, "").trim();
                }
              }
            }
          }
          continue;
        }
        buffer.push(lines[i]);
      }
      if (currentChapter) { currentChapter.body = buffer.join("\n").trim(); chapters.push(currentChapter); }
      return chapters;
    }

    // Font loading utility
    // Uses Fontsource's partnered jsDelivr CDN. URL pattern:
    //   https://cdn.jsdelivr.net/fontsource/fonts/{font}@{version}/{subset}-{weight}-{style}.ttf
    // We explicitly request TTF (not the default woff2) because jsPDF needs TTF for VFS embedding.
    async function loadFontsForPDF(doc) {
      const CDN = "https://cdn.jsdelivr.net/fontsource/fonts";
      const VERSION = "5"; // pin to v5 for stable cache; "latest" also works

      const fonts = [
        { family: "Gelasio", slug: "gelasio", weight: "400", style: "normal", jsPDFStyle: "normal" },
        { family: "Gelasio", slug: "gelasio", weight: "700", style: "normal", jsPDFStyle: "bold" },
        { family: "Gelasio", slug: "gelasio", weight: "400", style: "italic", jsPDFStyle: "italic" },
        { family: "EB Garamond", slug: "eb-garamond", weight: "400", style: "italic", jsPDFStyle: "italic" },
        { family: "Inter", slug: "inter", weight: "400", style: "normal", jsPDFStyle: "normal" },
      ];

      let loadedCount = 0;

      for (const font of fonts) {
        try {
          const url = CDN + "/" + font.slug + "@" + VERSION + "/latin-" + font.weight + "-" + font.style + ".ttf";
          const response = await fetch(url);

          if (!response.ok) {
            console.warn("Font fetch failed (HTTP " + response.status + "): " + url);
            continue;
          }

          // Validate we got a real TTF (starts with 0x00 0x01 0x00 0x00 or 'OTTO' for OTF)
          const buffer = await response.arrayBuffer();
          const binary = new Uint8Array(buffer);
          if (binary.length < 4) {
            console.warn("Font file too small: " + url);
            continue;
          }
          const header = binary[0] + "-" + binary[1] + "-" + binary[2] + "-" + binary[3];
          const validTTF = (binary[0] === 0x00 && binary[1] === 0x01 && binary[2] === 0x00 && binary[3] === 0x00);
          const validOTF = (binary[0] === 0x4F && binary[1] === 0x54 && binary[2] === 0x54 && binary[3] === 0x4F);
          if (!validTTF && !validOTF) {
            console.warn("Font file not a valid TTF/OTF (header " + header + "): " + url);
            continue;
          }

          // Convert to binary string for jsPDF's VFS (chunk to avoid stack overflow)
          let binaryStr = "";
          const CHUNK = 0x8000;
          for (let i = 0; i < binary.length; i += CHUNK) {
            binaryStr += String.fromCharCode.apply(null, binary.subarray(i, i + CHUNK));
          }

          const vfsName = font.family.replace(/\s+/g, "") + "-" + font.jsPDFStyle + ".ttf";
          doc.addFileToVFS(vfsName, binaryStr);
          doc.addFont(vfsName, font.family, font.jsPDFStyle);
          loadedCount++;
        } catch (e) {
          console.warn("Failed to load font " + font.family + " " + font.jsPDFStyle + ":", e);
        }
      }

      console.log("Font embedding: " + loadedCount + "/" + fonts.length + " variants loaded");
      return loadedCount > 0;
    }

    async function generatePDF(bookData, chapters, onProgress, textSizePreset = 'default') {
      onProgress("Preparing your book...");

      // Run every user-supplied string through typographic cleanup before rendering.
      // URLs are preserved because they should never have curly quotes.
      const ctaUrlOriginal = bookData && bookData.ctaUrl ? bookData.ctaUrl : "";
      bookData = smartQuotesDeep(bookData);
      if (bookData) bookData.ctaUrl = ctaUrlOriginal;
      chapters = smartQuotesDeep(chapters);

      // Update SPEC based on selected text size preset
      SPEC = createSpec(textSizePreset);
      
      if (!window.jspdf || !window.jspdf.jsPDF) {
        throw new Error("jsPDF library not loaded. Please refresh the page and try again.");
      }
      
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF({ unit: "pt", format: [SPEC.pageW, SPEC.pageH], compress: true });
      
      // Try to load custom fonts (silent - single progress message already showing)
      const fontsLoaded = await loadFontsForPDF(doc).catch(function(e) {
        console.warn("Font loading failed, falling back to helvetica:", e);
        return false;
      });
      
      // Font helpers - use custom fonts if loaded, fallback to helvetica
      const BODY_FONT = fontsLoaded ? "Gelasio" : "helvetica";
      const EPIGRAPH_FONT = fontsLoaded ? "EB Garamond" : "helvetica";
      const HEADER_FONT = fontsLoaded ? "Inter" : "helvetica";
      
      let pageNum = 0;
      let bookPageNum = 0;

      function newPage() { if (pageNum > 0) doc.addPage([SPEC.pageW, SPEC.pageH]); pageNum++; }
      function isRecto() { return pageNum % 2 === 1; }
      function getMargins() { return isRecto() ? SPEC.margins.recto : SPEC.margins.verso; }
      function getTextWidth() { const m = getMargins(); return SPEC.pageW - m.inside - m.outside; }
      function getTextX() { return getMargins().inside; }
      
      // Helper function to reset font properties after page breaks
      function resetBodyFont() {
        doc.setFont(BODY_FONT, "normal");
        doc.setFontSize(SPEC.bodySize);
        doc.setTextColor(30);
      }

      function addRunningHeader(chapterTitle) {
        const m = getMargins();
        doc.setFont(HEADER_FONT, "normal"); doc.setFontSize(SPEC.headerSize); doc.setTextColor(80);
        if (isRecto()) { doc.text(chapterTitle, SPEC.pageW - m.outside, m.top + SPEC.headerSize, { align: "right" }); }
        else { doc.text(bookData.title, m.inside, m.top + SPEC.headerSize); }
      }

      function addPageNumber(num) {
        const m = getMargins();
        doc.setFont(HEADER_FONT, "normal"); doc.setFontSize(SPEC.headerSize); doc.setTextColor(80);
        if (isRecto()) { doc.text(String(num), SPEC.pageW - m.outside, SPEC.pageNumY, { align: "right" }); }
        else { doc.text(String(num), m.inside, SPEC.pageNumY); }
      }

      function wrapText(text, maxWidth, fontSize, fontStyle) {
        fontStyle = fontStyle || "normal";
        doc.setFontSize(fontSize); doc.setFont(BODY_FONT, fontStyle);
        return doc.splitTextToSize(text, maxWidth);
      }

      // Smart title wrapping that considers semantic breaks
      function wrapTitle(title, maxWidth, fontSize) {
        doc.setFontSize(fontSize); doc.setFont(BODY_FONT, "bold");
        
        // If it fits on one line, return as-is
        if (doc.getTextWidth(title) <= maxWidth) {
          return [title];
        }
        
        // Smart breaking rules for better title flow
        const words = title.split(' ');
        if (words.length <= 1) {
          // Single long word, use basic wrapping
          return doc.splitTextToSize(title, maxWidth);
        }
        
        // Try different break strategies in order of preference
        const strategies = [
          // Strategy 1: Break after prepositions and articles at natural pause points
          function() {
            const breakAfter = ['the', 'of', 'in', 'on', 'at', 'to', 'for', 'with', 'by', 'from', 'up', 'about', 'into', 'through', 'during', 'before', 'after', 'above', 'below', 'between', 'among', 'within'];
            for (let i = 1; i < words.length - 1; i++) {
              if (breakAfter.includes(words[i].toLowerCase())) {
                const firstLine = words.slice(0, i + 1).join(' ');
                const secondLine = words.slice(i + 1).join(' ');
                if (doc.getTextWidth(firstLine) <= maxWidth && doc.getTextWidth(secondLine) <= maxWidth) {
                  return [firstLine, secondLine];
                }
              }
            }
            return null;
          },
          
          // Strategy 2: Break at punctuation marks
          function() {
            const text = title;
            const puncts = [': ', '- ', '. ', ', ', '; '];
            for (const punct of puncts) {
              const idx = text.indexOf(punct);
              if (idx > 0 && idx < text.length - 2) {
                const firstLine = text.slice(0, idx + punct.length - 1);
                const secondLine = text.slice(idx + punct.length);
                if (doc.getTextWidth(firstLine) <= maxWidth && doc.getTextWidth(secondLine) <= maxWidth) {
                  return [firstLine, secondLine];
                }
              }
            }
            return null;
          },
          
          // Strategy 3: Break avoiding orphaned articles/prepositions
          function() {
            const orphanWords = ['the', 'a', 'an', 'of', 'in', 'on', 'at', 'to', 'for', 'with', 'by', 'and', 'or'];
            for (let i = Math.floor(words.length / 2); i >= 2; i--) {
              // Don't break before orphan words
              if (orphanWords.includes(words[i].toLowerCase())) continue;
              // Don't break after orphan words at line end
              if (i < words.length - 1 && orphanWords.includes(words[i - 1].toLowerCase())) continue;
              
              const firstLine = words.slice(0, i).join(' ');
              const secondLine = words.slice(i).join(' ');
              if (doc.getTextWidth(firstLine) <= maxWidth && doc.getTextWidth(secondLine) <= maxWidth) {
                return [firstLine, secondLine];
              }
            }
            return null;
          },
          
          // Strategy 4: Balanced split (prefer middle)
          function() {
            const mid = Math.floor(words.length / 2);
            for (let offset = 0; offset <= 2; offset++) {
              for (const i of [mid + offset, mid - offset]) {
                if (i >= 2 && i < words.length - 1) {
                  const firstLine = words.slice(0, i).join(' ');
                  const secondLine = words.slice(i).join(' ');
                  if (doc.getTextWidth(firstLine) <= maxWidth && doc.getTextWidth(secondLine) <= maxWidth) {
                    return [firstLine, secondLine];
                  }
                }
              }
            }
            return null;
          }
        ];
        
        // Try each strategy until one works
        for (const strategy of strategies) {
          const result = strategy();
          if (result) return result;
        }
        
        // Fallback: use jsPDF's basic wrapping
        return doc.splitTextToSize(title, maxWidth);
      }

      onProgress("Generating front matter...");
      newPage(); newPage();

      if (bookData.ctaTitle) {
        newPage();
        let y = 60;
        
        // READER BONUS header bar
        doc.setFillColor(30, 30, 30);
        doc.rect(getTextX(), y, getTextWidth(), 40, "F");
        doc.setFont(BODY_FONT, "bold"); doc.setFontSize(18); doc.setTextColor(255);
        doc.text("READER BONUS", SPEC.pageW / 2, y + 27, { align: "center" });
        doc.setTextColor(30); 
        y += 70;
        
        // Main title with proper text wrapping
        doc.setFont(BODY_FONT, "bold"); doc.setFontSize(28);
        const ctaLines = wrapTitle(bookData.ctaTitle, getTextWidth() - 40, 28);
        for (const line of ctaLines) { 
          doc.text(line, SPEC.pageW / 2, y, { align: "center" }); 
          y += 35; 
        }
        y += 30;
        
        // Description text with proper wrapping and spacing
        if (bookData.ctaBody) {
          const lines = wrapText(bookData.ctaBody, getTextWidth() - 60, 14);
          doc.setFontSize(14); doc.setFont(BODY_FONT, "normal");
          for (const line of lines) { 
            doc.text(line, SPEC.pageW / 2, y, { align: "center" }); 
            y += 18; 
          }
        }
        y += 40;
        
        // URL in black bar at bottom. Auto-fit: measure the URL at 16pt and step down
        // until it fits inside the bar with a comfortable 16pt side padding on each side.
        if (bookData.ctaUrl) {
          doc.setFillColor(30, 30, 30);
          doc.rect(getTextX(), y, getTextWidth(), 40, "F");
          doc.setFont(BODY_FONT, "normal"); doc.setTextColor(255);
          const maxUrlWidth = getTextWidth() - 32; // 16pt padding each side
          let urlSize = 16;
          doc.setFontSize(urlSize);
          while (doc.getTextWidth(bookData.ctaUrl) > maxUrlWidth && urlSize > 9) {
            urlSize -= 0.5;
            doc.setFontSize(urlSize);
          }
          doc.text(bookData.ctaUrl, SPEC.pageW / 2, y + 27, { align: "center" });
          doc.setTextColor(30);
        }
        newPage();
      }

      newPage();
      let ty = 140;
      doc.setFont(BODY_FONT, "bold"); doc.setFontSize(28); doc.setTextColor(30);
      const titleLines = wrapText(bookData.title, getTextWidth(), 28, "bold");
      for (const line of titleLines) { doc.text(line, SPEC.pageW / 2, ty, { align: "center" }); ty += 35; }
      ty += 10; doc.setDrawColor(30); doc.setLineWidth(0.5);
      doc.line(SPEC.pageW / 2 - 80, ty, SPEC.pageW / 2 + 80, ty); ty += 25;
      if (bookData.subtitle) {
        doc.setFont(BODY_FONT, "normal"); doc.setFontSize(16);
        const subLines = wrapText(bookData.subtitle, getTextWidth(), 16);
        for (const line of subLines) { doc.text(line, SPEC.pageW / 2, ty, { align: "center" }); ty += 22; }
      }
      ty = 430; doc.setFont(BODY_FONT, "bold"); doc.setFontSize(14);
      doc.text(bookData.author.toUpperCase(), SPEC.pageW / 2, ty, { align: "center" });

      newPage();
      // Copyright page: start block around 35% down the page so the text sits in the upper
      // middle of the page, which is the standard placement for a copyright/imprint page.
      ty = 200; doc.setFont(BODY_FONT, "normal"); doc.setFontSize(9); doc.setTextColor(60);
      if (bookData.publisher) { doc.text("PUBLISHED BY " + bookData.publisher.toUpperCase(), SPEC.pageW / 2, ty, { align: "center" }); ty += 20; }
      doc.text("Copyright \u00A9 " + new Date().getFullYear() + " by " + bookData.author, SPEC.pageW / 2, ty, { align: "center" }); ty += 18;
      const copyrightText = bookData.copyrightText || "All rights reserved. Without limiting the rights under copyright reserved above, no part of this book may be reproduced, stored, or introduced into a retrieval system, or transmitted, in any form or by any means (electronic, mechanical, photocopying, recording or otherwise), without the prior written permission of both the copyright owner and the publisher.";
      const copLines = wrapText(copyrightText, getTextWidth() - 40, 9);
      for (const line of copLines) { doc.text(line, SPEC.pageW / 2, ty, { align: "center" }); ty += 13; }
      if (bookData.isbn) { ty += 10; doc.text("ISBN: " + bookData.isbn, SPEC.pageW / 2, ty, { align: "center" }); }
      doc.setTextColor(30);

      if (bookData.dedication) {
        newPage(); ty = 150;
        doc.setFont(EPIGRAPH_FONT, "italic"); doc.setFontSize(10);
        const dedLines = bookData.dedication.split("\n").filter(function(l) { return l.trim(); });
        for (const para of dedLines) {
          const wrapped = wrapText(para, getTextWidth() - 20, 10, "italic");
          for (const line of wrapped) { doc.text(line, SPEC.pageW / 2, ty, { align: "center" }); ty += 16; }
          ty += 10;
        }
        newPage();
      }

      // ---- TWO-PASS RENDERING ----
      // Pass 1: Dry run to calculate chapter page numbers (no actual rendering)
      // Pass 2: Render everything with correct TOC page numbers
      
      onProgress("Calculating page layout...");
      
      // Helper: calculate how many pages a chapter's body text will take
      function calcBodyPages(ch, startY) {
        const textW = SPEC.pageW - SPEC.margins.recto.inside - SPEC.margins.recto.outside; // use recto for calc
        const maxY = SPEC.pageH - 50;
        const paragraphs = ch.body.split(/\n\s*\n/).map(function(p) { return p.replace(/\n/g, " ").trim(); }).filter(function(p) { return p; });
        let y = startY;
        let pages = 1;
        let isFirstPara = true;

        for (let pi = 0; pi < paragraphs.length; pi++) {
          const para = paragraphs[pi];
          if (isFirstPara && para.length > 0) {
            // Drop cap takes ~3 lines at the narrow width, then continues at full width
            doc.setFont(BODY_FONT, "normal"); doc.setFontSize(getDropCapSize());
            const dropCapWidth = doc.getTextWidth(para[0].toUpperCase()) + 5;
            doc.setFontSize(SPEC.bodySize);
            const narrowWidth = textW - dropCapWidth - 5;
            let remaining = para.slice(1);
            let lc = 0;
            while (lc < SPEC.dropCapLines && remaining.length > 0) {
              const nl = doc.splitTextToSize(remaining, narrowWidth);
              if (nl.length > 0) { remaining = remaining.slice(nl[0].length).trim(); y += SPEC.lineHeight; lc++; }
              else break;
            }
            if (remaining.length > 0) {
              const fl = doc.splitTextToSize(remaining, textW);
              for (const line of fl) {
                if (y > maxY) { pages++; y = SPEC.margins.recto.top + 30; }
                y += SPEC.lineHeight;
              }
            }
            isFirstPara = false; y += SPEC.paraGap; continue;
          }
          doc.setFont(BODY_FONT, "normal"); doc.setFontSize(SPEC.bodySize);
          const lines = doc.splitTextToSize(para, textW);
          
          // Apply same widow/orphan control as in rendering
          if (WIDOW_ORPHAN.enabled && lines.length > 0) {
            let linesOnCurrentPage = 0;
            let tempY = y;
            for (const line of lines) {
              if (tempY > maxY) break;
              linesOnCurrentPage++;
              tempY += SPEC.lineHeight;
            }
            
            const remainingLines = lines.length - linesOnCurrentPage;
            
            // Widow prevention or orphan prevention
            if ((remainingLines > 0 && remainingLines <= WIDOW_ORPHAN.minLinesAtPageStart) ||
                (linesOnCurrentPage > 0 && linesOnCurrentPage <= WIDOW_ORPHAN.minLinesAtPageEnd && remainingLines > 0)) {
              if (linesOnCurrentPage > 0) {
                pages++; y = SPEC.margins.recto.top + 30;
              }
            }
          }
          
          for (const line of lines) {
            if (y > maxY) { pages++; y = SPEC.margins.recto.top + 30; }
            y += SPEC.lineHeight;
          }
          y += SPEC.paraGap;
        }
        return pages;
      }

      // Calculate chapter opening Y position
      function calcOpeningHeight(ch) {
        let y = 55;
        if (ch.num) y += 45;
        // Title - use same smart wrapping as actual rendering
        const titleWrapped = wrapTitle(ch.title, 252, SPEC.chapterTitleSize);
        y += titleWrapped.length * 28 + 35;
        // Epigraph
        if (ch.epigraph) {
          doc.setFont(EPIGRAPH_FONT, "italic"); doc.setFontSize(14);
          const epLines = doc.splitTextToSize("\u201C" + ch.epigraph + "\u201D", 192);
          y += epLines.length * 20;
          if (ch.epigraphAttribution) y += 20;
          y += 30;
        } else { y += 25; }
        return y;
      }

      // PASS 1: Calculate page numbers
      const chapterPageNumbers = [];
      let currentArabicPage = 1;
      
      for (let ci = 0; ci < chapters.length; ci++) {
        const ch = chapters[ci];
        // Chapters start on odd pages
        if (currentArabicPage % 2 === 0) currentArabicPage++;
        chapterPageNumbers.push(currentArabicPage);
        
        const openingY = calcOpeningHeight(ch);
        const bodyPages = calcBodyPages(ch, openingY);
        currentArabicPage += bodyPages;
      }

      // ---- PASS 2: RENDER TOC WITH CORRECT PAGE NUMBERS ----
      onProgress("Building table of contents...");
      newPage(); ty = 60;
      doc.setFont(BODY_FONT, "bold"); doc.setFontSize(22); doc.setTextColor(30);
      doc.text("Contents", SPEC.pageW / 2, ty, { align: "center" }); ty += 50;

      const tocTextX = getTextX();
      const tocTextW = getTextWidth();

      // Compute the widest page number actually in this TOC so that short books
      // (single-digit pages) do not waste a two-digit reservation and truncate titles.
      doc.setFont(BODY_FONT, "normal"); doc.setFontSize(11);
      let maxPageNumWidth = 0;
      for (let i = 0; i < chapters.length; i++) {
        const w = doc.getTextWidth(String(chapterPageNumbers[i]));
        if (w > maxPageNumWidth) maxPageNumWidth = w;
      }

      // Consistent dot spacing: measure one dot glyph width + a fixed gap, used for every row.
      const dotGlyphWidth = doc.getTextWidth(".");
      const dotStep = dotGlyphWidth + 3; // 3pt gap between dots, same for every row

      for (let i = 0; i < chapters.length; i++) {
        const ch = chapters[i];
        // In the real book TOC, titles are shown without "Chapter X:" prefix
        const displayTitle = ch.title || ch.num;
        const pageNumStr = String(chapterPageNumbers[i]);

        doc.setFont(BODY_FONT, "normal"); doc.setFontSize(11); doc.setTextColor(30);

        // Reserve: [title] [gap] [dots...] [gap] [page num, right aligned]
        const gap = 6;
        const minDotsSpace = 18; // at least ~5 dots worth
        const maxTitleWidth = tocTextW - maxPageNumWidth - (gap * 2) - minDotsSpace;

        // Truncate title with ellipsis only if truly necessary
        let truncatedTitle = displayTitle;
        let titleWidth = doc.getTextWidth(truncatedTitle);
        if (titleWidth > maxTitleWidth) {
          while (titleWidth > maxTitleWidth && truncatedTitle.length > 10) {
            truncatedTitle = truncatedTitle.slice(0, -1);
            titleWidth = doc.getTextWidth(truncatedTitle + "\u2026");
          }
          truncatedTitle = truncatedTitle + "\u2026";
          titleWidth = doc.getTextWidth(truncatedTitle);
        }

        // Draw title (left)
        doc.text(truncatedTitle, tocTextX, ty);

        // Draw page number (right)
        const pageNumX = tocTextX + tocTextW;
        doc.text(pageNumStr, pageNumX, ty, { align: "right" });

        // Draw dot leaders between, using the same dotStep for every row so density is consistent
        const dotsStart = tocTextX + titleWidth + gap;
        const dotsEnd = pageNumX - maxPageNumWidth - gap;
        if (dotsEnd > dotsStart) {
          // Right-align the dots against the page-number column so dots end at the same x on every row
          let dotX = dotsEnd;
          while (dotX >= dotsStart) {
            doc.text(".", dotX, ty);
            dotX -= dotStep;
          }
        }

        ty += 30;
        if (ty > SPEC.pageH - 80) { newPage(); ty = 60; }
      }
      newPage(); // blank after TOC

      // ---- PASS 2: RENDER CHAPTERS ----
      for (let ci = 0; ci < chapters.length; ci++) {
        const ch = chapters[ci];
        onProgress("Formatting chapter " + (ci + 1) + " of " + chapters.length + "...");
        
        // Chapters start on recto (odd) pages
        if (!isRecto()) newPage();
        newPage();
        
        bookPageNum = chapterPageNumbers[ci];
        const textW = getTextWidth();
        const textX = getTextX();
        let y = 55;

        // Chapter number label. If there's no number (section pages like "Making It
        // Happen"), still advance y by the same amount so the title baseline matches
        // a regular chapter's title baseline. This keeps the visual grid consistent
        // across numbered chapters and named sections.
        if (ch.num) {
          doc.setFont(BODY_FONT, "normal"); doc.setFontSize(SPEC.chapterNumSize); doc.setTextColor(30);
          doc.text(ch.num, SPEC.pageW / 2, y, { align: "center" });
          y += 45;
        } else {
          y += 45;
        }

        // Chapter title
        doc.setFont(BODY_FONT, "bold"); doc.setFontSize(SPEC.chapterTitleSize);
        const titleWrapped = wrapTitle(ch.title, textW, SPEC.chapterTitleSize);
        for (const line of titleWrapped) { doc.text(line, SPEC.pageW / 2, y, { align: "center" }); y += 28; }
        y += 35;

        // Epigraph
        if (ch.epigraph) {
          doc.setFont(EPIGRAPH_FONT, "italic"); doc.setFontSize(14);
          const epText = "\u201C" + ch.epigraph + "\u201D";
          const epLines = wrapText(epText, textW - 60, 14, "italic");
          for (const line of epLines) { doc.text(line, SPEC.pageW / 2, y, { align: "center" }); y += 20; }
          if (ch.epigraphAttribution) { 
            y += 5; 
            doc.setFontSize(12); 
            doc.text("\u2013 " + ch.epigraphAttribution, SPEC.pageW / 2, y, { align: "center" }); 
            y += 15; 
          }
          y += 30;
        } else { 
          y += 25; 
        }

        // Body text with drop cap on first paragraph
        const paragraphs = ch.body.split(/\n\s*\n/).map(function(p) { return p.replace(/\n/g, " ").trim(); }).filter(function(p) { return p; });
        let isFirstPara = true;
        const maxY = SPEC.pageH - 50;
        let pagesUsed = 0;

        // Consistent baseline offset for all body text lines.
        // A line advances y by SPEC.lineHeight (15pt). The baseline of the glyph within that
        // slot sits at a fixed offset from the top. Using bodySize * 0.8 throughout matches
        // how non-drop-cap chapters render and keeps rhythm consistent.
        const BASELINE_OFFSET = SPEC.bodySize * 0.8;

        for (let pi = 0; pi < paragraphs.length; pi++) {
          let para = paragraphs[pi];
          if (isFirstPara && para.length > 0) {
            const dropLetter = para[0].toUpperCase();
            const restText = para.slice(1);

            // Drop cap positioning:
            // Typographic rule is that the top of the drop cap's cap-height should sit flush
            // with the top of the first body line's cap-height. jsPDF positions text by
            // baseline, so we work backwards:
            //   - First body line baseline is at (y + BASELINE_OFFSET)
            //   - Cap-height for most serif fonts is capHeightRatio * font size above baseline
            //   - First line cap-top = (y + BASELINE_OFFSET) - (bodySize * capHeightRatio)
            //   - Drop cap baseline = firstLineCapTop + (getDropCapSize() * capHeightRatio)
            // getDropCapSize() is sized so cap-height exactly spans dropCapLines of body text,
            // making the drop cap visually occupy the full 3-line block.
            const dropCapSize = getDropCapSize();
            doc.setFont(BODY_FONT, "normal"); doc.setFontSize(dropCapSize); doc.setTextColor(30);
            const dropCapWidth = doc.getTextWidth(dropLetter) + 5;
            const firstLineCapTop = (y + BASELINE_OFFSET) - (SPEC.bodySize * SPEC.capHeightRatio);
            const dropCapBaseline = firstLineCapTop + (dropCapSize * SPEC.capHeightRatio);
            doc.text(dropLetter, textX, dropCapBaseline);

            // Now render the narrow lines next to the drop cap using the SAME baseline offset
            // as all other body lines so vertical rhythm is preserved.
            doc.setFontSize(SPEC.bodySize);
            const narrowWidth = textW - dropCapWidth - 5;
            let remainingText = restText;
            let lineCount = 0;
            while (lineCount < SPEC.dropCapLines && remainingText.length > 0) {
              const narrowLines = wrapText(remainingText, narrowWidth, SPEC.bodySize);
              if (narrowLines.length > 0) {
                doc.text(narrowLines[0], textX + dropCapWidth, y + BASELINE_OFFSET);
                remainingText = remainingText.slice(narrowLines[0].length).trim();
                y += SPEC.lineHeight; lineCount++;
              } else break;
            }
            if (remainingText.length > 0) {
              // Add a small gap between drop cap section and remaining text
              y += 3;
              const fullLines = wrapText(remainingText, textW, SPEC.bodySize);
              for (const line of fullLines) {
                if (y > maxY) { newPage(); pagesUsed++; addRunningHeader(ch.title || ch.num || ""); addPageNumber(bookPageNum + pagesUsed); y = getMargins().top + 30; resetBodyFont(); }
                doc.text(line, textX, y + BASELINE_OFFSET); y += SPEC.lineHeight;
              }
            }
            isFirstPara = false; y += SPEC.paraGap; continue;
          }
          doc.setFont(BODY_FONT, "normal"); doc.setFontSize(SPEC.bodySize); doc.setTextColor(30);
          const lines = wrapText(para, textW, SPEC.bodySize);
          
          // Widow/orphan control
          if (WIDOW_ORPHAN.enabled && lines.length > 0) {
            // Check how many lines can fit on current page
            let linesOnCurrentPage = 0;
            let tempY = y;
            for (const line of lines) {
              if (tempY > maxY) break;
              linesOnCurrentPage++;
              tempY += SPEC.lineHeight;
            }
            
            const remainingLines = lines.length - linesOnCurrentPage;
            
            // Widow prevention: if 1-2 lines would be left alone on next page
            if (remainingLines > 0 && remainingLines <= WIDOW_ORPHAN.minLinesAtPageStart) {
              // Force page break before this paragraph to keep it together
              if (linesOnCurrentPage > 0) {
                newPage(); pagesUsed++; addRunningHeader(ch.title || ch.num || ""); 
                addPageNumber(bookPageNum + pagesUsed); 
                y = getMargins().top + 30;
                resetBodyFont();
              }
            }
            
            // Orphan prevention: if only 1-2 lines would fit at bottom of current page
            else if (linesOnCurrentPage > 0 && linesOnCurrentPage <= WIDOW_ORPHAN.minLinesAtPageEnd && remainingLines > 0) {
              // Force page break to avoid orphaning just 1-2 lines
              newPage(); pagesUsed++; addRunningHeader(ch.title || ch.num || ""); 
              addPageNumber(bookPageNum + pagesUsed); 
              y = getMargins().top + 30;
              resetBodyFont();
            }
          }
          
          // Render all lines of the paragraph
          for (const line of lines) {
            if (y > maxY) { newPage(); pagesUsed++; addRunningHeader(ch.title || ch.num || ""); addPageNumber(bookPageNum + pagesUsed); y = getMargins().top + 30; }
            doc.text(line, textX, y + BASELINE_OFFSET); y += SPEC.lineHeight;
          }
          y += SPEC.paraGap;
        }
      }

      onProgress("Finalizing PDF...");
      return doc.output("blob");
    }

    /* ---- UI Components ---- */

    function StepIndicator({ currentStep, steps }) {
      return (
        <div style={{ display: "flex", gap: 4, marginBottom: 28 }}>
          {steps.map((s, i) => (
            <div key={i} style={{ flex: 1 }}>
              <div style={{ height: 3, borderRadius: 2, background: i <= currentStep ? BRAND.accent : BRAND.border, transition: "background 0.3s" }} />
              <div style={{ fontSize: 11, fontFamily: FONT, color: i <= currentStep ? BRAND.textPrimary : BRAND.textMuted, marginTop: 8, fontWeight: i === currentStep ? 600 : 500, letterSpacing: "0.02em" }}>{s}</div>
            </div>
          ))}
        </div>
      );
    }

    // Numbered step badge (blue number on soft blue background), matching Mockup tool
    function StepBadge({ num }) {
      return (
        <div style={{ display: "inline-flex", alignItems: "center", justifyContent: "center", width: 28, height: 28, borderRadius: 8, background: BRAND.stepBadgeBg, color: BRAND.stepBadgeText, fontSize: 13, fontWeight: 700, fontFamily: FONT, marginRight: 10, verticalAlign: "middle" }}>{num}</div>
      );
    }

    // Small uppercase section label
    function SectionLabel({ children }) {
      return (
        <div style={{ fontSize: 11, fontFamily: FONT, color: BRAND.label, fontWeight: 700, letterSpacing: "0.1em", textTransform: "uppercase", marginBottom: 8 }}>{children}</div>
      );
    }

    function Input({ label, value, onChange, placeholder, multiline, rows, serif }) {
      rows = rows || 3;
      const baseStyle = {
        width: "100%", padding: "10px 14px", background: BRAND.white,
        border: "1px solid " + BRAND.border, borderRadius: 8,
        color: BRAND.textPrimary, fontSize: 14,
        fontFamily: serif ? "'Gelasio', Georgia, serif" : FONT,
        outline: "none", resize: multiline ? "vertical" : "none",
        transition: "border-color 0.2s", boxSizing: "border-box",
      };
      return (
        <div style={{ marginBottom: 16 }}>
          {label && <label style={{ display: "block", fontSize: 12, fontFamily: FONT, color: BRAND.textSecondary, marginBottom: 6, fontWeight: 500 }}>{label}</label>}
          {multiline ? (
            <textarea value={value} onChange={function(e) { onChange(e.target.value); }} placeholder={placeholder} rows={rows} style={baseStyle} />
          ) : (
            <input value={value} onChange={function(e) { onChange(e.target.value); }} placeholder={placeholder} style={baseStyle} />
          )}
        </div>
      );
    }

    function Button({ children, onClick, variant, disabled, style: extraStyle }) {
      variant = variant || "primary";
      const base = { padding: "11px 24px", borderRadius: 10, border: "none", fontSize: 14, fontFamily: FONT, fontWeight: 600, cursor: disabled ? "not-allowed" : "pointer", transition: "all 0.2s", opacity: disabled ? 0.5 : 1, display: "inline-flex", alignItems: "center", gap: 6 };
      const variants = {
        primary: { background: BRAND.accent, color: BRAND.white },
        secondary: { background: BRAND.white, color: BRAND.textSecondary, border: "1px solid " + BRAND.border },
      };
      return <button onClick={disabled ? undefined : onClick} style={Object.assign({}, base, variants[variant], extraStyle)}>{children}</button>;
    }

    function ChapterCard({ chapter, index, onEdit, onRemove }) {
      const [expanded, setExpanded] = useState(false);
      const wordCount = chapter.body.split(/\s+/).filter(Boolean).length;
      return (
        <div style={{ background: BRAND.white, border: "1px solid " + BRAND.border, borderRadius: 10, padding: 16, marginBottom: 8 }}>
          <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}>
            <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
              <div style={{ width: 28, height: 28, borderRadius: 8, background: BRAND.stepBadgeBg, color: BRAND.stepBadgeText, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 12, fontWeight: 700, fontFamily: FONT }}>{index + 1}</div>
              <div>
                <div style={{ fontWeight: 600, fontSize: 14, fontFamily: FONT, color: BRAND.textPrimary }}>
                  {chapter.num && <span style={{ color: BRAND.textMuted, fontWeight: 400 }}>{chapter.num} &middot; </span>}
                  {chapter.title || "Untitled"}
                </div>
                <div style={{ fontSize: 12, fontFamily: FONT, color: BRAND.textMuted, marginTop: 2 }}>{wordCount.toLocaleString()} words{chapter.epigraph ? " \u00b7 has epigraph" : ""}</div>
              </div>
            </div>
            <div style={{ display: "flex", gap: 6 }}>
              <button onClick={function() { setExpanded(!expanded); }} style={{ background: "none", border: "none", color: BRAND.accentDeep, cursor: "pointer", fontSize: 12, fontFamily: FONT, padding: "4px 8px", fontWeight: 600 }}>{expanded ? "Collapse" : "Edit"}</button>
              <button onClick={function() { onRemove(chapter.id); }} style={{ background: "none", border: "none", color: BRAND.danger + "88", cursor: "pointer", fontSize: 12, fontFamily: FONT, padding: "4px 8px" }}>Remove</button>
            </div>
          </div>
          {expanded && (
            <div style={{ marginTop: 16, paddingTop: 16, borderTop: "1px solid " + BRAND.borderLight }}>
              <Input label="Chapter Number/Label" value={chapter.num} onChange={function(v) { onEdit(chapter.id, "num", v); }} placeholder="e.g. Chapter 1" />
              <Input label="Chapter Title" value={chapter.title} onChange={function(v) { onEdit(chapter.id, "title", v); }} placeholder="e.g. Discovering The Tinybook Client System" />
              <Input label="Epigraph (optional)" value={chapter.epigraph} onChange={function(v) { onEdit(chapter.id, "epigraph", v); }} placeholder="Opening quote for the chapter" />
              <Input label="Epigraph Attribution" value={chapter.epigraphAttribution} onChange={function(v) { onEdit(chapter.id, "epigraphAttribution", v); }} placeholder="e.g. Helen Hayes" />
              <Input label="Body Text" value={chapter.body} onChange={function(v) { onEdit(chapter.id, "body", v); }} multiline={true} rows={8} serif={true} />
            </div>
          )}
        </div>
      );
    }

    function PagePreview({ bookData, chapters }) {
      const ch = chapters[0];
      if (!ch) return null;
      return (
        <div style={{ width: 220, height: 352, background: "#fff", borderRadius: 4, overflow: "hidden", flexShrink: 0, border: "1px solid " + BRAND.border, boxShadow: "0 4px 24px rgba(26,33,44,0.1)" }}>
          <div style={{ padding: "24px 20px 16px", textAlign: "center" }}>
            {ch.num && <div style={{ fontFamily: "'Gelasio', Georgia, serif", fontSize: 9, color: "#555", marginBottom: 14 }}>{ch.num}</div>}
            <div style={{ fontFamily: "'Gelasio', Georgia, serif", fontSize: 12, fontWeight: 700, color: "#111", lineHeight: 1.3, marginBottom: 12 }}>{ch.title}</div>
            {ch.epigraph && <div style={{ fontFamily: "'EB Garamond', Georgia, serif", fontStyle: "italic", fontSize: 9, color: "#555", lineHeight: 1.4, marginBottom: 3 }}>&ldquo;{ch.epigraph}&rdquo;</div>}
            {ch.epigraphAttribution && <div style={{ fontFamily: "'EB Garamond', Georgia, serif", fontStyle: "italic", fontSize: 8, color: "#888", marginBottom: 12 }}>- {ch.epigraphAttribution}</div>}
            {ch.body && (
              <div style={{ textAlign: "justify" }}>
                <span style={{ fontFamily: "'Gelasio', Georgia, serif", fontSize: 20, fontWeight: 400, float: "left", lineHeight: 1, marginRight: 3, marginTop: 2, color: "#111" }}>{ch.body[0] ? ch.body[0].toUpperCase() : ""}</span>
                <span style={{ fontFamily: "'Gelasio', Georgia, serif", fontSize: 6.5, lineHeight: 1.5, color: "#444" }}>{ch.body.slice(1, 350)}...</span>
              </div>
            )}
          </div>
        </div>
      );
    }

    /* ---- Main App ---- */

    function TinybookFormatter() {
      const [step, setStep] = useState(0);
      const [generating, setGenerating] = useState(false);
      const [progress, setProgress] = useState("");
      const [error, setError] = useState("");
      const [pdfUrl, setPdfUrl] = useState(null);
      const [textSizePreset, setTextSizePreset] = useState('default');
      const [bookData, setBookData] = useState({ title: "", subtitle: "", author: "", publisher: "", isbn: "", dedication: "", copyrightText: "", ctaTitle: "", ctaBody: "", ctaUrl: "" });
      const [rawText, setRawText] = useState("");
      const [chapters, setChapters] = useState([]);

      const [showChangelog, setShowChangelog] = useState(false);

      const loadSampleData = function() {
        setBookData({
          title: "Get Big Clients With Tiny Books",
          subtitle: "The New Mechanics of Earning More and Working Less",
          author: "Gary White",
          publisher: "Bestseller Profits Publishing",
          isbn: "978-1-9193202-1-2",
          dedication: "To my wife Sammi, my partner in every adventure and the foundation of all we've built together.\n\nTo my daughter Summer, whose laughter reminds me daily why freedom matters.\n\nAnd to Franklin, our golden retriever, whose unrelenting joy on our midweek hikes taught me what true presence looks like.\n\nYou three are my why, the reason I pursue freedom, and the best part of having found it. Thank you for showing me that success without family time isn't success at all.\n\nThis book, like everything I do, is for you.",
          copyrightText: "",
          ctaTitle: "Join The 48-Hour Tinybook Challenge",
          ctaBody: "Finally, quickly and easily create your first (or next) Tinybook and start generating leads in the next 48 hours or less, guaranteed.",
          ctaUrl: "GetClientsWithBooks.com/Challenge",
        });
        setRawText("Chapter 1\nDiscovering The Tinybook Client System\n\n\"The expert in anything was once a beginner.\" - Helen Hayes\n\nMany years earlier, while standing in that Boise conference room, I could feel my heart pounding. There I was, surrounded by the best funnel builders in the world at Russell Brunson's Mastermind.\n\nMy fingers were cramped from hours of repetitive mouse clicking, my eyes burned from staring at the screen, and my desk was littered with empty energy drink cans. But I was in the zone.\n\nWhen they announced the finalists, my heart nearly stopped. Then came the moment when Russell himself pointed to my funnel and said it was the winner. Not just top thirty, but number one.\n\nBut life has a funny way of humbling you just when you think you've made it. I flew home from that Mastermind on cloud nine. I updated my website, I rewrote my freelancer profile, and waited for clients to start pouring in. They didn't.\n\nMeanwhile, I watched as other funnel builders from the same Mastermind began launching very successful ventures, posted about their million-dollar months, and began to build large online followings. I would scroll through my Facebook feed at 2 AM, a growing unease tightening in my chest as I wondered what secrets they possessed that I lacked.\n\nI had the skills. I had the recognition. I had the title. But I didn't have the clients.\n\nChapter 2\nT is for \"The Perfect Bait\"\n\n\"The best bait catches the fish without forcing them to bite.\" - Chet Holmes\n\nLong before the birth of the Tinybook Client System, one of the first book marketing campaigns I led was for Brendan Kane's bestselling book.\n\nThe core premise of the book was that building a massive social media following is about implementing a systematic, data-driven approach. To prove this, Brendan built an online following of one million people in just 30 days.\n\nSuch a powerful hook meant that our book sales scaled well. Our specific campaign directly sold 9,077 books in the first 150 Days, not including traditional Amazon or bookstore sales.\n\nOn the surface, the results looked great, but a huge problem was lurking in the shadows. We were finding it incredibly difficult to convert book buyers into high-value backend clients. We tested various angles, programs, and offers, but nothing seemed to hit the mark.\n\nChapter 3\nI is for \"Independent Selling System\"\n\nThe real breakthrough came when I stopped thinking about funnels as technology and started thinking about them as conversations. Every great salesperson knows that the key to closing is not the pitch. It is the sequence of trust-building moments that precede it.\n\nYour book funnel is that sequence, automated and running around the clock. While you sleep, while you walk the dog, while you sit in a coffee shop with your family, your funnel is having that conversation with hundreds of potential clients simultaneously.\n\nThe Independent Selling System has three core components. First, the book itself acts as the initial trust builder. Second, the order bump and one-click offer qualify buyer intent. Third, the backend conversion mechanism turns qualified buyers into high-value clients.\n\nEach component works independently, but together they create a self-sustaining client acquisition engine that does not depend on your personal time or energy.\n\nMaking It Happen\n\nIf you have read this far, you already know more about book-based client acquisition than most experts in your field will ever learn. The question now is not whether this works. The question is whether you will take action.\n\nThe difference between those who succeed with this system and those who do not comes down to one thing: implementation speed. The longer you wait, the more reasons you will find not to start.");
        setChapters([]);
        setStep(0);
      };

      const updateBook = function(field, value) { setBookData(function(prev) { return Object.assign({}, prev, { [field]: value }); }); };
      const handleDetectChapters = function() {
        console.log('=== Chapter Detection Debug ===');
        console.log('Raw text length:', rawText.length);
        console.log('Raw text (first 500 chars):', rawText.substring(0, 500));
        console.log('Raw text (trimmed):', rawText.trim().length > 0);
        
        const detected = detectChapters(rawText);
        console.log('Detected chapters:', detected.length);
        detected.forEach(function(ch, i) {
          console.log(`Chapter ${i + 1}:`, { num: ch.num, title: ch.title, bodyLength: ch.body.length });
        });
        
        if (detected.length === 0) {
          console.log('No chapters detected, creating single chapter with all text');
          setChapters([{ id: Math.random().toString(36).slice(2), num: "Chapter 1", title: "Untitled", epigraph: "", epigraphAttribution: "", body: rawText }]);
        } else { 
          setChapters(detected); 
        }
        setStep(2);
      };
      const handleEditChapter = function(id, field, value) { setChapters(function(prev) { return prev.map(function(ch) { return ch.id === id ? Object.assign({}, ch, { [field]: value }) : ch; }); }); };
      const handleRemoveChapter = function(id) { setChapters(function(prev) { return prev.filter(function(ch) { return ch.id !== id; }); }); };
      const handleAddChapter = function() { setChapters(function(prev) { return prev.concat([{ id: Math.random().toString(36).slice(2), num: "Chapter " + (prev.length + 1), title: "", epigraph: "", epigraphAttribution: "", body: "" }]); }); };

      const handleGenerate = async function() {
        setGenerating(true); setProgress("Starting..."); setError("");
        try {
          const blob = await generatePDF(bookData, chapters, setProgress, textSizePreset);
          if (!blob || blob.size === 0) { setError("PDF generation produced an empty file."); return; }
          setPdfUrl(URL.createObjectURL(blob));
          setStep(4);
        } catch (err) {
          console.error("PDF generation error:", err);
          setError("PDF generation failed: " + (err.message || String(err)));
        } finally {
          setGenerating(false);
        }
      };

      const handleFileUpload = function(e) {
        const file = e.target.files && e.target.files[0];
        if (!file) return;
        
        const fileName = file.name.toLowerCase();
        setError(''); // Clear any previous errors
        setProgress(''); // Clear any previous progress
        
        console.log('File selected:', fileName, 'Size:', file.size, 'Type:', file.type);
        
        // Basic file validation
        if (file.size === 0) {
          setError('The selected file is empty.');
          return;
        }
        
        if (file.size > 50 * 1024 * 1024) { // 50MB limit
          setError('File is too large (max 50MB). Try a smaller document.');
          return;
        }
        
        if (fileName.endsWith('.docx')) {
          // Handle .docx files with mammoth.js
          console.log('Processing .docx file...');
          console.log('Mammoth available?', typeof mammoth !== 'undefined');
          
          if (typeof mammoth === 'undefined') {
            setError('DOCX support library not loaded. Please refresh the page and try again.');
            return;
          }
          
          if (typeof mammoth.extractRawText !== 'function') {
            setError('DOCX support library incomplete. Please refresh the page and try again.');
            return;
          }
          
          setProgress('Reading Word document...');
          
          // Convert file to ArrayBuffer for mammoth.js
          const reader = new FileReader();
          reader.onload = function(e) {
            const arrayBuffer = e.target.result;
            console.log('ArrayBuffer created, size:', arrayBuffer.byteLength);
            
            if (arrayBuffer.byteLength === 0) {
              setError('The selected file appears to be empty or corrupted.');
              setProgress('');
              return;
            }
            
            mammoth.extractRawText({arrayBuffer: arrayBuffer}).then(function(result) {
              console.log('Mammoth success:', result);
              let extractedText = result.value || '';
              
              // Check if extraction actually worked
              if (extractedText.length === 0) {
                setError('No text could be extracted from this Word document. Try saving it as .txt instead.');
                setProgress('');
                return;
              }
              
              // Clean up the text - mammoth sometimes adds extra whitespace
              extractedText = extractedText
                .replace(/\r\n/g, '\n')  // Normalize line endings
                .replace(/\n{3,}/g, '\n\n')  // Collapse multiple empty lines to double
                .trim();
              
              console.log('Extracted text length:', extractedText.length);
              console.log('First 200 chars:', extractedText.substring(0, 200));
              
              setRawText(extractedText);
              setProgress('');
              
              // Show any mammoth warnings
              if (result.messages && result.messages.length > 0) {
                console.log('Mammoth warnings:', result.messages);
              }
            }).catch(function(err) {
              console.error('Mammoth extraction error:', err);
              setError('Could not read Word document: ' + (err.message || 'File may be corrupted or password-protected. Try saving as .txt instead.'));
              setProgress('');
            });
          };
          
          reader.onerror = function(err) {
            console.error('File reading error:', err);
            setError('Failed to read file. Try saving your Word document as .txt instead.');
            setProgress('');
          };
          
          reader.readAsArrayBuffer(file);
        } else {
          // Handle .txt and .md files
          console.log('Processing text file...');
          const reader = new FileReader();
          reader.onload = function(ev) { 
            const text = ev.target.result || '';
            console.log('Text file loaded, length:', text.length);
            setRawText(text);
          };
          reader.onerror = function(err) {
            console.error('File reading error:', err);
            setError('Failed to read text file.');
          };
          reader.readAsText(file);
        }
      };

      const steps = ["Book Details", "Manuscript", "Chapters", "Preview", "Download"];
      const totalWords = chapters.reduce(function(sum, ch) { return sum + ch.body.split(/\s+/).filter(Boolean).length; }, 0);

      return (
        <div style={{ minHeight: "100vh", background: BRAND.bgPage, color: BRAND.textPrimary, fontFamily: FONT }}>
          {/* Top utility bar - version + sample data */}
          <div style={{ position: "absolute", top: 16, right: 20, display: "flex", alignItems: "center", gap: 10, zIndex: 10 }}>
            <button onClick={loadSampleData} style={{ padding: "6px 14px", borderRadius: 6, border: "1px solid " + BRAND.border, background: BRAND.white, color: BRAND.textSecondary, cursor: "pointer", fontSize: 11, fontFamily: FONT, fontWeight: 500 }}>Load Sample Data</button>
            <button onClick={function() { setShowChangelog(!showChangelog); }} style={{ padding: "4px 10px", borderRadius: 4, border: "1px solid " + BRAND.border, background: BRAND.white, color: BRAND.textMuted, cursor: "pointer", fontSize: 10, fontFamily: FONT, fontWeight: 600 }}>v{APP_VERSION.version}</button>
          </div>

          {showChangelog && (
            <div style={{ position: "absolute", top: 52, right: 20, background: BRAND.white, border: "1px solid " + BRAND.border, borderRadius: 10, padding: "14px 18px", boxShadow: "0 8px 24px rgba(26,33,44,0.08)", maxWidth: 420, zIndex: 20 }}>
              <div style={{ fontSize: 11, fontWeight: 700, color: BRAND.navy, fontFamily: FONT, marginBottom: 8, letterSpacing: "0.05em", textTransform: "uppercase" }}>Version History</div>
              {APP_VERSION.changes.map(function(change, i) {
                return <div key={i} style={{ fontSize: 11, color: i === 0 ? BRAND.textPrimary : BRAND.textMuted, fontFamily: FONT, padding: "3px 0", lineHeight: 1.5 }}>{change}</div>;
              })}
            </div>
          )}

          {/* Hero header */}
          <div style={{ padding: "56px 20px 32px", textAlign: "center" }}>
            <h1 style={{ fontSize: 38, fontWeight: 800, color: BRAND.navy, fontFamily: FONT, letterSpacing: "-0.02em", marginBottom: 12 }}>Tinybook Formatter</h1>
            <p style={{ fontSize: 15, color: BRAND.textSecondary, fontFamily: FONT, maxWidth: 560, margin: "0 auto", lineHeight: 1.5 }}>
              Turn your manuscript into a print-ready 5" &times; 8" interior PDF with professional typography, drop caps, and table of contents.
            </p>
          </div>

          <div style={{ maxWidth: 760, margin: "0 auto", padding: "0 20px 60px" }}>
            <div style={{ background: BRAND.white, borderRadius: 16, border: "1px solid " + BRAND.border, boxShadow: "0 4px 16px rgba(26,33,44,0.04)", padding: "32px 32px 28px" }}>
              <StepIndicator currentStep={step} steps={steps} />

            {step === 0 && (
              <div>
                <div style={{ display: "flex", alignItems: "center", marginBottom: 4 }}>
                  <StepBadge num="1" />
                  <SectionLabel>Book Details</SectionLabel>
                </div>
                <p style={{ color: BRAND.textSecondary, fontSize: 13, marginBottom: 20, fontFamily: FONT, lineHeight: 1.5 }}>Enter your book information. These details appear on the title page, copyright page, and running headers.</p>
                
                <div style={{ marginBottom: 24, padding: 16, background: BRAND.light, borderRadius: 10, border: "1px solid " + BRAND.border }}>
                  <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}>
                    <div>
                      <div style={{ fontSize: 13, fontWeight: 600, marginBottom: 4, color: BRAND.navy, fontFamily: FONT }}>Body Text Size</div>
                      <div style={{ fontSize: 12, color: BRAND.textMuted, fontFamily: FONT }}>Choose between default or Lisa-style spacing</div>
                    </div>
                    <select 
                      value={textSizePreset} 
                      onChange={function(e) { setTextSizePreset(e.target.value); }}
                      style={{ 
                        padding: "8px 12px", 
                        borderRadius: 6, 
                        border: "1px solid " + BRAND.border, 
                        background: BRAND.white, 
                        fontFamily: FONT, 
                        fontSize: 12,
                        color: BRAND.textPrimary,
                        cursor: "pointer"
                      }}
                    >
                      {Object.entries(TEXT_PRESETS).map(function([key, preset]) {
                        return <option key={key} value={key}>{preset.label}</option>;
                      })}
                    </select>
                  </div>
                </div>
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
                  <Input label="Book Title *" value={bookData.title} onChange={function(v) { updateBook("title", v); }} placeholder="Get Big Clients With Tiny Books" />
                  <Input label="Author Name *" value={bookData.author} onChange={function(v) { updateBook("author", v); }} placeholder="Gary White" />
                </div>
                <Input label="Subtitle" value={bookData.subtitle} onChange={function(v) { updateBook("subtitle", v); }} placeholder="The New Mechanics of Earning More and Working Less" />
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
                  <Input label="Publisher" value={bookData.publisher} onChange={function(v) { updateBook("publisher", v); }} placeholder="Bestseller Profits Publishing" />
                  <Input label="ISBN" value={bookData.isbn} onChange={function(v) { updateBook("isbn", v); }} placeholder="978-1-9193202-1-2" />
                </div>
                <Input label="Dedication" value={bookData.dedication} onChange={function(v) { updateBook("dedication", v); }} multiline={true} rows={4} placeholder="To my wife Sammi..." />
                <div style={{ marginTop: 8, padding: 16, background: BRAND.light, borderRadius: 10, border: "1px solid " + BRAND.border }}>
                  <div style={{ fontSize: 13, fontWeight: 600, marginBottom: 12, color: BRAND.navy, fontFamily: FONT }}>Reader Bonus Page (Optional)</div>
                  <Input label="CTA Title" value={bookData.ctaTitle} onChange={function(v) { updateBook("ctaTitle", v); }} placeholder="Join The 48-Hour Tinybook Challenge" />
                  <Input label="CTA Description" value={bookData.ctaBody} onChange={function(v) { updateBook("ctaBody", v); }} multiline={true} rows={3} placeholder="Finally, quickly and easily create your first Tinybook..." />
                  <Input label="CTA URL" value={bookData.ctaUrl} onChange={function(v) { updateBook("ctaUrl", v); }} placeholder="GetClientsWithBooks.com/Challenge" />
                </div>
                <div style={{ display: "flex", justifyContent: "flex-end", marginTop: 20 }}>
                  <Button onClick={function() { setStep(1); }} disabled={!bookData.title || !bookData.author}>Next: Add Manuscript &rarr;</Button>
                </div>
              </div>
            )}

            {step === 1 && (
              <div>
                <div style={{ display: "flex", alignItems: "center", marginBottom: 4 }}>
                  <StepBadge num="2" />
                  <SectionLabel>Manuscript</SectionLabel>
                </div>
                <p style={{ color: BRAND.textSecondary, fontSize: 13, marginBottom: 24, fontFamily: FONT, lineHeight: 1.5 }}>Paste your manuscript text or upload a .txt or .docx file. The formatter will automatically detect chapters. <em>If .docx upload fails, save your Word document as .txt and try again.</em></p>
                
                {progress && (
                  <div style={{ padding: 12, background: BRAND.light, border: "1px solid " + BRAND.border, borderRadius: 10, marginBottom: 16 }}>
                    <div style={{ fontSize: 14, fontWeight: 600, fontFamily: FONT, color: BRAND.accentDeep }}>{progress}</div>
                  </div>
                )}
                {error && (
                  <div style={{ padding: 16, background: "#FEF2F2", border: "1px solid #FECACA", borderRadius: 10, marginBottom: 16 }}>
                    <div style={{ fontSize: 13, fontFamily: FONT, color: "#991B1B", fontWeight: 500 }}>{error}</div>
                  </div>
                )}
                <label style={{ padding: "10px 20px", borderRadius: 8, border: "1px solid " + BRAND.border, cursor: "pointer", fontSize: 14, fontFamily: FONT, color: BRAND.textPrimary, background: BRAND.white, display: "inline-flex", alignItems: "center", gap: 6, marginBottom: 16 }}>
                  Upload .txt or .docx File
                  <input type="file" accept=".txt,.md,.docx" onChange={handleFileUpload} style={{ display: "none" }} />
                </label>
                <textarea value={rawText} onChange={function(e) { setRawText(e.target.value); }}
                  placeholder="Paste your manuscript here..."
                  style={{ width: "100%", height: 400, padding: 16, background: BRAND.white, border: "1px solid " + BRAND.border, borderRadius: 10, color: BRAND.textPrimary, fontSize: 13, fontFamily: "'Gelasio', Georgia, serif", lineHeight: 1.6, outline: "none", resize: "vertical", boxSizing: "border-box" }} />
                <div style={{ display: "flex", justifyContent: "space-between", marginTop: 20 }}>
                  <Button variant="secondary" onClick={function() { setStep(0); }}>&larr; Back</Button>
                  <Button onClick={handleDetectChapters} disabled={!rawText.trim()}>Detect Chapters &rarr;</Button>
                </div>
              </div>
            )}

            {step === 2 && (
              <div>
                <div style={{ display: "flex", alignItems: "center", marginBottom: 4 }}>
                  <StepBadge num="3" />
                  <SectionLabel>Chapters</SectionLabel>
                </div>
                <p style={{ color: BRAND.textSecondary, fontSize: 13, marginBottom: 8, fontFamily: FONT }}>{chapters.length} chapters detected &middot; {totalWords.toLocaleString()} total words</p>
                <p style={{ color: BRAND.textMuted, fontSize: 12, marginBottom: 20, fontFamily: FONT }}>Click "Edit" on any chapter to adjust titles, epigraphs, or body text.</p>
                {chapters.map(function(ch, i) { return <ChapterCard key={ch.id} chapter={ch} index={i} onEdit={handleEditChapter} onRemove={handleRemoveChapter} />; })}
                <button onClick={handleAddChapter} style={{ width: "100%", padding: 12, borderRadius: 10, border: "1px dashed " + BRAND.border, background: "transparent", color: BRAND.textMuted, cursor: "pointer", fontSize: 13, fontFamily: FONT, marginTop: 8 }}>+ Add Chapter</button>
                <div style={{ display: "flex", justifyContent: "space-between", marginTop: 20 }}>
                  <Button variant="secondary" onClick={function() { setStep(1); }}>&larr; Back</Button>
                  <Button onClick={function() { setStep(3); }} disabled={chapters.length === 0}>Preview &rarr;</Button>
                </div>
              </div>
            )}

            {step === 3 && (
              <div>
                <div style={{ display: "flex", alignItems: "center", marginBottom: 4 }}>
                  <StepBadge num="4" />
                  <SectionLabel>Preview & Generate</SectionLabel>
                </div>
                <p style={{ color: BRAND.textSecondary, fontSize: 13, marginBottom: 24, fontFamily: FONT, lineHeight: 1.5 }}>Review your book details before generating the print-ready PDF.</p>
                <div style={{ display: "flex", gap: 24, marginBottom: 24 }}>
                  <PagePreview bookData={bookData} chapters={chapters} />
                  <div style={{ flex: 1 }}>
                    <div style={{ background: BRAND.white, borderRadius: 10, border: "1px solid " + BRAND.border, padding: 16 }}>
                      <div style={{ fontSize: 11, fontFamily: FONT, color: BRAND.textMuted, marginBottom: 12, textTransform: "uppercase", letterSpacing: "0.05em", fontWeight: 600 }}>Book Summary</div>
                      {[["Title", bookData.title], ["Author", bookData.author], ["Chapters", chapters.length], ["Total Words", totalWords.toLocaleString()], ["Format", '5" \u00d7 8"']].filter(function(pair) { return pair[1]; }).map(function(pair) {
                        return (
                          <div key={pair[0]} style={{ display: "flex", justifyContent: "space-between", padding: "6px 0", borderBottom: "1px solid " + BRAND.borderLight, fontSize: 13, fontFamily: FONT }}>
                            <span style={{ color: BRAND.textSecondary }}>{pair[0]}</span>
                            <span style={{ fontWeight: 500, color: BRAND.navy }}>{pair[1]}</span>
                          </div>
                        );
                      })}
                    </div>
                  </div>
                </div>
                {generating && (
                  <div style={{ padding: 16, background: BRAND.stepBadgeBg, border: "1px solid " + BRAND.accent + "44", borderRadius: 10, marginBottom: 16, textAlign: "center" }}>
                    <div style={{ fontSize: 14, fontWeight: 600, fontFamily: FONT, color: BRAND.accentDeep }}>{progress}</div>
                  </div>
                )}
                {error && (
                  <div style={{ padding: 16, background: "#FEF2F2", border: "1px solid #FECACA", borderRadius: 10, marginBottom: 16 }}>
                    <div style={{ fontSize: 13, fontFamily: FONT, color: "#991B1B", fontWeight: 500 }}>{error}</div>
                  </div>
                )}
                <div style={{ display: "flex", justifyContent: "space-between", marginTop: 20 }}>
                  <Button variant="secondary" onClick={function() { setStep(2); }}>&larr; Back</Button>
                  <Button onClick={handleGenerate} disabled={generating}>{generating ? "Generating..." : "Generate PDF"}</Button>
                </div>
              </div>
            )}

            {step === 4 && pdfUrl && (
              <div style={{ textAlign: "center", paddingTop: 40 }}>
                <div style={{ width: 64, height: 64, borderRadius: 16, background: BRAND.success + "15", display: "flex", alignItems: "center", justifyContent: "center", margin: "0 auto 20px", fontSize: 28 }}>&#10003;</div>
                <h2 style={{ fontSize: 22, fontWeight: 700, marginBottom: 8, color: BRAND.navy, fontFamily: FONT }}>Your Tinybook is Ready</h2>
                <p style={{ color: BRAND.textSecondary, fontSize: 14, marginBottom: 32, fontFamily: FONT }}>{bookData.title} &middot; {chapters.length} chapters &middot; {totalWords.toLocaleString()} words</p>
                <div style={{ display: "flex", gap: 12, justifyContent: "center" }}>
                  <a href={pdfUrl} download={(bookData.title.replace(/\s+/g, "_")) + "_Interior.pdf"} style={{ padding: "13px 32px", borderRadius: 10, background: BRAND.accent, color: BRAND.white, fontWeight: 700, fontSize: 15, fontFamily: FONT, textDecoration: "none", display: "inline-flex", alignItems: "center", gap: 8 }}>&darr; Download PDF</a>
                  <Button variant="secondary" onClick={function() { setPdfUrl(null); setStep(3); }}>Back to Preview</Button>
                </div>
                <div style={{ marginTop: 40, padding: 16, background: BRAND.white, borderRadius: 10, border: "1px solid " + BRAND.border, textAlign: "left", maxWidth: 480, margin: "40px auto 0" }}>
                  <div style={{ fontSize: 12, fontWeight: 600, marginBottom: 8, color: BRAND.navy, fontFamily: FONT }}>Before sending to print:</div>
                  <div style={{ fontSize: 12, color: BRAND.textSecondary, lineHeight: 1.7, fontFamily: FONT }}>
                    1. Open the PDF and check all pages render correctly<br />
                    2. Verify chapter openings start on right-hand (recto) pages<br />
                    3. Check drop caps display properly at chapter starts<br />
                    4. Confirm page numbers and running headers are correct<br />
                    5. Review the table of contents page numbers
                  </div>
                </div>
              </div>
            )}
            </div>
          </div>

          {/* Footer */}
          <div style={{ borderTop: "1px solid " + BRAND.border, padding: "20px 20px 28px", textAlign: "center" }}>
            <div style={{ width: 36, height: 3, background: BRAND.border, borderRadius: 2, margin: "0 auto 12px" }}></div>
            <div style={{ fontSize: 12, color: BRAND.textMuted, fontFamily: FONT, fontWeight: 500 }}>
              Powered by <span style={{ color: BRAND.textSecondary, fontWeight: 600 }}>Bookfunnels.io</span>
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<TinybookFormatter />);
  </script>
</body>
</html>
